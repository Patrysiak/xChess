<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HybridPro: Discord x Messenger x Insta</title>
    <style>
        /* ================= CSS: ZMIENNE I BAZA ================= */
        :root {
            --bg-darkest: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-chat: #313338;
            --bg-input: #383a40;
            --bg-hover: rgba(255, 255, 255, 0.08);
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --brand-blue: #5865F2; /* Discord Blurple */
            --messenger-blue: #0084ff;
            --danger-red: #f23f42;
            --success-green: #23a559;
            --insta-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-darkest);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 10px; }

        svg { width: 24px; height: 24px; fill: currentColor; }

        /* ================= EKRAN LOGOWANIA (STYL DISCORDA) ================= */
        #login-screen {
            position: fixed; inset: 0;
            background: var(--bg-darkest);
            background-image: radial-gradient(circle at center, #2b2d31 0%, #1e1f22 100%);
            z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }

        .login-box {
            background: var(--bg-chat);
            padding: 40px;
            border-radius: 8px;
            width: 480px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .login-box h2 { font-size: 24px; color: white; margin-bottom: 8px; }
        .login-box p { color: var(--text-muted); font-size: 15px; margin-bottom: 30px; }
        
        .btn-brand {
            background: var(--brand-blue); color: white; border: none;
            width: 100%; padding: 15px; border-radius: 4px; font-size: 16px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-brand:hover { background: #4752c4; }

        /* Główny kontener aplikacji (ukryty do zalogowania) */
        #app-container { display: none; width: 100%; height: 100%; }

        /* ================= 1. DISCORD NAV ================= */
        .app-nav {
            width: 75px; background-color: var(--bg-darkest);
            display: flex; flex-direction: column; align-items: center;
            padding-top: 15px; gap: 12px; z-index: 10;
        }

        .nav-icon {
            width: 50px; height: 50px; border-radius: 50%;
            background-color: var(--bg-sidebar); color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .nav-icon svg { width: 28px; height: 28px; }
        .nav-icon:hover { border-radius: 16px; background-color: var(--brand-blue); color: white; }
        .nav-icon.active { background: var(--insta-gradient); border-radius: 16px; color: white; }

        .badge {
            position: absolute; bottom: -2px; right: -2px;
            background-color: var(--danger-red); color: white;
            font-size: 11px; font-weight: bold; padding: 2px 6px;
            border-radius: 10px; border: 3px solid var(--bg-darkest);
        }

        /* ================= 2. SIDEBAR ================= */
        .sidebar {
            width: 340px; background-color: var(--bg-sidebar);
            display: flex; flex-direction: column; border-right: 1px solid #1f2023;
        }

        .sidebar-header {
            padding: 25px 20px 15px; font-size: 22px; font-weight: 800; color: white;
            display: flex; justify-content: space-between; align-items: center;
        }

        .stories-container { display: flex; padding: 0 15px 15px; gap: 15px; overflow-x: auto; border-bottom: 1px solid #1f2023; }
        .story { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: 0.2s; }
        .story:hover { transform: translateY(-2px); }
        .story-img-wrapper { width: 58px; height: 58px; border-radius: 50%; padding: 3px; background: var(--insta-gradient); }
        .story.viewed .story-img-wrapper { background: #4f545c; }
        .story img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--bg-sidebar); }
        .story span { font-size: 11px; width: 60px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .search-bar { padding: 15px; }
        .search-bar input { width: 100%; background: var(--bg-darkest); border: none; color: white; padding: 10px 15px; border-radius: 6px; outline: none; }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 15px; margin: 0 10px; border-radius: 8px; display: flex; align-items: center; cursor: pointer; transition: 0.1s; }
        .chat-item:hover { background-color: var(--bg-hover); }
        .chat-item.active { background-color: rgba(255, 255, 255, 0.1); }
        .chat-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; margin-right: 15px; }
        .chat-info { flex: 1; overflow: hidden; }
        .chat-info h4 { font-size: 15px; color: white; font-weight: 600; margin-bottom: 4px;}
        .chat-info p { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ================= 3. CHAT AREA ================= */
        .chat-area { flex: 1; background-color: var(--bg-chat); display: flex; flex-direction: column; position: relative; }
        .chat-header { height: 70px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1f2023; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .chat-header-info { display: flex; align-items: center; gap: 15px; }
        .chat-header-info img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
        .chat-header-info h3 { font-size: 16px; color: white; margin-bottom: 2px;}
        .chat-header-info span { font-size: 13px; color: var(--text-muted); }
        
        .header-actions { display: flex; gap: 20px; }
        .header-actions span { color: var(--text-muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center; }
        .header-actions span:hover { color: white; }

        .messages { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .message-row { display: flex; width: 100%; flex-direction: column; }
        .message-row.received { align-items: flex-start; }
        .message-row.sent { align-items: flex-end; }
        .message-bubble { max-width: 65%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .received .message-bubble { background-color: var(--bg-input); border-bottom-left-radius: 4px; }
        .sent .message-bubble { background-color: var(--messenger-blue); color: white; border-bottom-right-radius: 4px; }
        .message-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; padding: 0 5px; }

        .like-btn { position: absolute; bottom: -12px; right: 10px; background: var(--bg-chat); border-radius: 50%; padding: 4px 6px; cursor: pointer; opacity: 0; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .sent .like-btn { left: 10px; right: auto; }
        .message-bubble:hover .like-btn { opacity: 1; transform: translateY(-2px); }
        .like-btn.liked { opacity: 1; color: var(--danger-red); }

        .input-area { padding: 0 20px 25px; }
        .input-wrapper { background-color: var(--bg-input); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 15px; }
        .input-wrapper input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 15px; }
        .action-icon { color: var(--text-muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center;}
        .action-icon:hover { color: white; }

        /* ================= MODALS (WIDEO, TELEFON, USTAWIENIA) ================= */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-sidebar); padding: 30px; border-radius: 12px; text-align: center; color: white; min-width: 300px; border: 1px solid #1f2023; position: relative;}
        
        .call-avatar { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(88, 101, 242, 0); } 100% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0); } }
        
        .btn-endcall { background: var(--danger-red); color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 20px; display: flex; align-items: center; gap: 10px; margin: 20px auto 0;}
        .btn-logout { background: var(--bg-input); color: var(--danger-red); border: 1px solid var(--danger-red); padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight:bold; margin-top: 20px; width: 100%;}
        .btn-logout:hover { background: var(--danger-red); color: white; }
        
        .close-modal { position: absolute; top: 15px; right: 15px; cursor: pointer; color: var(--text-muted); }
        .close-modal:hover { color: white; }

    </style>
</head>

            { id: "c_1", userId: "u_1", lastMsg: "Podeślesz mi to zdjęcie?", time: "10:45", unread: 2 },
            { id: "c_3", userId: "u_3", lastMsg: "Kamil: Zrobię to jutro.", time: "09:30", unread: 1 },
            { id: "c_2", userId: "u_2", lastMsg: "Haha, dokładnie!", time: "Wczoraj", unread: 0 }
        ];

        window.messagesDb = {
            "c_1": [
                { id: "m_1", senderId: "u_1", text: "Hej! Widziałeś najnowsze Insta Stories? 😂", time: "10:40", liked: false },
                { id: "m_2", senderId: "me", text: "Tak, mega zabawne! Zrobiłem zrzut ekranu.", time: "10:42", liked: true },
                { id: "m_3", senderId: "u_1", text: "Podeślesz mi to zdjęcie? Zapomniałam zapisać.", time: "10:45", liked: false }
            ]
        };

        // 4. NASŁUCHIWANIE LOGOWANIA
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Udane logowanie -> Pokaż App, Ukryj Login
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                
                // Pobierz/Zapisz do Firestore
                const docRef = doc(db, 'users', user.uid);
                const docSnap = await getDoc(docRef);
                
                let avatarUrl = user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`;
                if (!docSnap.exists()) {
                    window.MY_USER_DATA = { uid: user.uid, name: user.displayName, email: user.email, avatar: avatarUrl };
                    await setDoc(docRef, window.MY_USER_DATA);
                } else {
                    window.MY_USER_DATA = docSnap.data();
                    if(!window.MY_USER_DATA.avatar) window.MY_USER_DATA.avatar = avatarUrl;
                }

                // Aktualizuj UI w ustawieniach
                document.getElementById('my-profile-img').src = window.MY_USER_DATA.avatar;
                document.getElementById('my-profile-name').innerText = window.MY_USER_DATA.name;
                document.getElementById('my-profile-email').innerText = window.MY_USER_DATA.email;

                initUI();
            } else {
                // Wylogowano -> Pokaż Login
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
                document.getElementById('btn-login').innerHTML = `<svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Zaloguj przez Google`;
            }
        });

        // ================= FUNKCJE UI (WYWOŁYWANE Z HTML) =================
        function initUI() {
            window.renderStories();
            window.renderChats();
            window.loadChat(window.activeChatId);
        }

        window.renderStories = () => {
            const box = document.getElementById("stories-box");
            box.innerHTML = `
                <div class="story" onclick="alert('Brak uprawnień do kamery!')">
                    <div class="story-img-wrapper"><img src="${window.MY_USER_DATA.avatar}"></div>
                    <span>Ty</span>
                </div>
                <div class="story" onclick="alert('Relacja od Anna Nowak')">
                    <div class="story-img-wrapper"><img src="${users['u_1'].avatar}"></div>
                    <span>Anna</span>
                </div>
            `;
        };

        window.renderChats = (filter = "") => {
            const box = document.getElementById("chats-box");
            box.innerHTML = "";
            let totalUnread = 0;

            chats.forEach(chat => {
                const user = users[chat.userId];
                if (filter && !user.name.toLowerCase().includes(filter.toLowerCase())) return;

                totalUnread += chat.unread;
                const active = chat.id === window.activeChatId ? "active" : "";
                
                box.innerHTML += `
                    <div class="chat-item ${active}" onclick="loadChat('${chat.id}')">
                        <img src="${user.avatar}" class="chat-avatar">
                        <div class="chat-info">
                            <h4>${user.name}</h4>
                            <p style="${chat.unread>0?'color:white;font-weight:bold;':''}">${chat.lastMsg}</p>
                        </div>
                        <div style="display:flex; flex-direction:column; align-items:flex-end;">
                            <span style="font-size:11px;color:var(--text-muted);">${chat.time}</span>
                            ${chat.unread > 0 ? `<div style="background:var(--danger-red); color:white; font-size:10px; padding:2px 6px; border-radius:10px; font-weight:bold; margin-top:5px;">${chat.unread}</div>` : ""}
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-unread').innerText = totalUnread;
        };

        window.filterChats = (v) => window.renderChats(v);

        window.loadChat = (chatId) => {
            window.activeChatId = chatId;
            const chatObj = chats.find(c => c.id === chatId);
            const user = users[chatObj.userId];
            chatObj.unread = 0; // Przeczytano
            window.renderChats();

            // Header z Ikonami Akcji
            document.getElementById("chat-header").innerHTML = `
                <div class="chat-header-info">
                    <img src="${user.avatar}">
                    <div><h3>${user.name}</h3><span>${user.status==='online'?'Dostępny(a)':'Offline'}</span></div>
                </div>
                <div class="header-actions">
                    <span title="Zadzwoń" onclick="startCall('audio', '${user.name}', '${user.avatar}')">
                        <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                    </span>
                    <span title="Wideo" onclick="startCall('video', '${user.name}', '${user.avatar}')">
                        <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                    </span>
                    <span title="Profil kontaktu" onclick="alert('Informacje o użytkowniku: ${user.name}')">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                    </span>
                </div>
            `;
            window.renderMessages();
        };

        window.renderMessages = () => {
            const box = document.getElementById("messages-box");
            box.innerHTML = "";
            const msgs = window.messagesDb[window.activeChatId] || [];

            msgs.forEach(msg => {
                const isMe = msg.senderId === "me";
                const rowClass = isMe ? "sent" : "received";
                
                // SVG Serduszka
                const heartSvg = msg.liked 
                    ? `<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>` 
                    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;

                const likedHTML = `<div class="like-btn ${msg.liked ? 'liked' : ''}" onclick="toggleLike('${msg.id}')">${heartSvg}</div>`;

                box.innerHTML += `
                    <div class="message-row ${rowClass}">
                        <div class="message-bubble">
                            ${msg.text}
                            ${likedHTML}
                        </div>
                        <span class="message-time">${msg.time}</span>
                    </div>
                `;
            });
            box.scrollTop = box.scrollHeight;
        };

        window.handleKeyPress = (e) => {
            if (e.key === "Enter") {
                const input = document.getElementById("msg-input");
                if (input.value.trim() !== "") {
                    const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    if(!window.messagesDb[window.activeChatId]) window.messagesDb[window.activeChatId] = [];
                    
                    window.messagesDb[window.activeChatId].push({
                        id: "m_" + Date.now(), senderId: "me", text: input.value.trim(), time: timeStr, liked: false
                    });
                    
                    chats.find(c => c.id === window.activeChatId).lastMsg = "Ty: " + input.value.trim();
                    input.value = "";
                    window.renderMessages();
                    window.renderChats();
                }
            }
        };

        window.toggleLike = (msgId) => {
            const msg = window.messagesDb[window.activeChatId].find(m => m.id === msgId);
            if(msg) { msg.liked = !msg.liked; window.renderMessages(); }
        };

        // --- OBSŁUGA MODALI ---
        window.startCall = (type, name, avatar) => {
            document.getElementById('call-modal').style.display = 'flex';
            document.getElementById('call-title').innerText = type === 'video' ? 'Wideo rozmowa...' : 'Dzwonię...';
            document.getElementById('call-name').innerText = name;
            document.getElementById('call-img').src = avatar;
        };

        window.openSettings = () => { document.getElementById('settings-modal').style.display = 'flex'; };
        window.closeModals = () => { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); };

        // Fake mic
        window.startMic = () => { document.getElementById('msg-input').placeholder = "Nagrywanie... (puść by wysłać)"; document.getElementById('mic-btn').style.color = "var(--danger-red)"; };
        window.stopMic = () => { document.getElementById('msg-input').placeholder = "Napisz wiadomość..."; document.getElementById('mic-btn').style.color = "var(--text-muted)"; alert("Nagranie głosowe (symulacja) zapisane!"); };

    </script>
</body>
</html>
