<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Age of Territorial - Custom & Editor</title>
    <style>
        /* =========================================================
           CSS BAZOWY I ZMIENNE
           ========================================================= */
        :root {
            --bg-base: #050510; --panel: #0a0f24; --border: #1e293b;
            --blue: #3b82f6; --red: #ef4444; --green: #10b981; --gold: #f59e0b;
            --text: #f8fafc; --text-dim: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-base); color: var(--text); overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* EKRANY */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; background: radial-gradient(circle, #0a0f24 0%, #050510 100%); z-index: 10; }
        .screen.active { display: flex; }
        
        /* MENU & UI */
        .title { font-size: 4rem; color: var(--blue); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 20px; text-shadow: 0 0 20px rgba(59,130,246,0.5); }
        .btn { background: rgba(0,0,0,0.5); border: 2px solid var(--border); color: white; padding: 15px 40px; margin: 10px; font-size: 1.2rem; cursor: pointer; border-radius: 8px; width: 350px; transition: 0.3s; font-weight: bold; }
        .btn:hover { border-color: var(--blue); background: rgba(59,130,246,0.1); transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; border-color: #333; cursor: not-allowed; transform: none; }
        .btn-green { border-color: var(--green); color: var(--green); }
        .btn-green:hover { background: var(--green); color: black; }
        
        .box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* GRA */
        #game-ui { z-index: 5; background: #000; }
        #hud { display: flex; justify-content: space-between; background: rgba(10,15,36,0.9); padding: 15px 30px; border-bottom: 2px solid var(--border); position: relative; z-index: 20; }
        .res-bar { display: flex; gap: 20px; font-weight: bold; font-size: 1.2rem; }
        .res-item { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 5px; border: 1px solid var(--border); }
        canvas { box-shadow: 0 0 50px black; cursor: crosshair; }

        /* MODALE I EDYTOR */
        .modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel); border: 2px solid var(--blue); padding: 25px; border-radius: 10px; z-index: 100; flex-direction: column; width: 400px; box-shadow: 0 10px 40px black; }
        .modal h2 { text-align: center; color: var(--blue); margin-bottom: 15px; }
        input[type="range"] { width: 100%; margin: 15px 0; cursor: pointer; }
        .btn-row { display: flex; gap: 10px; }
        .btn-act { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-ok { background: var(--green); } .btn-no { background: var(--red); }
        
        .build-item { background: rgba(0,0,0,0.4); padding: 10px; border: 1px solid var(--border); margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .build-item:hover { border-color: var(--gold); }

        #toast { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; pointer-events: none; z-index: 200; }
        .msg { background: rgba(10,15,36,0.95); padding: 12px 25px; border-radius: 30px; border: 1px solid var(--border); font-weight: bold; animation: fade 2.5s forwards; }
        @keyframes fade { 0% { opacity:0; transform:translateY(20px); } 10% { opacity:1; transform:translateY(0); } 80% { opacity:1; } 100% { opacity:0; } }
    </style>
</head>
<body>

    <div id="screen-main" class="screen active">
        <h1 class="title">Territorial</h1>
        <div id="auth-status" style="color: var(--text-dim); margin-bottom: 20px;">Inicjalizacja systemu...</div>
        <button id="btn-login" class="btn" style="background: #db4437; border-color: #db4437;" onclick="loginGoogle()">Zaloguj Google</button>
        <button id="btn-play" class="btn btn-green" onclick="App.show('screen-net')" disabled>GRAJ</button>
        <button class="btn" onclick="alert('Konto: Zalogowano w Firebase.')">Profil</button>
    </div>

    <div id="screen-net" class="screen">
        <h2 class="title" style="font-size: 3rem;">Tryb Gry</h2>
        <button class="btn btn-green" onclick="App.show('screen-mode'); App.state.online = true;">ONLINE (Multiplayer)</button>
        <button class="btn" onclick="App.show('screen-mode'); App.state.online = false;">OFFLINE (Boty)</button>
        <button class="btn" style="border-color: var(--text-dim);" onclick="App.show('screen-main')">Wróć</button>
    </div>

    <div id="screen-mode" class="screen">
        <h2 class="title" style="font-size: 3rem;">Rodzaj Mapy</h2>
        <button class="btn btn-green" onclick="App.startNormal()">NORMALNA (Generowana)</button>
        <button class="btn" onclick="App.show('screen-custom')">CUSTOM (Własna)</button>
        <button class="btn" style="border-color: var(--text-dim);" onclick="App.show('screen-net')">Wróć</button>
    </div>

    <div id="screen-custom" class="screen">
        <div class="box">
            <h2 style="color: var(--blue); margin-bottom: 20px;">Mapy Niestandardowe</h2>
            <button class="btn btn-green" onclick="App.show('screen-editor')">Stwórz i Hostuj</button>
            <button class="btn" onclick="App.joinCustom()">Dołącz do kogoś</button>
            <button class="btn" style="border-color: var(--text-dim);" onclick="App.show('screen-mode')">Wróć</button>
        </div>
    </div>

    <div id="screen-lobby" class="screen">
        <div class="box">
            <h2 style="color: var(--gold); margin-bottom: 10px;">Oczekiwanie na graczy...</h2>
            <p style="color: var(--text-dim); margin-bottom: 20px;">Szukanie przeciwnika w Firebase</p>
            <div class="loader"></div>
            <button class="btn btn-no" style="width: auto; padding: 10px 30px; margin-top: 20px;" onclick="App.cancelLobby()">Anuluj</button>
        </div>
    </div>

    <div id="screen-editor" class="screen" style="justify-content: flex-start; padding-top: 20px;">
        <h2 style="color: var(--blue); margin-bottom: 10px;">Edytor Mapy (LPM: Ląd, PPM: Woda)</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button class="btn btn-green" style="width: 200px; padding: 10px;" onclick="App.hostEditedMap()">Zapisz i Hostuj</button>
            <button class="btn" style="width: 200px; padding: 10px; border-color: var(--red);" onclick="App.show('screen-custom')">Wyjdź</button>
        </div>
        <canvas id="editorCanvas" width="1000" height="560" style="border: 2px solid var(--blue);"></canvas>
    </div>

    <div id="game-ui" class="screen">
        <div id="hud">
            <div class="res-bar">
                <div class="res-item" style="color: var(--gold)">🪙 <span id="ui-gold">0</span></div>
                <div class="res-item" style="color: #b45309">🪵 <span id="ui-wood">0</span></div>
                <div class="res-item" style="color: #64748b">🪨 <span id="ui-stone">0</span></div>
                <div class="res-item" style="color: var(--red)">⚔️ <span id="ui-troops">0</span></div>
            </div>
            <div style="color: var(--text-dim);">[1 Klik] Wybierz | [2 Kliki] Ruch | [PPM] Buduj</div>
        </div>
        <div style="flex-grow: 1; display: flex; justify-content: center; align-items: center;">
            <canvas id="gameCanvas" width="1200" height="700"></canvas>
        </div>
        <div id="toast"></div>
    </div>

    <div id="modal-move" class="modal">
        <h2>Wyślij Jednostki</h2>
        <div id="move-val" style="font-size: 2rem; color: var(--red); text-align: center; font-weight: bold;">10</div>
        <input type="range" id="move-slider" min="1" max="100" value="10" oninput="document.getElementById('move-val').innerText=this.value">
        <div class="btn-row">
            <button class="btn-act btn-no" onclick="UI.closeModals()">Anuluj</button>
            <button class="btn-act btn-ok" onclick="Game.confirmMove()">Rozkaz!</button>
        </div>
    </div>

    <div id="modal-build" class="modal">
        <h2>Rozbudowa</h2>
        <div id="build-list" style="max-height: 300px; overflow-y: auto;"></div>
        <button class="btn-act btn-no" style="margin-top:15px;" onclick="UI.closeModals()">Zamknij</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVip74fl5K2fnLjlCOBLJfBnq7lxglyoU",
            authDomain: "xchess-79e2d.firebaseapp.com",
            projectId: "xchess-79e2d",
            storageBucket: "xchess-79e2d.firebasestorage.app",
            messagingSenderId: "382071993193",
            appId: "1:382071993193:web:86dbe5211f2151cb5383f8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getDatabase(app);

        window.FB = { db, uid: null, online: false };

        window.loginGoogle = () => {
            signInWithPopup(auth, provider).catch(e => alert("Błąd: " + e.message));
        };

        onAuthStateChanged(auth, user => {
            if (user) {
                window.FB.uid = user.uid;
                window.FB.online = true;
                document.getElementById('auth-status').innerText = "Zalogowano: " + user.displayName;
                document.getElementById('auth-status').style.color = "var(--green)";
                document.getElementById('btn-login').style.display = "none";
                document.getElementById('btn-play').disabled = false;
            }
        });

        // Wystawienie funkcji bazy dla logiki
        window.DB = {
            hostMap(mapData, isCustom) {
                if(!window.FB.online) return;
                set(ref(db, 'lobby/current'), { map: mapData, host: window.FB.uid, custom: isCustom, players: 1 });
            },
            joinMap(callback) {
                get(ref(db, 'lobby/current')).then(snap => {
                    if(snap.exists()) {
                        update(ref(db, 'lobby/current'), { players: 2 });
                        callback(true, snap.val().map);
                    } else callback(false, null);
                });
            },
            listenLobby(callback) {
                window.lobbyListener = onValue(ref(db, 'lobby/current'), snap => {
                    if(snap.exists() && snap.val().players > 1) callback();
                });
            },
            updateCell(x, y, data) {
                if(window.FB.online && App.state.online) update(ref(db, `game/map/${x}_${y}`), data);
            },
            listenGame(callback) {
                onValue(ref(db, 'game/map'), snap => { if(snap.exists()) callback(snap.val()); });
            }
        };
    </script>

    <script>
        const BUILDINGS = {
            mine: { name: 'Kopalnia', cost: { gold: 50 }, icon: '🪙', d: '+Złoto' },
            wood: { name: 'Drwal', cost: { gold: 30 }, icon: '🪵', d: '+Drewno' },
            quarry: { name: 'Kamieniołom', cost: { gold: 80, wood: 20 }, icon: '🪨', d: '+Kamień' },
            barracks: { name: 'Koszary', cost: { gold: 120, wood: 50 }, icon: '⛺', d: 'Szybkie Wojsko' },
            market: { name: 'Rynek', cost: { wood: 100, stone: 50 }, icon: '⚖️', d: 'Bonus Złota' },
            tower: { name: 'Wieża', cost: { stone: 100 }, icon: '👁️', d: 'Obrona x2' }
        };

        const UI = {
            toast(msg, err=false) {
                const t = document.createElement('div');
                t.className = 'msg'; t.innerText = msg;
                t.style.borderColor = err ? 'var(--red)' : 'var(--green)';
                document.getElementById('toast').appendChild(t);
                setTimeout(() => t.remove(), 2500);
            },
            closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); Game.tgt = null; }
        };

        // --- ZARZĄDZANIE STANEM APLIKACJI ---
        const App = {
            state: { online: false, custom: false },
            
            show(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
            },
            
            startNormal() {
                this.state.custom = false;
                if(this.state.online) {
                    this.show('screen-lobby');
                    let map = Editor.generateRandomMap();
                    window.DB.hostMap(map, false);
                    window.DB.listenLobby(() => {
                        window.DB.syncMap = () => {}; // MOCK dla tokenu
                        Game.init(map);
                    });
                } else {
                    Game.init(Editor.generateRandomMap());
                }
            },
            
            joinCustom() {
                if(!this.state.online) return UI.toast("Musisz grać online!", true);
                this.show('screen-lobby');
                window.DB.joinMap((found, mapData) => {
                    if(found) { Game.init(mapData); UI.toast("Dołączono do mapy!", false); }
                    else { UI.toast("Brak hostowanych map.", true); this.show('screen-custom'); }
                });
            },

            hostEditedMap() {
                let map = Editor.exportMap();
                if(this.state.online) {
                    this.show('screen-lobby');
                    window.DB.hostMap(map, true);
                    window.DB.listenLobby(() => Game.init(map));
                } else {
                    Game.init(map);
                }
            },

            cancelLobby() {
                this.show('screen-main');
            }
        };

        // --- EDYTOR MAP ---
        const Editor = {
            cvs: document.getElementById('editorCanvas'),
            ctx: document.getElementById('editorCanvas').getContext('2d'),
            cols: 25, rows: 14, sz: 40, grid: [],
            
            init() {
                this.grid = [];
                for(let y=0; y<this.rows; y++) {
                    let r = [];
                    for(let x=0; x<this.cols; x++) r.push(1); // 1 = woda, 0 = ląd domyślnie
                    this.grid.push(r);
                }
                
                let isDrawing = false, drawType = 0;
                this.cvs.oncontextmenu = e => e.preventDefault();
                this.cvs.onmousedown = e => { 
                    isDrawing = true; 
                    drawType = e.button === 0 ? 0 : 1; // LPM ląd, PPM woda
                    this.paint(e, drawType);
                };
                window.onmouseup = () => isDrawing = false;
                this.cvs.onmousemove = e => { if(isDrawing) this.paint(e, drawType); };
                this.loop();
            },
            paint(e, val) {
                const r = this.cvs.getBoundingClientRect();
                const x = Math.floor((e.clientX - r.left)/this.sz);
                const y = Math.floor((e.clientY - r.top)/this.sz);
                if(x>=0 && x<this.cols && y>=0 && y<this.rows) this.grid[y][x] = val;
            },
            draw() {
                for(let y=0; y<this.rows; y++) {
                    for(let x=0; x<this.cols; x++) {
                        this.ctx.fillStyle = this.grid[y][x] === 1 ? '#0ea5e9' : '#1e293b';
                        this.ctx.fillRect(x*this.sz, y*this.sz, this.sz, this.sz);
                        this.ctx.strokeStyle = '#000';
                        this.ctx.strokeRect(x*this.sz, y*this.sz, this.sz, this.sz);
                    }
                }
            },
            loop() { if(document.getElementById('screen-editor').classList.contains('active')) this.draw(); requestAnimationFrame(() => this.loop()); },
            exportMap() { return this.grid; },
            generateRandomMap() {
                let m = [];
                for(let y=0; y<this.rows; y++) {
                    let r = [];
                    for(let x=0; x<this.cols; x++) {
                        let w = (x===0||y===0||x===this.cols-1||y===this.rows-1||Math.random()<0.15) ? 1 : 0;
                        r.push(w);
                    }
                    m.push(r);
                }
                return m;
            }
        };
        Editor.init();

        // --- SILNIK GRY (Z Ulepszonymi Cząsteczkami) ---
        const Game = {
            cvs: document.getElementById('gameCanvas'),
            ctx: document.getElementById('gameCanvas').getContext('2d'),
            cols: 30, rows: 17, sz: 40, grid: [], uid: null,
            res: { gold: 200, wood: 100, stone: 0 },
            run: false, src: null, tgt: null, hov: null, lastClick: 0,
            particles: [],

            init(mapMatrix) {
                this.uid = window.FB.uid || "GUEST_" + Math.floor(Math.random()*1000);
                App.show('game-ui');
                
                // Konwersja macierzy edytora (0/1) na obiekty gry
                this.grid = [];
                for(let y=0; y<mapMatrix.length; y++) {
                    let r = [];
                    for(let x=0; x<mapMatrix[0].length; x++) {
                        let isW = mapMatrix[y][x] === 1;
                        r.push({x, y, own:0, troops: isW?0:Math.floor(Math.random()*3), water: isW, b:null});
                    }
                    this.grid.push(r);
                }
                
                this.spawn();
                this.bind();
                setInterval(() => this.tick(), 1000);
                
                if(App.state.online) {
                    window.DB.listenGame(data => {
                        for(let k in data) {
                            let [x, y] = k.split('_');
                            this.grid[y][x] = data[k];
                        }
                    });
                }
                
                this.run = true; this.loop();
                UI.toast("Bitwa rozpoczęta!", false);
            },

            spawn() {
                let lands = [];
                for(let y=0; y<this.grid.length; y++) for(let x=0; x<this.grid[0].length; x++) if(!this.grid[y][x].water && this.grid[y][x].own===0) lands.push(this.grid[y][x]);
                if(lands.length > 0) {
                    let p = lands[Math.floor(Math.random() * lands.length)];
                    p.own = this.uid; p.troops = 100; p.b = 'tower';
                    if(App.state.online) window.DB.updateCell(p.x, p.y, p);
                }
            },

            tick() {
                let t = 0;
                for(let y=0; y<this.grid.length; y++) {
                    for(let x=0; x<this.grid[0].length; x++) {
                        let p = this.grid[y][x];
                        if(p.own === this.uid) {
                            let inc = p.b === 'barracks' ? 5 : 1;
                            p.troops += inc; t += p.troops;
                            
                            this.res.gold += p.b === 'market' ? 3 : 1;
                            if(p.b === 'mine') this.res.gold += 5;
                            if(p.b === 'wood') this.res.wood += 5;
                            if(p.b === 'quarry') this.res.stone += 3;

                            if(App.state.online) window.DB.updateCell(x, y, {troops: p.troops});
                        }
                    }
                }
                document.getElementById('ui-gold').innerText = this.res.gold;
                document.getElementById('ui-wood').innerText = this.res.wood;
                document.getElementById('ui-stone').innerText = this.res.stone;
                document.getElementById('ui-troops').innerText = t;
            },

            bind() {
                this.cvs.oncontextmenu = e => e.preventDefault();
                this.cvs.onmousemove = e => {
                    const r = this.cvs.getBoundingClientRect();
                    const x = Math.floor((e.clientX - r.left)/this.sz);
                    const y = Math.floor((e.clientY - r.top)/this.sz);
                    if(x>=0 && x<this.grid[0].length && y>=0 && y<this.grid.length) this.hov = this.grid[y][x];
                };

                this.cvs.onmousedown = e => {
                    if(!this.hov) return;
                    if(this.hov.water) { this.src = null; return; }

                    if(e.button === 2 && this.hov.own === this.uid && !this.hov.b) {
                        this.openBuild(this.hov); return;
                    }

                    if(e.button === 0) {
                        const now = Date.now();
                        if(now - this.lastClick < 400 && this.src) {
                            let dist = Math.max(Math.abs(this.src.x - this.hov.x), Math.abs(this.src.y - this.hov.y));
                            if(dist === 1 && this.src.troops > 1) {
                                this.tgt = this.hov;
                                const s = document.getElementById('move-slider');
                                s.max = Math.max(1, this.src.troops - 1); s.value = Math.floor(s.max/2);
                                document.getElementById('move-val').innerText = s.value;
                                document.getElementById('modal-move').style.display = 'flex';
                            }
                        } else {
                            if(this.hov.own === this.uid) this.src = this.hov;
                            else this.src = null;
                        }
                        this.lastClick = now;
                    }
                };
            },

            confirmMove() {
                let v = parseInt(document.getElementById('move-slider').value);
                if(this.src.troops <= v) return;
                this.src.troops -= v;

                let px = this.src.x*this.sz+20, py = this.src.y*this.sz+20;
                let tx = this.tgt.x*this.sz+20, ty = this.tgt.y*this.sz+20;
                
                // Animacja
                this.particles.push({ type: 'laser', sx: px, sy: py, tx: tx, ty: ty, p: 0 });

                setTimeout(() => {
                    let defB = this.tgt.b === 'tower' ? 2 : 1;
                    if(this.tgt.own === this.uid) { 
                        this.tgt.troops += v; 
                        this.addText(tx, ty, `+${v}`, '#10b981');
                    } else {
                        let effDef = this.tgt.troops * defB;
                        if(v > effDef) {
                            this.tgt.own = this.uid; this.tgt.troops = v - effDef; this.tgt.b = null;
                            UI.toast("Zdobyto!", false);
                            this.addText(tx, ty, "WIN", '#3b82f6');
                            for(let i=0;i<10;i++) this.particles.push({ type:'spark', x:tx, y:ty, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, l:1 });
                        } else {
                            this.tgt.troops = Math.floor((effDef - v) / defB);
                            UI.toast("Odparto!", true);
                            this.addText(tx, ty, `-${v}`, '#ef4444');
                        }
                    }
                    if(App.state.online) {
                        window.DB.updateCell(this.src.x, this.src.y, this.src);
                        window.DB.updateCell(this.tgt.x, this.tgt.y, this.tgt);
                    }
                }, 300);

                UI.closeModals(); this.src = null;
            },

            openBuild(prov) {
                const list = document.getElementById('build-list');
                list.innerHTML = '';
                for(let k in BUILDINGS) {
                    let b = BUILDINGS[k];
                    let d = document.createElement('div');
                    d.className = 'build-item';
                    d.innerHTML = `<div><b>${b.icon} ${b.name}</b><br><small style="color:var(--text-dim)">${b.d}</small></div><button class="btn-act btn-ok" style="flex:0; padding:10px;">Kup</button>`;
                    d.querySelector('button').onclick = () => {
                        for(let c in b.cost) if(this.res[c] < b.cost[c]) return UI.toast("Brak surowców!", true);
                        for(let c in b.cost) this.res[c] -= b.cost[c];
                        prov.b = k; UI.closeModals(); UI.toast("Zbudowano " + b.name);
                        if(App.state.online) window.DB.updateCell(prov.x, prov.y, prov);
                    };
                    list.appendChild(d);
                }
                document.getElementById('modal-build').style.display = 'flex';
            },

            addText(x, y, t, c) { this.particles.push({ type:'text', x, y, t, c, l:1 }); },

            draw() {
                this.ctx.fillStyle = '#050510'; this.ctx.fillRect(0,0,1200,700);
                for(let y=0; y<this.grid.length; y++) {
                    for(let x=0; x<this.grid[0].length; x++) {
                        let p = this.grid[y][x], px = x*this.sz, py = y*this.sz;
                        this.ctx.fillStyle = p.water ? '#0ea5e9' : (p.own===0 ? '#1e293b' : (p.own===this.uid ? '#3b82f6' : '#ef4444'));
                        this.ctx.fillRect(px, py, this.sz, this.sz);
                        this.ctx.strokeStyle = 'rgba(0,0,0,0.5)'; this.ctx.strokeRect(px, py, this.sz, this.sz);
                        
                        if(p.b) { this.ctx.fillStyle='#fff'; this.ctx.font='18px Arial'; this.ctx.fillText(BUILDINGS[p.b].icon, px+10, py+25); }
                        if(!p.water && (p.troops>0 || p.own!==0)) { this.ctx.fillStyle='white'; this.ctx.font='bold 14px Arial'; this.ctx.shadowColor='black'; this.ctx.shadowBlur=4; this.ctx.fillText(Math.floor(p.troops), px+this.sz/2-5, py+this.sz-5); this.ctx.shadowBlur=0; }
                        
                        if(this.hov === p && !p.water) { this.ctx.fillStyle='rgba(255,255,255,0.2)'; this.ctx.fillRect(px,py,this.sz,this.sz); }
                        if(this.src === p) { this.ctx.strokeStyle='#facc15'; this.ctx.lineWidth=3; this.ctx.strokeRect(px+2,py+2,this.sz-4,this.sz-4); this.ctx.lineWidth=1; }
                    }
                }

                // Particles
                for(let i = this.particles.length-1; i>=0; i--) {
                    let pt = this.particles[i];
                    if(pt.type === 'laser') {
                        this.ctx.beginPath(); this.ctx.moveTo(pt.sx, pt.sy);
                        this.ctx.lineTo(pt.sx + (pt.tx-pt.sx)*pt.p, pt.sy + (pt.ty-pt.sy)*pt.p);
                        this.ctx.strokeStyle = '#3b82f6'; this.ctx.lineWidth = 4; this.ctx.stroke();
                        pt.p += 0.15; if(pt.p >= 1) this.particles.splice(i,1);
                    } else if(pt.type === 'spark') {
                        this.ctx.fillStyle = '#facc15'; this.ctx.globalAlpha = pt.l;
                        this.ctx.fillRect(pt.x, pt.y, 4, 4); this.ctx.globalAlpha = 1;
                        pt.x += pt.vx; pt.y += pt.vy; pt.l -= 0.05; if(pt.l <= 0) this.particles.splice(i,1);
                    } else if(pt.type === 'text') {
                        this.ctx.fillStyle = pt.c; this.ctx.globalAlpha = pt.l; this.ctx.font = 'bold 20px Arial';
                        this.ctx.fillText(pt.t, pt.x, pt.y); this.ctx.globalAlpha = 1;
                        pt.y -= 1; pt.l -= 0.02; if(pt.l <= 0) this.particles.splice(i,1);
                    }
                }
            },
            loop() { if(this.run) { this.draw(); requestAnimationFrame(() => this.loop()); } }
        };
    </script>
</body>
</html>
