<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>33MC.PL - Discord V-MAX Project</title>
    <style>
        :root {
            --bg-tertiary: #1e1f22; --bg-secondary: #2b2d31; --bg-primary: #313338;
            --bg-floating: #111214; --bg-message-hover: #2e3035;
            --bg-modifier-hover: rgba(78, 80, 88, 0.3); --bg-modifier-active: rgba(78, 80, 88, 0.48);
            --bg-input: #383a40; --text-normal: #dbdee1; --text-muted: #949ba4;
            --header-primary: #f2f3f5; --header-secondary: #b5bac1;
            --brand-color: #5865F2; --brand-hover: #4752c4;
            --danger-color: #da373c; --success-color: #23a559; --warning-color: #f0b232;
            --story-orange: #f39c12; --prestige-gold: #ffd700; --boost-pink: #ff73fa;
        }

        /* RESET I BAZA */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-normal); display: flex; height: 100vh; width: 100vw; overflow: hidden; font-size: 14px; }
        ul { list-style: none; }
        button { cursor: pointer; border: none; background: none; color: inherit; transition: 0.2s; }
        input, select { outline: none; border: none; font-family: inherit; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-tertiary); }
        ::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 4px; }

        /* ANIMACJE */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes modalPop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes storyRingPulse { 
            0% { box-shadow: 0 0 0 2px var(--bg-secondary), 0 0 0 4px var(--story-orange); } 
            50% { box-shadow: 0 0 0 2px var(--bg-secondary), 0 0 0 7px rgba(243, 156, 18, 0.4); } 
            100% { box-shadow: 0 0 0 2px var(--bg-secondary), 0 0 0 4px var(--story-orange); } 
        }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* EKRAN LOGOWANIA */
        #login-screen { position: fixed; inset: 0; background: var(--bg-tertiary); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        #login-screen.hidden { display: none; }
        .login-box { background: var(--bg-primary); padding: 48px; border-radius: 8px; width: 480px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.4); animation: slideUp 0.5s ease; }
        .btn-brand { background: var(--brand-color); color: white; width: 100%; padding: 14px; border-radius: 4px; font-size: 16px; font-weight: bold; }
        .btn-brand:hover { background: var(--brand-hover); }

        #app-container { display: none; width: 100vw; height: 100vh; }
        #app-container.active { display: flex; animation: fadeIn 0.5s ease; }

        /* LEWA KOLUMNA - SERWERY */
        .nav-servers { width: 72px; background: var(--bg-tertiary); display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; flex-shrink: 0; }
        .server-item { position: relative; width: 48px; height: 48px; border-radius: 50%; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; overflow: hidden; }
        .server-item:hover, .server-item.active { border-radius: 16px; background: var(--brand-color); color: white; }
        .server-item img { width: 100%; height: 100%; object-fit: cover; }
        .server-pill { position: absolute; left: -4px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; background: white; border-radius: 0 4px 4px 0; opacity: 0; transition: 0.2s; }
        .server-item:hover + .server-pill, .server-item.active + .server-pill { opacity: 1; height: 20px; }
        .server-sep { width: 32px; height: 2px; background: var(--bg-modifier-active); margin: 4px 0; }

        /* KOLUMNA KANAŁÓW / DM */
        .sidebar { width: 240px; background: var(--bg-secondary); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { height: 48px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--bg-tertiary); font-weight: bold; color: white; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 12px 8px; }
        .cat-title { font-size: 11px; font-weight: 800; color: var(--header-secondary); text-transform: uppercase; margin: 16px 8px 4px; display: flex; justify-content: space-between; }
        .channel-link { padding: 8px; border-radius: 4px; display: flex; align-items: center; cursor: pointer; color: var(--text-muted); margin-bottom: 2px; font-weight: 500; }
        .channel-link:hover, .channel-link.active { background: var(--bg-modifier-hover); color: var(--text-normal); }
        .channel-link.active { background: var(--bg-modifier-active); }

        /* AWATARY I RINGI POSTÓW */
        .av-wrap { position: relative; width: 32px; height: 32px; margin-right: 12px; flex-shrink: 0; }
        .av-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .av-img.ring { animation: storyRingPulse 2s infinite; border: 2px solid var(--bg-secondary); }
        .stat-dot { position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--bg-secondary); }

        /* PANEL UŻYTKOWNIKA */
        .user-panel { height: 62px; background: #232428; display: flex; align-items: center; padding: 0 8px; gap: 4px; }
        .u-info-box { display: flex; align-items: center; padding: 4px; border-radius: 4px; flex: 1; overflow: hidden; cursor: pointer; }
        .u-info-box:hover { background: var(--bg-modifier-hover); }
        .u-text { display: flex; flex-direction: column; overflow: hidden; }
        .u-text strong { font-size: 13px; color: white; white-space: nowrap; text-overflow: ellipsis; }
        .u-xp-container { width: 100%; height: 4px; background: var(--bg-modifier-active); border-radius: 2px; margin-top: 4px; }
        .u-xp-fill { height: 100%; background: var(--brand-color); width: 0%; transition: 0.3s; box-shadow: 0 0 4px var(--brand-color); }

        /* GŁÓWNY CZAT */
        .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-primary); }
        .chat-header { height: 48px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--bg-tertiary); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .chat-title { font-size: 16px; font-weight: bold; color: white; display: flex; align-items: center; gap: 8px; }
        .chat-body-wrap { flex: 1; display: flex; overflow: hidden; }
        .msg-list { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; }
        .msg-item { padding: 4px 16px 4px 72px; position: relative; margin-top: 17px; animation: slideUp 0.3s ease-out; }
        .msg-item:hover { background: var(--bg-message-hover); }
        .msg-av { position: absolute; left: 16px; top: 4px; width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .msg-author-row { display: flex; align-items: baseline; margin-bottom: 4px; }
        .msg-author-name { color: white; font-weight: 600; margin-right: 8px; font-size: 16px; display: flex; align-items: center; gap: 6px; }
        .msg-time { color: var(--text-muted); font-size: 12px; }
        .msg-text { font-size: 15px; line-height: 1.4; color: var(--text-normal); word-break: break-word; }
        .msg-img-attach { max-width: 450px; max-height: 350px; border-radius: 8px; margin-top: 8px; border: 1px solid var(--bg-tertiary); cursor: zoom-in; }

        .badge-lvl { background: var(--bg-modifier-active); color: var(--text-normal); font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .badge-prestige { background: var(--prestige-gold); color: black; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 900; box-shadow: 0 0 8px rgba(255,215,0,0.6); }

        /* INPUT */
        .chat-input-area { padding: 0 16px 24px; flex-shrink: 0; }
        .chat-input-box { background: var(--bg-input); border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; }
        .chat-input-box input { flex: 1; color: white; font-size: 15px; margin: 0 10px; }

        /* PRAWY PANEL */
        .members-panel { width: 240px; background: var(--bg-secondary); border-left: 1px solid var(--bg-modifier-active); flex-shrink: 0; overflow-y: auto; padding: 16px 8px; }
        .role-title { font-size: 12px; font-weight: 800; color: var(--header-secondary); text-transform: uppercase; margin: 12px 8px 4px; }
        .member-card { padding: 6px 8px; border-radius: 4px; display: flex; align-items: center; cursor: pointer; }
        .member-card:hover { background: var(--bg-modifier-hover); }
        .role-pink { color: #e91e63 !important; }
        .role-gold { color: #f1c40f !important; }

        /* MODALE */
        .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(4px); opacity: 0; transition: 0.2s; }
        .modal-mask.active { display: flex; opacity: 1; }
        .modal-body { background: var(--bg-primary); border-radius: 8px; width: 480px; padding: 28px; animation: modalPop 0.2s ease; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .modal-close { position: absolute; top: 15px; right: 15px; color: var(--header-secondary); cursor: pointer; }
        .modal-close:hover { color: white; }

        .btn-full { background: var(--brand-color); color: white; padding: 12px; border-radius: 4px; width: 100%; font-weight: bold; margin-top: 20px; }
        .btn-full:hover { background: var(--brand-hover); }
        .btn-ghost { background: transparent; border: 1px solid var(--danger-color); color: var(--danger-color); width: 100%; padding: 10px; margin-top: 10px; border-radius: 4px; font-weight: bold; }
        .btn-ghost:hover { background: var(--danger-color); color: white; }

        .up-area { border: 2px dashed var(--bg-modifier-active); padding: 30px; text-align: center; border-radius: 8px; cursor: pointer; color: var(--header-secondary); margin-bottom: 20px; transition: 0.2s; position: relative; }
        .up-area:hover { border-color: var(--brand-color); color: white; background: var(--bg-modifier-hover); }
        .up-preview { max-width: 100%; max-height: 200px; border-radius: 6px; display: none; margin-top: 10px; }

        /* TOASTY */
        #toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 999999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { background: var(--bg-floating); border-left: 4px solid var(--brand-color); padding: 16px 24px; border-radius: 4px; color: white; box-shadow: 0 8px 16px rgba(0,0,0,0.5); animation: slideInRight 0.3s forwards; display: flex; align-items: center; gap: 12px; }

        /* WIDOK POSTA */
        .post-box { width: 420px; height: 650px; background: black; border-radius: 12px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .post-top { padding: 15px; position: absolute; top: 0; width: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); z-index: 5; display: flex; align-items: center; }
        .post-prog-bar { position: absolute; top: 8px; left: 10px; right: 10px; height: 3px; background: rgba(255,255,255,0.3); z-index: 10; border-radius: 2px; }
        .post-prog-fill { height: 100%; background: white; width: 0%; border-radius: 2px; }
        .post-media { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .post-img-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
        .post-txt-val { position: relative; z-index: 2; color: white; font-size: 28px; font-weight: bold; text-align: center; padding: 40px; text-shadow: 0 4px 12px black; }

        svg { width: 24px; height: 24px; fill: currentColor; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <svg class="discord-logo" viewBox="0 0 127.14 96.36"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.68,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.36,46,96.26,53,91.08,65.69,84.69,65.69Z"/></svg>
            <h2>33MC.PL - Discord V-MAX</h2>
            <p>Zaloguj się, aby odblokować Prestiż i Posty!</p>
            <button class="btn-brand" id="google-login">Zaloguj przez Google (Firebase)</button>
        </div>
    </div>

    <div id="app-container">
        
        <nav class="nav-servers">
            <div class="server-item active" id="btn-home-view">🏠</div>
            <div class="server-pill" style="opacity:1; height:40px;"></div>
            <div class="server-sep"></div>
            <div class="server-item" id="btn-server-view"><img src="https://api.dicebear.com/7.x/initials/svg?seed=33MC&backgroundColor=111"></div>
            <div class="server-pill"></div>
            <div class="server-item" style="color:var(--success-color); margin-top: auto; margin-bottom: 20px;" onclick="alert('Ulepszanie serwera już wkrótce!')">💎</div>
        </nav>

        <aside class="sidebar">
            <div class="sidebar-header" id="sidebar-label">Prywatne wiadomości</div>
            <div class="sidebar-scroll" id="sidebar-list"></div>

            <div class="user-panel">
                <div class="u-info-box" id="open-settings">
                    <div class="av-wrap">
                        <img id="my-av" src="" class="av-img">
                        <div id="my-dot" class="stat-dot" style="background:var(--success-color)"></div>
                    </div>
                    <div class="u-text">
                        <strong id="my-name-val">Ładowanie...</strong>
                        <span id="my-lvl-val" style="font-size:10px; color:var(--text-muted)">Lvl 1</span>
                        <div class="u-xp-container"><div id="my-xp-bar" class="u-xp-fill"></div></div>
                    </div>
                </div>
                <div class="user-controls">
                    <button class="control-btn" id="add-post-trigger" title="Dodaj Post (24h)"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></button>
                    <button class="control-btn" id="settings-trigger"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.73 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.04.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>
                </div>
            </div>
        </aside>

        <main class="chat-main">
            <header class="top-bar">
                <div class="chat-title" id="chat-header-title">Znajomi</div>
                <div class="top-bar-actions">
                    <svg title="Dzwonienie" id="call-start"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>

                </div>
            </header>

            <div class="chat-body-wrap">
                <section class="msg-list" id="msg-area"></section>
                <aside class="members-panel" id="members-list"></aside>
            </div>

            <div class="chat-input-area">
                <div class="chat-input-box">
                    <svg style="color:var(--header-secondary); cursor:pointer;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
                    <input type="text" id="msg-input" placeholder="Napisz do znajomych (Zdobądź XP!)">
                </div>
            </div>
        </main>
    </div>

    <div id="modal-container">
        <div class="modal-mask" id="modal-settings">
            <div class="modal-body">
                <svg class="modal-close" id="close-set"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                <h2>Profil Użytkownika</h2>
                <div style="display:flex; gap:20px; margin-top:20px;">
                    <label class="up-area" style="width:120px; height:120px; border-radius:50%; padding:0; display:flex; justify-content:center; align-items:center;">
                        <input type="file" id="av-upload" style="display:none;" accept="image/*">

        <div class="modal-mask" id="modal-post-add">
            <div class="modal-body">

            <div class="post-box">
                <div class="post-prog-bar"><div class="post-prog-fill" id="post-prog"></div></div>

                    <img id="post-v-av" src="" style="width:40px; height:40px; border-radius:50%; margin-right:10px;">

                    <svg class="modal-close" id="close-v-post" style="right:15px; color:white;"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </div>
                <div class="post-media">
                    <img id="post-v-img" class="post-img-bg" src="">
                    <div class="post-txt-val" id="post-v-txt"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-wrap"></div>
    <audio id="ringtone" loop><source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // CONFIG FIREBASE (Z Twojego prompta)
        const firebaseConfig = {
            apiKey: "AIzaSyDVip74fl5K2fnLjlCOBLJfBnq7lxglyoU",
            authDomain: "xchess-79e2d.firebaseapp.com",
            projectId: "xchess-79e2d",
            storageBucket: "xchess-79e2d.firebasestorage.app",
            messagingSenderId: "382071993193",
            appId: "1:382071993193:web:86dbe5211f2151cb5383f8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // STAŁE
        const ONE_DAY = 24 * 60 * 60 * 1000;
        const XP_PER_MSG = 25;

        // STAN APLIKACJI
        let currentUser = null;
        let activeView = "server"; // "home" lub "server"
        let tempAvBase64 = null;
        let tempPostBase64 = null;
        let postTimer = null;

        // BAZA MOCK (SYMULACJA)
        const mockData = {
            friends: [
                { id: "f1", name: "Anna Nowak", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Anna", status: "online", post: { text: "Uczę się HTML! 💻", img: null, ts: Date.now() - 3600000 } },
                { id: "f2", name: "Blaaqu", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Blaaqu", status: "idle", post: null },
                { id: "f3", name: "xPatrysiak", avatar: "https://api.dicebear.com/7.x/bot/svg?seed=Patryk", status: "dnd", post: { text: "Stary post", ts: Date.now() - 90000000 } }
            ],
            serverRoles: [
                { name: "Zarząd", color: "role-pink", users: [{ name: "Blaaqu", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Blaaqu", lvl: 150, pr: 5, status: "dnd" }] },
                { name: "VIP", color: "role-gold", users: [{ name: "Anna Nowak", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Anna", lvl: 45, pr: 0, status: "online" }] },
                { name: "Gracze", color: "", users: [] }
            ],
            messages: [
                { author: "System", av: "https://api.dicebear.com/7.x/bot/svg?seed=Bot", text: "Witaj na 33MC.PL! Napisz coś, by zdobyć XP.", lvl: 99, pr: 1, time: "Wczoraj" }
            ]
        };

        // --- AUTH ---
        document.getElementById('google-login').onclick = () => {
            signInWithPopup(auth, provider).catch(e => alert(e.message));
        };

        document.getElementById('logout-btn').onclick = () => {
            signOut(auth);
            window.location.reload();
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-container').classList.add('active');
                
                const docRef = doc(db, 'users', user.uid);
                const docSnap = await getDoc(docRef);
                let avatarUrl = user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`;
                
                if (!docSnap.exists()) {
                    currentUser = { uid: user.uid, name: user.displayName, avatar: avatarUrl, xp: 0, lvl: 1, pr: 0, status: "online", post: null };
                    await setDoc(docRef, currentUser);
                } else {
                    currentUser = docSnap.data();
                    if(currentUser.xp === undefined) { currentUser.xp = 0; currentUser.lvl = 1; currentUser.pr = 0; }
                }
                
                // My w Mocku
                mockData.serverRoles[2].users.push({ name: currentUser.name, avatar: currentUser.avatar, lvl: currentUser.lvl, pr: currentUser.pr, status: currentUser.status });
                mockData.friends.unshift({ id: "me", name: currentUser.name, avatar: currentUser.avatar, post: currentUser.post, status: currentUser.status });
                
                updateUserUI();
                switchToServer();
            }
        });

        // --- XP SYSTEM ---
        function getReqXp(lvl) { return Math.floor(100 * Math.pow(1.3, lvl - 1)); }

        function updateUserUI() {
            document.getElementById('my-av').src = currentUser.avatar;
            document.getElementById('my-name-val').innerText = currentUser.name;
            const colors = { online: "var(--success-color)", idle: "var(--warning-color)", dnd: "var(--danger-color)" };
            document.getElementById('my-dot').style.background = colors[currentUser.status];
            
            let prStr = currentUser.pr > 0 ? `[P${currentUser.pr}] ` : "";
            document.getElementById('my-lvl-val').innerText = `${prStr}Poziom ${currentUser.lvl}`;
            
            let percent = (currentUser.xp / getReqXp(currentUser.lvl)) * 100;
            document.getElementById('my-xp-bar').style.width = percent + "%";
        }

        async function giveXp() {
            currentUser.xp += XP_PER_MSG;
            let req = getReqXp(currentUser.lvl);
            if(currentUser.xp >= req) {
                currentUser.xp -= req;
                currentUser.lvl++;
                if(currentUser.lvl > 50) {
                    currentUser.lvl = 1; currentUser.pr++;
                    showToast("🏆 OSIĄGNIĘTO NOWY PRESTIŻ!", "var(--prestige-gold)");
                } else {
                    showToast(`🎉 Awans na Poziom ${currentUser.lvl}!`, "var(--brand-color)");
                }
                mockData.serverRoles[2].users[0].lvl = currentUser.lvl;
                mockData.serverRoles[2].users[0].pr = currentUser.pr;
                if(activeView === "server") renderRightPanel();
            }
            updateUserUI();
            await setDoc(doc(db, 'users', currentUser.uid), currentUser);
        }

        function showToast(msg, color) {
            const wrap = document.getElementById('toast-wrap');
            const t = document.createElement('div');
            t.className = 'toast'; t.style.borderLeftColor = color;
            t.innerHTML = `<span>⭐</span> <div>${msg}</div>`;
            wrap.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 4000);
        }

        // --- RENDEROWANIE WIDOKÓW ---
        function switchToServer() {
            activeView = "server";
            document.getElementById('nav-server').classList.add('active');
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('sidebar-label').innerText = "33MC.PL";
            document.getElementById('chat-header-title').innerText = "# strona-prowizja";
            document.getElementById('sidebar-list').innerHTML = `
                <div class="cat-title">Informacje</div>
                <div class="channel-link active"># strona-prowizja</div>
                <div class="channel-link"># lobby</div>
            `;
            renderMessages();
            renderRightPanel();
        }

        function switchToDM() {
            activeView = "home";
            document.getElementById('nav-home').classList.add('active');
            document.getElementById('nav-server').classList.remove('active');
            document.getElementById('sidebar-label').innerText = "Znajomi";
            document.getElementById('chat-header-title').innerText = "Znajomi";
            
            let html = `<div class="cat-title">Prywatne wiadomości</div>`;
            const now = Date.now();
            mockData.friends.forEach(f => {
                let validPost = f.post && (now - f.post.ts < ONE_DAY);
                const ring = validPost ? "ring" : "";
                const onClick = validPost ? `onclick="window.viewPost('${f.id}')"` : "";
                const dot = { online: "var(--success-color)", idle: "var(--warning-color)", dnd: "var(--danger-color)", offline: "gray" }[f.status];
                
                html += `
                    <div class="list-item channel-link">
                        <div class="av-wrap" ${onClick}>
                            <img src="${f.avatar}" class="av-img ${ring}">
                            <div class="stat-dot" style="background:${dot}"></div>
                        </div>
                        <div>${f.id === "me" ? "Ty" : f.name}</div>
                    </div>`;
            });
            document.getElementById('sidebar-list').innerHTML = html;
            document.getElementById('msg-area').innerHTML = `<div style="padding:40px; text-align:center;"><h1 style="color:white">Wybierz znajomego!</h1><p style="color:var(--text-muted)">Lub kliknij w avatar z pomarańczową obwódką.</p></div>`;
            document.getElementById('members-list').innerHTML = "";
        }

        document.getElementById('btn-home-view').onclick = switchToDM;
        document.getElementById('btn-server-view').onclick = switchToServer;

        function renderMessages() {
            let html = "";
            mockData.messages.forEach(m => {
                let pr = m.pr > 0 ? `<span class="badge-prestige">P${m.pr}</span>` : "";
                html += `
                    <div class="msg-item">
                        <img src="${m.av}" class="msg-av">
                        <div class="msg-author-row">
                            <span class="msg-author-name">${m.author} <span class="badge-lvl">Lvl ${m.lvl}</span> ${pr}</span>
                            <span class="msg-time">${m.time}</span>
                        </div>
                        <div class="msg-content">${m.text}</div>
                    </div>`;
            });
            document.getElementById('msg-area').innerHTML = html;
            document.getElementById('msg-area').scrollTop = document.getElementById('msg-area').scrollHeight;
        }

        function renderRightPanel() {
            let html = "";
            mockData.serverRoles.forEach(role => {
                if(role.users.length > 0) {
                    html += `<div class="role-title">${role.name} - ${role.users.length}</div>`;
                    role.users.forEach(u => {
                        html += `
                            <div class="member-card">
                                <div class="av-wrap">
                                    <img src="${u.avatar}" class="av-img">
                                    <div class="stat-dot" style="background:${{online:"var(--success-color)", idle:"var(--warning-color)", dnd:"var(--danger-color)"}[u.status]}"></div>
                                </div>
                                <div>
                                    <h4 class="${role.color}">${u.name}</h4>
                                    <div style="display:flex; gap:4px; margin-top:2px;"><span class="badge-lvl">Lvl ${u.lvl}</span>${u.pr>0?`<span class="badge-prestige">P${u.pr}</span>`:""}</div>
                                </div>
                            </div>`;
                    });
                }
            });
            document.getElementById('members-list').innerHTML = html;
        }

        document.getElementById('msg-input').onkeypress = (e) => {
            if(e.key === "Enter" && e.target.value.trim() !== "") {
                const text = e.target.value.trim();
                mockData.messages.push({ author: currentUser.name, av: currentUser.avatar, text, lvl: currentUser.lvl, pr: currentUser.pr, time: "Dzisiaj o " + new Date().toLocaleTimeString().slice(0,5) });
                e.target.value = "";
                giveXp();
                if(activeView === "server") renderMessages();
            }
        };

        // --- POSTY I MODALE ---
        function openMod(id) { 
            document.getElementById(id).classList.add('active'); 
            if(id==='modal-settings') {
                document.getElementById('edit-nick').value = currentUser.name;
                document.getElementById('edit-stat').value = currentUser.status;
                document.getElementById('prev-av').src = currentUser.avatar;
                tempAvBase64 = currentUser.avatar;
            }
        }
        function closeMod(id) { document.getElementById(id).classList.remove('active'); clearTimeout(postTimer); }

        document.getElementById('add-post-trigger').onclick = () => openMod('modal-post-add');
        document.getElementById('settings-trigger').onclick = () => openMod('modal-settings');
        document.getElementById('open-settings').onclick = () => openMod('modal-settings');
        document.getElementById('close-set').onclick = () => closeMod('modal-settings');
        document.getElementById('close-post-add').onclick = () => closeMod('modal-post-add');
        document.getElementById('close-v-post').onclick = () => closeMod('modal-post-view');

        // Avatar Upload
        document.getElementById('av-upload').onchange = (e) => {
            const f = e.target.files[0];
            if(f) {
                const reader = new FileReader();
                reader.onload = (ev) => { tempAvBase64 = ev.target.result; document.getElementById('prev-av').src = tempAvBase64; };
                reader.readAsDataURL(f);
            }
        };

        document.getElementById('save-prof').onclick = async () => {
            currentUser.name = document.getElementById('edit-nick').value;
            currentUser.status = document.getElementById('edit-stat').value;
            currentUser.avatar = tempAvBase64;
            await setDoc(doc(db, 'users', currentUser.uid), currentUser);
            mockData.friends.find(x => x.id === "me").name = currentUser.name;
            mockData.friends.find(x => x.id === "me").avatar = currentUser.avatar;
            updateUserUI(); closeMod('modal-settings'); showToast("Profil zaktualizowany!", "var(--success-color)");
            if(activeView === "home") switchToDM(); else switchToServer();
        };

        // Post Upload
        document.getElementById('post-img-input').onchange = (e) => {
            const f = e.target.files[0];
            if(f) {
                const r = new FileReader();
                r.onload = (ev) => { tempPostBase64 = ev.target.result; document.getElementById('post-img-prev').src = tempPostBase64; document.getElementById('post-img-prev').style.display='block'; document.getElementById('post-up-text').style.display='none'; };
                r.readAsDataURL(f);
            }
        };

        document.getElementById('publish-btn').onclick = async () => {
            const txt = document.getElementById('post-txt-input').value;
            currentUser.post = { text: txt, img: tempPostBase64, ts: Date.now() };
            await setDoc(doc(db, 'users', currentUser.uid), currentUser);
            mockData.friends.find(x => x.id === "me").post = currentUser.post;
            closeMod('modal-post-add'); switchToDM(); showToast("Post dodany na 24h!", "var(--story-orange)");
            tempPostBase64 = null;
        };

        window.viewPost = (uid) => {
            const f = mockData.friends.find(x => x.id === uid);
            document.getElementById('modal-post-view').classList.add('active');
            document.getElementById('post-v-av').src = f.avatar;
            document.getElementById('post-v-name').innerText = f.id === "me" ? "Twój Post" : f.name;
            document.getElementById('post-v-txt').innerText = f.post.text;
            document.getElementById('post-v-img').src = f.post.img || "";
            document.getElementById('post-v-img').style.display = f.post.img ? 'block' : 'none';
            
            const fill = document.getElementById('post-prog');
            fill.style.transition = "none"; fill.style.width = "0%";
            setTimeout(() => { fill.style.transition = "width 5s linear"; fill.style.width = "100%"; }, 50);
            postTimer = setTimeout(() => closeMod('modal-post-view'), 5000);
        };

        // Call Sound
        const ring = document.getElementById('ringtone');
        document.getElementById('call-start').onclick = () => { ring.play(); alert("Dzwonię do grupy..."); setTimeout(() => ring.pause(), 5000); };
        document.getElementById('video-start').onclick = () => { ring.play(); alert("Rozpoczynam wideo..."); setTimeout(() => ring.pause(), 5000); };

    </script>
</body>
</html>
