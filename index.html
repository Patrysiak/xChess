<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age of Territorial - MMO Google Auth</title>
    <style>
        /* =========================================================
           SEKCJA 1: ZMIENNE CSS
           ========================================================= */
        :root {
            --bg-color: #1a1a2e;
            --panel-bg: #0f3460;
            --primary-btn: #0f3460;
            --primary-hover: #e94560;
            --text-light: #fff;
            --color-blue: #3b82f6;
            --color-red: #ef4444;
            --color-green: #10b981;
            --color-gold: #f59e0b;
        }

        /* =========================================================
           SEKCJA 2: RESET I BAZA
           ========================================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at center, #16213e, #0f3460);
            color: var(--text-light); 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            overflow: hidden;
        }

        /* =========================================================
           SEKCJA 3: EKRANY (SCREENS)
           ========================================================= */
        .screen { 
            display: none; 
            width: 100%; 
            height: 100%;
            text-align: center; 
            flex-direction: column;
        }

        .active { 
            display: flex; 
        }

        #menu-screen {
            justify-content: center;
            align-items: center;
        }

        /* =========================================================
           SEKCJA 4: KONTENER MENU (Z TWOJEGO KODU)
           ========================================================= */
        .menu-container {
            background: rgba(255, 255, 255, 0.05); 
            padding: 40px;
            border-radius: 20px; 
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
        }

        .game-title {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .game-title span { 
            color: var(--primary-hover); 
        }

        .btn {
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px;
            font-size: 16px; 
            font-weight: bold; 
            color: white; 
            border: none;
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.3s;
            background-color: var(--primary-btn);
        }

        .btn:hover { 
            transform: scale(1.05); 
            background-color: var(--primary-hover); 
        }

        .btn:disabled {
            background-color: #333;
            color: #777;
            cursor: not-allowed;
            transform: none;
        }

        .btn-google { 
            background-color: #DB4437; 
        }

        /* =========================================================
           SEKCJA 5: INTERFEJS GRY (HUD)
           ========================================================= */
        #top-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 52, 96, 0.9);
            border-bottom: 2px solid var(--primary-hover);
            padding: 15px 30px;
            z-index: 10;
        }

        .resource-bar {
            display: flex;
            gap: 20px;
        }

        .res-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 20px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .hints {
            font-size: 0.95rem;
            color: #ccc;
            text-align: right;
            line-height: 1.5;
        }

        .hints span {
            color: var(--color-gold);
            font-weight: bold;
        }

        /* =========================================================
           SEKCJA 6: MAPA GRY
           ========================================================= */
        #map-container {
            flex-grow: 1;
            position: relative;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: crosshair;
            overflow: hidden;
        }

        canvas {
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            border: 2px solid var(--primary-hover);
        }

        /* =========================================================
           SEKCJA 7: MODAL WOJSKA I BUDOWY
           ========================================================= */
        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-color);
            border: 2px solid var(--color-blue);
            padding: 30px;
            border-radius: 12px;
            z-index: 100;
            display: none;
            flex-direction: column;
            gap: 20px;
            width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
        }

        .modal h2 {
            text-align: center;
            color: var(--color-blue);
            margin-bottom: 10px;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .slider-values {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.2rem;
        }

        #slider-display {
            color: var(--color-red);
            font-size: 2rem;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: #1e293b;
            outline: none;
            margin: 15px 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: var(--color-blue);
            cursor: pointer;
            transition: 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            color: white;
            transition: 0.2s;
        }

        .btn-confirm {
            background: var(--color-green);
        }

        .btn-cancel {
            background: var(--color-red);
        }

        /* =========================================================
           SEKCJA 8: POWIADOMIENIA
           ========================================================= */
        #toast-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 200;
            pointer-events: none;
        }

        .toast {
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <div class="menu-container">
            <h1 class="game-title">Age of <span>Territorial</span></h1>
            <p>Zalogowano jako: <strong id="player-nick" style="color: var(--color-gold);">Gość</strong></p>
            <p style="margin-bottom: 20px; font-size: 0.9rem; color: #aaa;" id="auth-status">Oczekiwanie na Firebase...</p>
            
            <button id="login-btn" class="btn btn-google" onclick="loginWithGoogle()">G Zaloguj przez Gmail</button>
            <button id="logout-btn" class="btn" style="display:none; background-color: var(--color-red);" onclick="logout()">Wyloguj</button>
            
            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            
            <button id="play-btn" class="btn" onclick="GameEngine.start()" disabled>🌐 Graj Online (Wymaga Logowania)</button>
            <button class="btn" onclick="alert('Ranking w budowie')">🏆 Tabela Rankingowa</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="top-hud">
            <div class="resource-bar">
                <div class="res-item" style="color:var(--color-gold)">
                    🪙 <span id="val-gold">0</span>
                </div>
                <div class="res-item" style="color:#b45309">
                    🪵 <span id="val-wood">0</span>
                </div>
                <div class="res-item" style="color:#94a3b8">
                    🪨 <span id="val-stone">0</span>
                </div>
                <div class="res-item" style="color:var(--color-red)">
                    ⚔️ <span id="val-troops">0</span>
                </div>
            </div>
            <div class="hints">
                <span>[1 Klik]</span> Wybierz prowincję źródłową<br>
                <span>[2 Kliki]</span> Wybierz cel i przesuń wojska<br>
                <span>[Kliknij Wodę]</span> Odznaczenie
            </div>
        </div>

        <div id="map-container">
            <canvas id="gameCanvas" width="1200" height="700"></canvas>
        </div>

        <div id="toast-container"></div>
    </div>

    <div id="troop-modal" class="modal">
        <h2>Przesunięcie Wojsk</h2>
        <div style="text-align:center; color: #ccc;" id="modal-desc">
            Skąd -> Dokąd
        </div>
        <div class="slider-container">
            <div class="slider-values">
                <span>Min: 1</span>
                <span id="slider-display">10</span>
                <span>Max: <span id="slider-max">100</span></span>
            </div>
            <input type="range" id="troop-slider" min="1" max="100" value="10">
        </div>
        <div class="modal-buttons">
            <button class="btn-action btn-cancel" onclick="UIManager.closeModals()">Anuluj</button>
            <button class="btn-action btn-confirm" onclick="InputManager.confirmMove()">Rozkaz!</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVip74fl5K2fnLjlCOBLJfBnq7lxglyoU",
            authDomain: "xchess-79e2d.firebaseapp.com",
            projectId: "xchess-79e2d",
            storageBucket: "xchess-79e2d.firebasestorage.app",
            messagingSenderId: "382071993193",
            appId: "1:382071993193:web:86dbe5211f2151cb5383f8",
            measurementId: "G-E8RJF7LKLE"
        };

        // Inicjalizacja
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getDatabase(app);

        // Udostępnienie dla globalnego silnika gry
        window.FirebaseAPI = {
            db: db,
            auth: auth,
            uid: null,
            displayName: null,
            isConnected: false
        };

        // ==========================================
        // FUNKCJE LOGOWANIA GOOGLE Z TWOJEGO KODU
        // ==========================================
        window.loginWithGoogle = function() {
            document.getElementById('auth-status').innerText = "Trwa logowanie Google...";
            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;
                    console.log("Zalogowano pomyślnie.");
                }).catch((error) => {
                    alert("Błąd logowania: " + error.message);
                    document.getElementById('auth-status').innerText = "Błąd logowania.";
                });
        };

        window.logout = function() {
            signOut(auth).then(() => {
                console.log("Wylogowano pomyślnie.");
                window.FirebaseAPI.uid = null;
                window.FirebaseAPI.isConnected = false;
                document.getElementById('play-btn').disabled = true;
            });
        };

        // Nasłuchiwanie stanu logowania
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Gracz zalogowany przez Google
                document.getElementById('player-nick').innerText = user.displayName;
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'block';
                document.getElementById('auth-status').innerText = "Autoryzacja pomyślna. Gotowy do gry.";
                document.getElementById('auth-status').style.color = "var(--color-green)";
                
                // Odblokuj przycisk gry
                document.getElementById('play-btn').disabled = false;
                
                // Zapisz dane do silnika
                window.FirebaseAPI.uid = user.uid;
                window.FirebaseAPI.displayName = user.displayName;
                window.FirebaseAPI.isConnected = true;
            } else {
                // Gracz wylogowany
                document.getElementById('player-nick').innerText = "Gość";
                document.getElementById('login-btn').style.display = 'block';
                document.getElementById('logout-btn').style.display = 'none';
                document.getElementById('auth-status').innerText = "Zaloguj się, aby połączyć się z serwerem.";
                document.getElementById('auth-status').style.color = "#aaa";
                document.getElementById('play-btn').disabled = true;
            }
        });

        // ==========================================
        // FUNKCJE BAZY DANYCH DLA SILNIKA
        // ==========================================
        window.DB_API = {
            syncMap: function(gridData) {
                if(!window.FirebaseAPI.isConnected) return;
                let mapObj = {};
                for(let y=0; y<gridData.length; y++) {
                    for(let x=0; x<gridData[y].length; x++) {
                        let cell = gridData[y][x];
                        mapObj[`${x}_${y}`] = {
                            owner: cell.owner,
                            troops: cell.troops,
                            isWater: cell.isWater
                        };
                    }
                }
                set(ref(db, 'world/map'), mapObj);
            },
            updateCell: function(x, y, data) {
                if(!window.FirebaseAPI.isConnected) return;
                update(ref(db, `world/map/${x}_${y}`), data);
            },
            listen: function(callback) {
                if(!window.FirebaseAPI.isConnected) return;
                onValue(ref(db, 'world/map'), (snapshot) => {
                    if(snapshot.exists()) {
                        callback(snapshot.val());
                    }
                });
            },
            checkIfExists: function(callback) {
                get(ref(db, 'world/map')).then((snapshot) => {
                    callback(snapshot.exists(), snapshot.val());
                });
            }
        };
    </script>

    <script>
        // BAZA KOLORÓW
        const COLORS = {
            water: '#0ea5e9',
            neutral: '#1e293b',
            players: [
                '#3b82f6', 
                '#ef4444', 
                '#10b981', 
                '#f59e0b', 
                '#8b5cf6', 
                '#ec4899', 
                '#14b8a6', 
                '#f43f5e'
            ]
        };

        // =========================================================
        // KLASA: SYSTEM CZĄSTECZEK (PARTICLES)
        // =========================================================
        class ParticleEngine {
            constructor() {
                this.particles = [];
            }

            createExplosion(x, y, color) {
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 4 + 1;
                    this.particles.push({
                        type: 'spark',
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1.0,
                        decay: Math.random() * 0.05 + 0.02,
                        color: color,
                        size: Math.random() * 4 + 1
                    });
                }
            }

            createText(x, y, text, color) {
                this.particles.push({
                    type: 'text',
                    x: x,
                    y: y,
                    text: text,
                    life: 1.0,
                    color: color,
                    vy: -2.0
                });
            }

            createLaser(sx, sy, tx, ty, color) {
                this.particles.push({
                    type: 'laser',
                    sx: sx,
                    sy: sy,
                    tx: tx,
                    ty: ty,
                    progress: 0,
                    life: 1.0,
                    color: color
                });
            }

            update(ctx) {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];
                    
                    if (p.type === 'laser') {
                        ctx.beginPath();
                        ctx.moveTo(p.sx, p.sy);
                        let cx = p.sx + (p.tx - p.sx) * p.progress;
                        let cy = p.sy + (p.ty - p.sy) * p.progress;
                        ctx.lineTo(cx, cy);
                        ctx.strokeStyle = p.color;
                        ctx.lineWidth = 5 * p.life;
                        ctx.lineCap = "round";
                        ctx.stroke();
                        
                        p.progress += 0.1;
                        p.life -= 0.05;
                        
                        if (p.progress >= 1) {
                            this.createExplosion(p.tx, p.ty, p.color);
                            this.particles.splice(i, 1);
                        }
                    } else if (p.type === 'spark') {
                        ctx.globalAlpha = p.life;
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = 1.0;

                        p.x += p.vx;
                        p.y += p.vy;
                        p.life -= p.decay;
                        
                        if (p.life <= 0) {
                            this.particles.splice(i, 1);
                        }
                    } else if (p.type === 'text') {
                        ctx.globalAlpha = p.life;
                        ctx.fillStyle = p.color;
                        ctx.font = "bold 20px Arial";
                        ctx.textAlign = "center";
                        ctx.strokeStyle = "black";
                        ctx.lineWidth = 3;
                        ctx.strokeText(p.text, p.x, p.y);
                        ctx.fillText(p.text, p.x, p.y);
                        ctx.globalAlpha = 1.0;

                        p.y += p.vy;
                        p.life -= 0.03;

                        if (p.life <= 0) {
                            this.particles.splice(i, 1);
                        }
                    }
                }
            }
        }

        // =========================================================
        // MANAGER UI
        // =========================================================
        const UIManager = {
            updateResources(gold, wood, stone, troops) {
                document.getElementById('val-gold').innerText = Math.floor(gold);
                document.getElementById('val-wood').innerText = Math.floor(wood);
                document.getElementById('val-stone').innerText = Math.floor(stone);
                document.getElementById('val-troops').innerText = Math.floor(troops);
            },

            showToast(msg, type = "info") {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerText = msg;
                
                if(type === "error") {
                    toast.style.borderColor = "var(--color-red)";
                } else if(type === "success") {
                    toast.style.borderColor = "var(--color-green)";
                }
                
                container.appendChild(toast);
                
                setTimeout(() => { 
                    toast.style.opacity = '0'; 
                    setTimeout(() => {
                        toast.remove();
                    }, 300); 
                }, 2500);
            },

            openTroopModal(source, target) {
                const modal = document.getElementById('troop-modal');
                const slider = document.getElementById('troop-slider');
                const display = document.getElementById('slider-display');
                const maxDisplay = document.getElementById('slider-max');

                const maxTroops = Math.max(1, Math.floor(source.troops - 1));
                
                slider.min = 1;
                slider.max = maxTroops;
                slider.value = Math.max(1, Math.floor(maxTroops / 2));
                
                display.innerText = slider.value;
                maxDisplay.innerText = maxTroops;

                slider.oninput = function() { 
                    display.innerText = this.value; 
                };

                document.getElementById('modal-desc').innerText = `Z [${source.x},${source.y}] do [${target.x},${target.y}]`;
                
                modal.style.display = 'flex';
            },

            closeModals() {
                document.getElementById('troop-modal').style.display = 'none';
                InputManager.pendingTarget = null;
            },
            
            switchScreen(screenId) {
                document.querySelectorAll('.screen').forEach(el => {
                    el.classList.remove('active');
                });
                document.getElementById(screenId).classList.add('active');
            }
        };

        // =========================================================
        // MANAGER INPUTU (DOUBLE CLICK)
        // =========================================================
        const InputManager = {
            hoveredProv: null,
            selectedSource: null,
            pendingTarget: null,
            
            lastClickTime: 0,
            lastClickedProv: null,

            bind() {
                const canvas = GameEngine.canvas;
                
                canvas.addEventListener('mousemove', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    
                    const x = Math.floor(((e.clientX - rect.left) * scaleX) / GameEngine.provSize);
                    const y = Math.floor(((e.clientY - rect.top) * scaleY) / GameEngine.provSize);
                    
                    if (x >= 0 && x < GameEngine.cols && y >= 0 && y < GameEngine.rows) {
                        this.hoveredProv = GameEngine.grid[y][x];
                    }
                });

                canvas.addEventListener('mousedown', (e) => {
                    if (!this.hoveredProv || e.button !== 0) {
                        return;
                    }

                    // Jeśli kliknięto wodę, anuluj zaznaczenie
                    if (this.hoveredProv.isWater) {
                        this.selectedSource = null;
                        return;
                    }

                    const now = Date.now();
                    const timeDiff = now - this.lastClickTime;
                    
                    // DOUBLE CLICK
                    if (timeDiff < 400 && this.lastClickedProv === this.hoveredProv) {
                        
                        if (this.selectedSource) {
                            let dist = Math.max(
                                Math.abs(this.selectedSource.x - this.hoveredProv.x), 
                                Math.abs(this.selectedSource.y - this.hoveredProv.y)
                            );
                            
                            if (dist === 1) {
                                if(this.selectedSource.troops > 1) {
                                    this.pendingTarget = this.hoveredProv;
                                    UIManager.openTroopModal(this.selectedSource, this.hoveredProv);
                                } else {
                                    UIManager.showToast("Za mało wojska, aby atakować!", "error");
                                }
                            } else if (dist > 1) {
                                UIManager.showToast("Cel jest zbyt daleko! Atakuj sąsiadów.", "error");
                            }
                        }
                        
                    } else {
                        // SINGLE CLICK
                        if (this.hoveredProv.owner === GameEngine.myPlayerId) {
                            this.selectedSource = this.hoveredProv;
                        } else {
                            this.selectedSource = null;
                        }
                    }

                    this.lastClickTime = now;
                    this.lastClickedProv = this.hoveredProv;
                });
            },

            confirmMove() {
                if(!this.selectedSource || !this.pendingTarget) return;
                
                const sliderVal = parseInt(document.getElementById('troop-slider').value);
                
                GameEngine.executeMove(this.selectedSource, this.pendingTarget, sliderVal);
                
                UIManager.closeModals();
                this.selectedSource = null;
            }
        };

        // =========================================================
        // MANAGER RENDEROWANIA
        // =========================================================
        const Renderer = {
            draw(ctx, canvas, grid, hovered, selected, particles) {
                
                // Czyszczenie tła
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let y = 0; y < GameEngine.rows; y++) {
                    for (let x = 0; x < GameEngine.cols; x++) {
                        
                        let p = grid[y][x];
                        let px = x * GameEngine.provSize;
                        let py = y * GameEngine.provSize;

                        // Kolorowanie terenu
                        if (p.isWater) {
                            ctx.fillStyle = COLORS.water;
                        } else {
                            if (p.owner === 0) {
                                ctx.fillStyle = COLORS.neutral;
                            } else {
                                // Dynamiczny kolor gracza na podstawie UID
                                let sum = 0;
                                for(let i=0; i<p.owner.length; i++) sum += p.owner.charCodeAt(i);
                                let colorIndex = sum % COLORS.players.length;
                                ctx.fillStyle = COLORS.players[colorIndex];
                            }
                        }

                        // Rysowanie kafelka
                        ctx.fillRect(px, py, GameEngine.provSize, GameEngine.provSize);

                        // Siatka
                        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(px, py, GameEngine.provSize, GameEngine.provSize);

                        // Rysowanie liczby jednostek
                        if (!p.isWater && (p.troops > 0 || p.owner !== 0)) {
                            ctx.fillStyle = "white";
                            ctx.font = "bold 15px 'Segoe UI'";
                            ctx.textAlign = "center";
                            ctx.shadowColor = "black";
                            ctx.shadowBlur = 5;
                            ctx.fillText(Math.floor(p.troops), px + GameEngine.provSize/2, py + GameEngine.provSize/2 + 5);
                            ctx.shadowBlur = 0;
                        }

                        // Podświetlenie myszką
                        if (hovered === p && !p.isWater) {
                            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
                            ctx.fillRect(px, py, GameEngine.provSize, GameEngine.provSize);
                        }

                        // Zaznaczenie źródła (Pulsowanie)
                        if (selected === p) {
                            let pulse = Math.abs(Math.sin(Date.now() / 200)) * 2;
                            ctx.strokeStyle = "rgba(250, 204, 21, 0.9)";
                            ctx.lineWidth = 3 + pulse;
                            ctx.strokeRect(px + 2, py + 2, GameEngine.provSize - 4, GameEngine.provSize - 4);
                            ctx.lineWidth = 1;
                        }
                    }
                }

                // Renderowanie cząsteczek na samym wierzchu
                particles.update(ctx);
            }
        };

        // =========================================================
        // GŁÓWNY SILNIK GRY
        // =========================================================
        const GameEngine = {
            canvas: document.getElementById('gameCanvas'),
            ctx: document.getElementById('gameCanvas').getContext('2d'),
            
            cols: 30,
            rows: 17,
            provSize: 40,
            
            grid: [],
            
            myPlayerId: null,
            resources: { 
                gold: 100, 
                wood: 50, 
                stone: 0 
            },
            
            isRunning: false,
            particles: new ParticleEngine(),

            start() {
                if (!window.FirebaseAPI || !window.FirebaseAPI.isConnected) {
                    alert("Zaloguj się najpierw przez Google!");
                    return;
                }

                this.myPlayerId = window.FirebaseAPI.uid;
                
                // Przejście ekranów
                UIManager.switchScreen('game-screen');

                // Pobieranie lub generowanie mapy
                window.DB_API.checkIfExists((exists, data) => {
                    if (exists) {
                        this.parseMapData(data);
                        this.spawnPlayer();
                        UIManager.showToast("Pobrano mapę z serwera!", "success");
                    } else {
                        this.generateLocalMap();
                        this.spawnPlayer();
                        window.DB_API.syncMap(this.grid);
                        UIManager.showToast("Wygenerowano nowy świat.", "success");
                    }

                    this.initializeGameLoop();
                });
            },

            generateLocalMap() {
                this.grid = [];
                for (let y = 0; y < this.rows; y++) {
                    let row = [];
                    for (let x = 0; x < this.cols; x++) {
                        // Tworzenie wody na krawędziach
                        let isEdge = x===0 || y===0 || x===this.cols-1 || y===this.rows-1;
                        let isWater = isEdge || Math.random() < 0.15;
                        
                        row.push({
                            x: x, 
                            y: y,
                            owner: 0,
                            troops: isWater ? 0 : Math.floor(Math.random() * 5),
                            isWater: isWater
                        });
                    }
                    this.grid.push(row);
                }
            },

            parseMapData(firebaseData) {
                this.grid = [];
                for (let y = 0; y < this.rows; y++) {
                    let row = [];
                    for (let x = 0; x < this.cols; x++) {
                        let key = `${x}_${y}`;
                        let cellData = firebaseData[key];
                        row.push({
                            x: x, 
                            y: y,
                            owner: cellData ? cellData.owner : 0,
                            troops: cellData ? cellData.troops : 0,
                            isWater: cellData ? cellData.isWater : false
                        });
                    }
                    this.grid.push(row);
                }
            },

            spawnPlayer() {
                let emptyLands = [];
                for (let y = 0; y < this.rows; y++) {
                    for (let x = 0; x < this.cols; x++) {
                        if (!this.grid[y][x].isWater && this.grid[y][x].owner === 0) {
                            emptyLands.push(this.grid[y][x]);
                        }
                    }
                }

                if (emptyLands.length > 0) {
                    let spawn = emptyLands[Math.floor(Math.random() * emptyLands.length)];
                    spawn.owner = this.myPlayerId;
                    spawn.troops = 100;
                    
                    window.DB_API.updateCell(spawn.x, spawn.y, {
                        owner: this.myPlayerId,
                        troops: 100
                    });
                }
            },

            initializeGameLoop() {
                InputManager.bind();
                
                // Nasłuchiwanie zmian w czasie rzeczywistym
                window.DB_API.listen((data) => {
                    this.parseMapData(data);
                });

                // Pętla przyrostu
                setInterval(() => this.tickEconomy(), 1000);
                
                this.isRunning = true;
                this.loop();
            },

            tickEconomy() {
                let myTotalTroops = 0;
                let hasLand = false;

                for (let y = 0; y < this.rows; y++) {
                    for (let x = 0; x < this.cols; x++) {
                        let p = this.grid[y][x];
                        
                        if (p.owner === this.myPlayerId) {
                            hasLand = true;
                            p.troops += 1;
                            myTotalTroops += p.troops;
                            
                            // Synchronizacja z bazą
                            window.DB_API.updateCell(x, y, { troops: p.troops });
                            
                            // Złoto z podatków
                            this.resources.gold += 1;
                        }
                    }
                }

                if(!hasLand) {
                    UIManager.showToast("Zostałeś pokonany!", "error");
                }

                UIManager.updateResources(
                    this.resources.gold, 
                    this.resources.wood, 
                    this.resources.stone, 
                    myTotalTroops
                );
            },

            executeMove(source, target, amount) {
                
                if(source.owner !== this.myPlayerId) return;
                if(source.troops <= amount) return;

                source.troops -= amount;
                
                // Pozycje do animacji
                let pxS = source.x * this.provSize + this.provSize/2;
                let pyS = source.y * this.provSize + this.provSize/2;
                let pxT = target.x * this.provSize + this.provSize/2;
                let pyT = target.y * this.provSize + this.provSize/2;

                // Ustal kolor gracza
                let sum = 0;
                for(let i=0; i<this.myPlayerId.length; i++) sum += this.myPlayerId.charCodeAt(i);
                let colorIndex = sum % COLORS.players.length;
                let pColor = COLORS.players[colorIndex];

                // Wystrzel animację lasera
                this.particles.createLaser(pxS, pyS, pxT, pyT, pColor);

                // Algorytm walki wywoływany po czasie (gdy laser doleci)
                setTimeout(() => {
                    
                    if (target.owner === this.myPlayerId) {
                        // Wsparcie własnych wojsk
                        target.troops += amount;
                        this.particles.createText(pxT, pyT, `+${amount}`, '#10b981');
                        
                    } else {
                        // Walka z wrogiem
                        if (amount > target.troops) {
                            // Zdobycie
                            target.owner = this.myPlayerId;
                            target.troops = Math.floor(amount - target.troops);
                            UIManager.showToast(`Prowincja podbita!`, "success");
                            this.particles.createText(pxT, pyT, "ZDOBYTE", pColor);
                        } else {
                            // Odbicie ataku
                            target.troops -= amount;
                            UIManager.showToast("Atak został odparty przez wroga.", "error");
                            this.particles.createText(pxT, pyT, `-${amount}`, '#ef4444');
                        }
                    }

                    // Wysłanie wyników do Firebase (Synchronizacja)
                    window.DB_API.updateCell(source.x, source.y, { 
                        troops: source.troops 
                    });
                    
                    window.DB_API.updateCell(target.x, target.y, { 
                        owner: target.owner, 
                        troops: target.troops
                    });

                }, 400); // Czas trwania animacji
            },

            loop() {
                if(!this.isRunning) return;
                
                Renderer.draw(
                    this.ctx, 
                    this.canvas, 
                    this.grid, 
                    InputManager.hoveredProv, 
                    InputManager.selectedSource,
                    this.particles
                );
                
                requestAnimationFrame(() => this.loop());
            }
        };
    </script>
