<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster Web Chess - Vulkan Profile Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc, onSnapshot, getDoc, setDoc, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // TWOJA KONFIGURACJA
        const firebaseConfig = {
            apiKey: "AIzaSyDVip74fl5K2fnLjlCOBLJfBnq7lxglyoU",
            authDomain: "xchess-79e2d.firebaseapp.com",
            projectId: "xchess-79e2d",
            storageBucket: "xchess-79e2d.firebasestorage.app",
            messagingSenderId: "382071993193",
            appId: "1:382071993193:web:86dbe5211f2151cb5383f8",
            measurementId: "G-E8RJF7LKLE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.db = db; 
        window.auth = auth;
        window.currentUserData = null;

        window.loginWithGoogle = function() {
            signInWithPopup(auth, provider).catch((error) => alert("Błąd: " + error.message));
        };
        window.logout = function() { signOut(auth); };

        // Zarządzanie profilem przy logowaniu
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, 'users', user.uid);
                const docSnap = await getDoc(userRef);
                
                if (!docSnap.exists()) {
                    // 1. PIERWSZE LOGOWANIE - Przejście do konfiguracji
                    document.getElementById('nick-input').value = user.displayName;
                    document.getElementById('preview-avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`;
                    showScreen('setup-screen');
                } else {
                    // 2. STARY GRACZ - Wczytanie profilu
                    window.currentUserData = docSnap.data();
                    updateProfileUI();
                }
            } else {
                window.currentUserData = null;
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('profile-section').style.display = 'none';
            }
        });

        // --- TWORZENIE I EDYCJA PROFILU ---
        window.editProfile = function() {
            document.getElementById('nick-input').value = window.currentUserData.displayName;
            document.getElementById('preview-avatar').src = window.currentUserData.avatar;
            showScreen('setup-screen');
        };

        // Podgląd obrazka po wybraniu z dysku
        document.getElementById('avatar-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('preview-avatar').src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        // Zapisywanie profilu i kompresja zdjęcia
        window.saveProfile = async function() {
            if (!auth.currentUser) return;
            const nick = document.getElementById('nick-input').value.trim();
            if (!nick) return alert("Nick nie może być pusty!");

            document.getElementById('setup-btn').innerText = "Zapisywanie...";

            const fileInput = document.getElementById('avatar-upload');
            let finalAvatar = document.getElementById('preview-avatar').src;

            // Jeśli użytkownik dodał nowe zdjęcie, kompresujemy je
            if (fileInput.files && fileInput.files[0]) {
                finalAvatar = await compressImage(fileInput.files[0]);
            }

            const userRef = doc(db, 'users', auth.currentUser.uid);
            const newProfile = {
                uid: auth.currentUser.uid,
                displayName: nick,
                avatar: finalAvatar,
                elo: window.currentUserData ? window.currentUserData.elo : 1000 // Zachowaj ELO przy edycji
            };

            await setDoc(userRef, newProfile);
            window.currentUserData = newProfile;
            updateProfileUI();
            
            document.getElementById('setup-btn').innerText = "Zapisz profil i Graj";
            showScreen('menu-screen');
        };

        // Narzędzie do ucinania i kompresowania grafik (żeby nie zapchać bazy)
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 150; canvas.height = 150; // Idealny rozmiar na miniaturkę
                        const ctx = canvas.getContext('2d');
                        
                        // Centrowanie i wycinanie kwadratu
                        const minSize = Math.min(img.width, img.height);
                        const startX = (img.width - minSize) / 2;
                        const startY = (img.height - minSize) / 2;
                        
                        ctx.drawImage(img, startX, startY, minSize, minSize, 0, 0, 150, 150);
                        resolve(canvas.toDataURL('image/jpeg', 0.8)); // Zapisz jako jakość 80% JPEG
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function updateProfileUI() {
            document.getElementById('profile-img').src = window.currentUserData.avatar;
            document.getElementById('player-nick').innerText = window.currentUserData.displayName;
            document.getElementById('player-elo').innerText = window.currentUserData.elo;
            
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('profile-section').style.display = 'flex';
        }

        // --- ZABEZPIECZONA LOGIKA MULTIPLAYER Z PROFILAMI ---
        window.currentGameId = null;
        window.playerColor = 'w';
        window.gameStatus = 'menu';

        window.findOnlineMatch = async function() {
            if (!auth.currentUser || !window.currentUserData) return alert("Musisz się zalogować!");
            
            showScreen('game-screen');
            document.getElementById('waiting-overlay').style.display = 'flex';
            document.getElementById('status').innerText = "Szukanie przeciwnika...";
            
            // Ustawienie własnego awatara na dole ekranu gry
            document.getElementById('my-avatar').src = window.currentUserData.avatar;
            document.getElementById('my-name').innerText = window.currentUserData.displayName;
            document.getElementById('opponent-avatar').src = "https://api.dicebear.com/7.x/avataaars/svg?seed=Puste";
            document.getElementById('opponent-name').innerText = "Szukanie gracza...";
            
            window.isOnline = true;
            window.gameStatus = 'waiting';
            window.game.reset();
            
            const gamesRef = collection(db, "games");
            const q = query(gamesRef, where("status", "==", "waiting"));
            const querySnapshot = await getDocs(q);

            let gameToJoin = null;
            querySnapshot.forEach((docSnap) => {
                if (docSnap.data().creatorUid !== auth.currentUser.uid) gameToJoin = docSnap;
            });

            if (gameToJoin) {
                const gameData = gameToJoin.data();
                window.currentGameId = gameToJoin.id;
                
                if (gameData.whitePlayer) {
                    window.playerColor = 'b';
                    document.getElementById('opponent-avatar').src = gameData.whiteAvatar;
                    document.getElementById('opponent-name').innerText = gameData.whitePlayer;
                    await updateDoc(doc(db, "games", window.currentGameId), { 
                        status: "playing", blackPlayer: window.currentUserData.displayName, blackAvatar: window.currentUserData.avatar
                    });
                } else {
                    window.playerColor = 'w';
                    document.getElementById('opponent-avatar').src = gameData.blackAvatar;
                    document.getElementById('opponent-name').innerText = gameData.blackPlayer;
                    await updateDoc(doc(db, "games", window.currentGameId), { 
                        status: "playing", whitePlayer: window.currentUserData.displayName, whiteAvatar: window.currentUserData.avatar
                    });
                }
                startBoard(window.playerColor);
                listenToGame();
            } else {
                window.playerColor = Math.random() < 0.5 ? 'w' : 'b';
                const newGameData = { status: "waiting", fen: "start", creatorUid: auth.currentUser.uid };
                
                if (window.playerColor === 'w') {
                    newGameData.whitePlayer = window.currentUserData.displayName;
                    newGameData.whiteAvatar = window.currentUserData.avatar;
                } else {
                    newGameData.blackPlayer = window.currentUserData.displayName;
                    newGameData.blackAvatar = window.currentUserData.avatar;
                }

                const newGame = await addDoc(gamesRef, newGameData);
                window.currentGameId = newGame.id;
                startBoard(window.playerColor);
                listenToGame();
            }
        };

        function listenToGame() {
            onSnapshot(doc(db, "games", window.currentGameId), (docSnap) => {
                if (!docSnap.exists()) return;
                const data = docSnap.data();
                
                if (data.status === 'playing') {
                    window.gameStatus = 'playing';
                    document.getElementById('waiting-overlay').style.display = 'none';
                    
                    if (document.getElementById('opponent-name').innerText === "Szukanie gracza...") {
                        document.getElementById('opponent-avatar').src = window.playerColor === 'w' ? data.blackAvatar : data.whiteAvatar;
                        document.getElementById('opponent-name').innerText = window.playerColor === 'w' ? data.blackPlayer : data.whitePlayer;
                    }
                    
                    window.updateStatusLocal(); 
                    if (data.fen !== window.game.fen() && data.fen !== "start") {
                        window.game.load(data.fen);
                        window.board.position(window.game.fen());
                        window.updateStatusLocal();
                    }
                }
            });
        }

        window.updateGameFen = async function(fenStr) {
            if (window.currentGameId) await updateDoc(doc(db, "games", window.currentGameId), { fen: fenStr });
        };

        // --- TABELA WYNIKÓW ---
        window.loadLeaderboard = async function() {
            showScreen('leaderboard-screen');
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = "<p>Ładowanie rankingu...</p>";
            
            const usersRef = collection(db, "users");
            const q = query(usersRef, orderBy("elo", "desc"), limit(10));
            const snapshot = await getDocs(q);
            
            let html = ""; let rank = 1;
            snapshot.forEach(doc => {
                const d = doc.data();
                html += `
                <div class="list-item">
                    <div style="display:flex; align-items:center;">
                        <strong style="margin-right:15px; color:#ff4500;">#${rank}</strong>
                        <img src="${d.avatar}" style="width:30px; height:30px; object-fit:cover; background:#fff; border-radius:50%; margin-right:10px;">
                        <span>${d.displayName}</span>
                    </div>
                    <strong style="color:#ffd700;">${d.elo} ELO</strong>
                </div>`;
                rank++;
            });
            list.innerHTML = html;
        };
    </script>

    <style>
        /* === MOTYW VULKAN (LAWA) === */
        :root {
            --vulcan-dark: #1a0505;
            --vulcan-red: #8B0000;
            --vulcan-glow: #ff4500;
            --text-light: #fff;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: var(--text-light); display: flex; 
            justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden;
            background: linear-gradient(45deg, #0a0000, #3a0000, #140000);
            background-size: 300% 300%;
            animation: lavaFlow 10s ease infinite;
        }

        @keyframes lavaFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .screen { display: none; width: 100%; max-width: 600px; text-align: center; }
        .active { display: block; }
        
        .menu-container { 
            background: rgba(0, 0, 0, 0.7); padding: 40px; 
            border-radius: 15px; backdrop-filter: blur(10px); 
            border: 1px solid var(--vulcan-red);
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.3);
            margin: 0 auto; 
        }

        .game-title { font-size: 36px; text-transform: uppercase; letter-spacing: 2px; }
        .game-title span { color: var(--vulcan-glow); text-shadow: 0 0 10px var(--vulcan-glow); }

        /* Edycja Profilu (Inputy) */
        .custom-input {
            width: 80%; padding: 12px; margin: 15px auto; display: block;
            border-radius: 8px; border: 1px solid var(--vulcan-red);
            background: rgba(0,0,0,0.5); color: white; font-size: 16px;
            text-align: center; font-weight: bold;
        }
        .custom-input:focus { outline: none; border-color: var(--vulcan-glow); box-shadow: 0 0 10px var(--vulcan-glow); }

        .file-upload-btn {
            background: #440000; border: 1px solid var(--vulcan-red);
            padding: 10px 20px; border-radius: 8px; cursor: pointer; color: white;
            font-weight: bold; display: inline-block; margin-bottom: 20px;
        }

        /* Profil użytkownika w Menu */
        .profile-card {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255, 69, 0, 0.1); padding: 15px;
            border-radius: 10px; margin-bottom: 20px;
            border: 1px solid rgba(255, 69, 0, 0.3);
        }
        .profile-img { width: 60px; height: 60px; object-fit: cover; border-radius: 50%; background: #fff; margin-right: 15px; border: 2px solid var(--vulcan-glow);}

        .btn { 
            display: block; width: 100%; padding: 15px; margin-bottom: 15px; 
            font-size: 16px; font-weight: bold; color: white; border: none; 
            border-radius: 8px; cursor: pointer; transition: all 0.2s; 
            background-color: var(--vulcan-red);
            text-transform: uppercase;
        }
        .btn:hover { 
            transform: scale(1.02); 
            background-color: var(--vulcan-glow); 
            box-shadow: 0 0 20px var(--vulcan-glow);
        }
        .btn-google { background-color: #DB4437; border: 1px solid #ff7b70; }

        /* Tabela Wyników */
        .list-container {
            background: rgba(0,0,0,0.5); padding: 20px; border-radius: 10px;
            text-align: left; max-height: 300px; overflow-y: auto;
            border: 1px solid var(--vulcan-red);
        }
        .list-item {
            display: flex; justify-content: space-between; align-items: center; padding: 10px;
            border-bottom: 1px solid rgba(255,69,0,0.2); transition: 0.3s;
        }

        /* Szachownica i Gracze */
        .match-player {
            display: flex; align-items: center; background: rgba(0,0,0,0.8);
            padding: 10px 20px; border-radius: 8px; margin: 10px auto;
            width: 400px; box-sizing: border-box; border: 1px solid var(--vulcan-red);
        }
        .match-player img { width: 40px; height: 40px; object-fit: cover; background: #fff; border-radius: 50%; margin-right: 15px; }
        .match-player span { font-weight: bold; font-size: 18px; }

        #board-wrapper { position: relative; width: 400px; margin: 0 auto; box-shadow: 0 0 40px rgba(255, 69, 0, 0.4); border-radius: 4px; overflow: hidden; border: 4px solid var(--vulcan-red); }
        #myBoard { width: 400px; }
        
        #waiting-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 5, 5, 0.9); z-index: 10;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: var(--vulcan-glow); font-size: 20px; font-weight: bold; text-align: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(255,69,0,0.2);
            border-top-color: var(--vulcan-glow); border-radius: 50%;
            animation: spin 1s infinite linear; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <div class="menu-container">
            <h1 class="game-title">Vulkan <span>Chess</span></h1>
            
            <div id="login-section">
                <p>Zaloguj się, aby stworzyć profil i wgrać własne zdjęcie!</p>
                <button class="btn btn-google" onclick="window.loginWithGoogle()">G Zaloguj przez Gmail</button>
            </div>

            <div id="profile-section" style="display: none; flex-direction: column;">
                <div class="profile-card">
                    <div style="display:flex; align-items: center;">
                        <img id="profile-img" src="" class="profile-img" alt="Avatar">
                        <div style="text-align: left;">
                            <h3 id="player-nick" style="margin:0;">Gracz</h3>
                            <p style="margin: 5px 0 0 0; color: gold;">🏆 ELO: <span id="player-elo">1000</span></p>
                        </div>
                    </div>
                    <button onclick="window.editProfile()" style="background:transparent; border:none; cursor:pointer; font-size:24px;" title="Edytuj profil">⚙️</button>
                </div>
                
            </div>
            
            <hr style="border-color: rgba(255,69,0,0.3); margin: 20px 0;">
            
            <button class="btn" onclick="startBotMatch()">🤖 Graj z Botem</button>
            <button class="btn" onclick="window.findOnlineMatch()">🔥 Graj Online</button>
            <button class="btn" style="background: #2a0808;" onclick="window.loadLeaderboard()">🏆 Tabela Wyników</button>
            
            <button id="logout-btn" style="background: transparent; border: none; color: #888; cursor: pointer; display: none; margin: 10px auto 0;" onclick="window.logout()">Wyloguj się</button>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <div class="menu-container">
            <h2 style="color: var(--vulcan-glow);">Ustaw swój profil</h2>
            <p>Ten nick i zdjęcie będą widzieć inni gracze podczas partii!</p>

            <div style="margin: 20px 0;">
                <img id="preview-avatar" src="" style="width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 3px solid var(--vulcan-glow); margin-bottom: 10px;">
                <br>
                <label class="file-upload-btn">
                    Zmień zdjęcie
                    <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
                </label>
            </div>

            <input type="text" id="nick-input" placeholder="Wpisz nowy nick..." class="custom-input">

            <button id="setup-btn" class="btn" onclick="window.saveProfile()">Zapisz profil i Graj</button>
            <button class="btn" style="background: transparent; border: 1px solid #555;" onclick="showScreen('menu-screen')">Anuluj</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="match-player" id="opponent-info">
            <img id="opponent-avatar" src="" alt="Przeciwnik">
            <span id="opponent-name">Przeciwnik</span>
        </div>

        <div id="board-wrapper">
            <div id="myBoard"></div>
            <div id="waiting-overlay">
                <div class="spinner"></div>
                Szukanie przeciwnika...
            </div>
        </div>

        <div class="match-player" id="my-info">
            <img id="my-avatar" src="" alt="Ja">
            <span id="my-name">Ja</span>
        </div>

        <p id="status" style="font-weight:bold; color:var(--vulcan-glow); margin-top:15px; font-size:18px;">Ładowanie...</p>
        <button class="btn" onclick="quitGame()" style="width:200px; margin:10px auto; background: #550000;">Opuść grę</button>
    </div>

    <div id="leaderboard-screen" class="screen">
        <div class="menu-container">
            <h2 style="color: var(--vulcan-glow);">🏆 Top 10 Graczy</h2>
            <div class="list-container" id="leaderboard-list">
                </div>
            <button class="btn" onclick="showScreen('menu-screen')" style="margin-top:20px;">Wróć do Menu</button>
        </div>
    </div>

    <script>
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            // Pokaż dyskretne wyloguj tylko w menu
            if(screenId === 'menu-screen' && auth.currentUser) document.getElementById('logout-btn').style.display = 'block';
            else document.getElementById('logout-btn').style.display = 'none';
        }

        window.board = null;
        window.game = new Chess();
        let isPlayingBot = false;

        function onDragStart(source, piece) {
            if (window.game.game_over()) return false;
            if (window.isOnline) {
                if (window.gameStatus !== 'playing') return false;
                if ((window.playerColor === 'w' && piece.search(/^b/) !== -1) ||
                    (window.playerColor === 'b' && piece.search(/^w/) !== -1)) return false;
                if (window.game.turn() !== window.playerColor) return false;
            } else {
                if (piece.search(/^b/) !== -1) return false;
            }
        }

        function onDrop(source, target) {
            let move = window.game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            
            window.updateStatusLocal();
            if (window.isOnline) window.updateGameFen(window.game.fen());
            else if (isPlayingBot) window.setTimeout(makeBotMove, 500);
        }

        function onSnapEnd() { window.board.position(window.game.fen()); }

        window.updateStatusLocal = function() {
            let status = '';
            let moveColor = window.game.turn() === 'b' ? 'Czarne' : 'Białe';
            
            if (window.game.in_checkmate()) status = `Koniec! ${moveColor} mają mata.`;
            else if (window.game.in_draw()) status = 'Remis.';
            else {
                status = `Tura gracza: ${moveColor}`;
                if (window.game.in_check()) status += ' (Szach!)';
            }
            $('#status').html(status);
        };

        function makeBotMove() {
            if (window.game.game_over()) return;
            let possibleMoves = window.game.moves();
            window.game.move(possibleMoves[Math.floor(Math.random() * possibleMoves.length)]);
            window.board.position(window.game.fen());
            window.updateStatusLocal();
        }

        window.startBoard = function(orientation) {
            let config = {
                draggable: true, position: window.game.fen(), orientation: orientation === 'b' ? 'black' : 'white',
                onDragStart: onDragStart, onDrop: onDrop, onSnapEnd: onSnapEnd,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            };
            if(window.board) window.board.destroy(); 
            window.board = Chessboard('myBoard', config);
            window.updateStatusLocal();
        };

        function startBotMatch() {
            window.isOnline = false;
            isPlayingBot = true;
            window.playerColor = 'w';
            window.gameStatus = 'playing';
            window.game.reset();
            
            document.getElementById('waiting-overlay').style.display = 'none';
            document.getElementById('opponent-name').innerText = "Stockfish Bot";
            document.getElementById('opponent-avatar').src = "https://api.dicebear.com/7.x/bottts/svg?seed=Stockfish";
            
            if(window.currentUserData) {
                document.getElementById('my-name').innerText = window.currentUserData.displayName;
                document.getElementById('my-avatar').src = window.currentUserData.avatar;
            } else {
                document.getElementById('my-name').innerText = "Gość";
                document.getElementById('my-avatar').src = "https://api.dicebear.com/7.x/avataaars/svg?seed=Gosc";
            }

            window.startBoard('w');
            showScreen('game-screen');
        }

        function quitGame() {
            window.currentGameId = null;
            window.isOnline = false;
            isPlayingBot = false;
            window.gameStatus = 'menu';
            showScreen('menu-screen');
        }
    </script>
</body>
</html>
