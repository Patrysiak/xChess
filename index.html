<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Territorial - Procedural Edition</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        #hud { display: flex; gap: 30px; background: #222; padding: 15px 40px; border-radius: 0 0 15px 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .stat { font-size: 18px; font-weight: bold; }
        .val { font-size: 22px; margin-left: 10px; }
        .p1-color { color: #3498db; }
        .p2-color { color: #e74c3c; }

        canvas { background: #051923; border: 2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.8); cursor: crosshair; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat p1-color">Ty (Niebieski) | Siła: <span id="p1-power" class="val">10</span> | Teren: <span id="p1-area" class="val">1</span></div>
        <div class="stat p2-color">Bot (Czerwony) | Siła: <span id="p2-power" class="val">10</span> | Teren: <span id="p2-area" class="val">1</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // USTAWIENIA GRY
        const P_SIZE = 8; // Rozmiar "piksela" - im mniejszy, tym dokładniejsza mapa
        const cols = Math.floor(canvas.width / P_SIZE);
        const rows = Math.floor(canvas.height / P_SIZE);
        
        let grid = [];
        
        const players = {
            1: { color: "#3498db", power: 50, area: 1, lastTick: Date.now() },
            2: { color: "#e74c3c", power: 50, area: 1, lastTick: Date.now() }
        };

        // 1. PROCEDURALNA GENERACJA MAPY (Cellular Automata)
        function generateMap() {
            // Krok 1: Losowy szum (45% szans na ląd)
            let tempGrid = [];
            for (let y = 0; y < rows; y++) {
                let row = [];
                for (let x = 0; x < cols; x++) {
                    row.push(Math.random() > 0.55 ? 1 : 0); // 1 = ląd, 0 = woda
                }
                tempGrid.push(row);
            }

            // Krok 2: Wygładzanie (algorytm Automatu Komórkowego)
            // Powtarzamy 5 razy, aby stworzyć ładne, gładkie wyspy
            for (let step = 0; step < 5; step++) {
                let newGrid = [];
                for (let y = 0; y < rows; y++) {
                    let newRow = [];
                    for (let x = 0; x < cols; x++) {
                        let neighbors = countNeighbors(tempGrid, x, y);
                        // Jeśli wokół jest dużo lądu, stań się lądem. W przeciwnym razie woda.
                        if (neighbors > 4) newRow.push(1);
                        else if (neighbors < 4) newRow.push(0);
                        else newRow.push(tempGrid[y][x]);
                    }
                    newGrid.push(newRow);
                }
                tempGrid = newGrid;
            }

            // Krok 3: Konwersja na obiekty gry
            grid = [];
            for (let y = 0; y < rows; y++) {
                let row = [];
                for (let x = 0; x < cols; x++) {
                    row.push({
                        isLand: tempGrid[y][x] === 1,
                        owner: null
                    });
                }
                grid.push(row);
            }
        }

        function countNeighbors(map, x, y) {
            let count = 0;
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    if (dx === 0 && dy === 0) continue;
                    let nx = x + dx, ny = y + dy;
                    if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                        count += map[ny][nx];
                    }
                }
            }
            return count;
        }

        // 2. SPAWNOWANIE GRACZY
        function spawnPlayers() {
            function getRandomLand() {
                let x, y;
                do {
                    x = Math.floor(Math.random() * cols);
                    y = Math.floor(Math.random() * rows);
                } while (!grid[y][x].isLand || grid[y][x].owner !== null);
                return {x, y};
            }

            let p1 = getRandomLand();
            grid[p1.y][p1.x].owner = 1;

            let p2 = getRandomLand();
            grid[p2.y][p2.x].owner = 2;
        }

        // 3. MECHANIKA ROZROSTU I SIŁY
        function updatePower() {
            let now = Date.now();
            [1, 2].forEach(id => {
                let p = players[id];
                // Zyskujesz siłę bazując na swoim terytorium (np. 1 punkt za każde 2 piksele co sekundę)
                if (now - p.lastTick > 1000) {
                    p.power += Math.max(1, Math.floor(p.area / 2));
                    p.lastTick = now;
                }
            });
            
            document.getElementById('p1-power').innerText = players[1].power;
            document.getElementById('p1-area').innerText = players[1].area;
            document.getElementById('p2-power').innerText = players[2].power;
            document.getElementById('p2-area').innerText = players[2].area;
        }

        function canClaim(x, y, ownerId) {
            if (!grid[y][x].isLand || grid[y][x].owner !== null) return false;
            // Sprawdza czy sąsiaduje z Twoim
            const neighbors = [[-1,0], [1,0], [0,-1], [0,1]];
            return neighbors.some(([dx, dy]) => {
                let nx = x + dx, ny = y + dy;
                return nx >= 0 && nx < cols && ny >= 0 && ny < rows && grid[ny][nx].owner === ownerId;
            });
        }

        // Ekspansja gracza (kosztuje siłę!)
        let isDragging = false;
        canvas.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        
        canvas.addEventListener('mousemove', (e) => { if(isDragging) attemptClaim(e); });
        canvas.addEventListener('click', (e) => attemptClaim(e));

        function attemptClaim(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / P_SIZE);
            const y = Math.floor((e.clientY - rect.top) / P_SIZE);

            if (x >= 0 && x < cols && y >= 0 && y < rows) {
                // Jeśli masz min. 1 punkt siły i klikasz obok swojego terenu
                if (players[1].power > 0 && canClaim(x, y, 1)) {
                    grid[y][x].owner = 1;
                    players[1].area++;
                    players[1].power--; // Koszt zajęcia terenu
                }
            }
        }

        // 4. INTELIGENTNY BOT
        function botAI() {
            if (players[2].power <= 0) return; // Czeka aż zbierze siły

            let possibleMoves = [];
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    if (canClaim(x, y, 2)) {
                        possibleMoves.push({x, y});
                    }
                }
            }

            // Bot atakuje naraz tyle pól, na ile go stać, ale maksymalnie 5 na tick
            let attacks = Math.min(possibleMoves.length, players[2].power, 5);
            
            for(let i = 0; i < attacks; i++) {
                let idx = Math.floor(Math.random() * possibleMoves.length);
                let move = possibleMoves[idx];
                grid[move.y][move.x].owner = 2;
                players[2].area++;
                players[2].power--;
                possibleMoves.splice(idx, 1);
            }
        }

        // 5. RYSOWANIE
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    let cell = grid[y][x];
                    
                    if (cell.isLand) {
                        if (cell.owner === 1) ctx.fillStyle = players[1].color;
                        else if (cell.owner === 2) ctx.fillStyle = players[2].color;
                        else ctx.fillStyle = "#2c3e50"; // Zwykły ląd
                    } else {
                        ctx.fillStyle = "#051923"; // Woda
                    }
                    
                    ctx.fillRect(x * P_SIZE, y * P_SIZE, P_SIZE, P_SIZE);
                }
            }
        }

        // GŁÓWNA PĘTLA GRY
        function gameLoop() {
            updatePower();
            botAI();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // START
        generateMap();
        spawnPlayers();
        gameLoop();

    </script>
</body>
</html>
