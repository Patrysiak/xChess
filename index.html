<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Territorial Clone</title>
<style>
    :root {
        --c-water: rgb(24, 76, 116);
        --c-land: rgb(65, 125, 45);
        --c-land-dark: rgb(45, 95, 25);
        --c-border: rgb(0, 0, 0);
        --c-text: rgb(255, 255, 255);
        --c-panel: rgb(20, 20, 20);
        --c-btn-green: rgb(21, 88, 35);
        --c-btn-blue: rgb(34, 102, 153);
        --c-btn-red: rgb(153, 34, 34);
        --c-btn-brown: rgb(90, 50, 20);
        --c-btn-gray: rgb(70, 70, 70);
    }
    
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        user-select: none;
        font-family: Arial, Helvetica, sans-serif;
    }
    
    body {
        background-color: var(--c-water);
        color: var(--c-text);
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }
    
    .bg-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }
    
    .screen-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.3);
    }
    
    .screen-active {
        display: flex;
    }
    
    .main-logo {
        font-size: 5rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: rgb(255, 255, 255);
        text-shadow: 2px 2px 0 rgb(0,0,0), -2px -2px 0 rgb(0,0,0), 2px -2px 0 rgb(0,0,0), -2px 2px 0 rgb(0,0,0), 5px 5px 15px rgba(0,0,0,0.8);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .logo-flag {
        width: 40px;
        height: 30px;
        background: linear-gradient(to bottom, rgb(255,0,0) 33%, rgb(0,255,0) 33%, rgb(0,255,0) 66%, rgb(0,0,255) 66%);
        border: 2px solid rgb(255,255,255);
    }
    
    .menu-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 450px;
    }
    
    .player-setup {
        display: flex;
        width: 100%;
        gap: 10px;
        margin-bottom: 20px;
    }
    
    .player-name-input {
        flex-grow: 1;
        background: var(--c-panel);
        border: 2px solid rgb(255, 255, 255);
        color: rgb(255, 255, 255);
        font-size: 1.5rem;
        padding: 10px;
        text-align: center;
        outline: none;
    }
    
    .player-color-box {
        width: 60px;
        background: rgb(100, 150, 255);
        border: 2px solid rgb(255, 255, 255);
        cursor: pointer;
    }
    
    .menu-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        width: 100%;
    }
    
    .menu-btn {
        background: var(--c-panel);
        border: 2px solid rgb(255, 255, 255);
        color: rgb(255, 255, 255);
        padding: 20px 10px;
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: 0.2s;
    }
    
    .menu-btn:hover {
        filter: brightness(1.2);
    }
    
    .btn-multi { background: var(--c-btn-green); }
    .btn-custom { background: var(--c-btn-blue); }
    .btn-account { background: var(--c-btn-brown); }
    .btn-menu { background: var(--c-btn-gray); }
    
    .bottom-bar {
        position: absolute;
        bottom: 10px;
        left: 10px;
        display: flex;
        gap: 10px;
    }
    
    .bottom-box {
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid rgb(255, 255, 255);
        padding: 10px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 150px;
    }
    
    .box-label {
        font-size: 0.8rem;
        color: rgb(200, 200, 200);
        margin-bottom: 5px;
    }
    
    .box-value {
        font-size: 1.2rem;
        font-weight: bold;
        color: rgb(255, 255, 255);
    }
    
    .game-ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 20;
        pointer-events: none;
        display: none;
        flex-direction: column;
        justify-content: space-between;
    }
    
    .game-top-bar {
        background: rgba(0, 0, 0, 0.6);
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        pointer-events: auto;
    }
    
    .game-bottom-bar {
        background: rgba(0, 0, 0, 0.6);
        padding: 20px;
        display: flex;
        justify-content: center;
        gap: 20px;
        pointer-events: auto;
    }
    
    .slider-container {
        display: flex;
        align-items: center;
        gap: 15px;
        background: rgba(0, 0, 0, 0.8);
        padding: 10px 20px;
        border: 2px solid rgb(255, 255, 255);
        border-radius: 30px;
    }
    
    .slider-val {
        font-size: 1.5rem;
        font-weight: bold;
        color: rgb(255, 255, 255);
        width: 80px;
        text-align: center;
    }
    
    input[type="range"] {
        -webkit-appearance: none;
        width: 300px;
        height: 15px;
        background: rgb(50, 50, 50);
        border-radius: 10px;
        outline: none;
    }
    
    input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: rgb(255, 255, 255);
        cursor: pointer;
    }
    
    .status-text {
        font-size: 1.2rem;
        color: rgb(255, 255, 255);
        font-weight: bold;
    }
    
    .modal-box {
        background: var(--c-panel);
        border: 2px solid rgb(255, 255, 255);
        padding: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        width: 400px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    
    .generic-btn {
        background: rgb(50, 50, 50);
        color: rgb(255, 255, 255);
        border: 1px solid rgb(255, 255, 255);
        padding: 10px 20px;
        cursor: pointer;
        width: 100%;
        font-size: 1.1rem;
    }
    
    .generic-btn:hover {
        background: rgb(80, 80, 80);
    }
    
    .toast-wrap {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 100;
        pointer-events: none;
    }
    
    .toast-msg {
        background: rgba(0, 0, 0, 0.8);
        color: rgb(255, 255, 255);
        padding: 15px 25px;
        border: 1px solid rgb(255, 255, 255);
        font-weight: bold;
        animation: fade 3s forwards;
    }
    
    @keyframes fade {
        0% { opacity: 1; }
        70% { opacity: 1; }
        100% { opacity: 0; }
    }
    
    .leaderboard {
        position: absolute;
        top: 60px;
        right: 20px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgb(100, 100, 100);
        padding: 10px;
        width: 250px;
        pointer-events: auto;
    }
    
    .lb-title {
        color: rgb(255, 255, 255);
        font-weight: bold;
        text-align: center;
        border-bottom: 1px solid rgb(100, 100, 100);
        padding-bottom: 5px;
        margin-bottom: 5px;
    }
    
    .lb-row {
        display: flex;
        justify-content: space-between;
        color: rgb(200, 200, 200);
        padding: 3px 0;
        font-size: 0.9rem;
    }
</style>
</head>
<body>

<canvas class="bg-canvas class-bg-canvas"></canvas>

<div class="screen-layer screen-active class-screen-main">
    <div class="main-logo">
        <div class="logo-flag"></div>
        TERRITORIAL.IO
        <div class="logo-flag"></div>
    </div>
    
    <div class="menu-container">
        <div class="player-setup">
            <input type="text" class="player-name-input class-player-name" value="Player 373" maxlength="15">

        <div class="menu-grid">

        <div class="bottom-box">
            <div class="box-label">Najlepszy Czlonek</div>
            <div class="box-value">[OG] mel</div>
        </div>
    </div>
</div>

<div class="screen-layer class-screen-lobby">
    <div class="modal-box">
        <h2 style="color: rgb(255, 255, 255);">Konfiguracja Gry</h2>
        <div style="width: 100%; display: flex; justify-content: space-between; color: rgb(255, 255, 255);">
            <span>Ilosc Botow:</span>
            <span class="class-bot-val">50</span>
        </div>
        <input type="range" class="class-bot-slider" min="0" max="200" value="50">
        
        <div style="width: 100%; display: flex; justify-content: space-between; color: rgb(255, 255, 255);">

</div>

<div class="game-ui-layer class-game-ui">

        <div class="status-text class-game-status">Zaczynamy...</div>

    <div class="leaderboard">
        <div class="lb-title">Ranking (Terytorium)</div>

    <div class="game-bottom-bar">

<script>
    window.UI = {
        show: function(cls) {
            let scrs = document.getElementsByClassName('screen-layer');
            for(let i=0; i<scrs.length; i++) {
                scrs[i].classList.remove('screen-active');
            }
            if(cls) {
                document.getElementsByClassName(cls)[0].classList.add('screen-active');
            }
        },
        toast: function(msg, isErr) {
            let w = document.getElementsByClassName('class-toast-wrap')[0];
            let d = document.createElement('div');
            d.className = 'toast-msg';
            d.innerText = msg;
            if(isErr) d.style.borderColor = 'rgb(255, 0, 0)';
            else d.style.borderColor = 'rgb(0, 255, 0)';
            w.appendChild(d);
            setTimeout(function(){ if(d.parentNode) d.remove(); }, 3000);
        }
    };

    let GamePallete = [
        'rgb(255, 0, 0)', 'rgb(0, 255, 0)', 'rgb(0, 0, 255)', 
        'rgb(255, 255, 0)', 'rgb(0, 255, 255)', 'rgb(255, 0, 255)',
        'rgb(255, 128, 0)', 'rgb(128, 0, 255)', 'rgb(0, 255, 128)',
        'rgb(128, 255, 0)', 'rgb(255, 0, 128)', 'rgb(0, 128, 255)'
    ];

    let Engine = {
        cvs: document.getElementsByClassName('class-bg-canvas')[0],
        ctx: null,
        w: 0,
        h: 0,
        sz: 15,
        cols: 0,
        rows: 0,
        grid: [],
        run: true,
        inGame: false,
        
        myId: 1,
        myColor: 'rgb(100, 150, 255)',
        atkPerc: 50,
        
        players: {},
        
        init: function() {
            this.ctx = this.cvs.getContext('2d');
            this.resize();
            window.addEventListener('resize', function() { Engine.resize(); });
            this.genMap(2);
            this.loop();
            this.bindMenu();
        },
        
        resize: function() {
            this.w = window.innerWidth;
            this.h = window.innerHeight;
            this.cvs.width = this.w;
            this.cvs.height = this.h;
            this.cols = Math.floor(this.w / this.sz);
            this.rows = Math.floor(this.h / this.sz);
        },
        
        genMap: function(density) {
            this.grid = [];
            let prob = 0.4;
            if(density === 1) prob = 0.3;
            if(density === 3) prob = 0.5;
            
            for(let y=0; y<this.rows; y++) {
                let r = [];
                for(let x=0; x<this.cols; x++) {
                    let isL = Math.random() < prob ? 1 : 0;
                    if(x<2 || y<2 || x>this.cols-3 || y>this.rows-3) isL = 0;
                    r.push(isL);
                }
                this.grid.push(r);
            }
            
            for(let i=0; i<4; i++) {
                let nG = [];
                for(let y=0; y<this.rows; y++) {
                    let nR = [];
                    for(let x=0; x<this.cols; x++) {
                        let nC = 0;
                        for(let dy=-1; dy<=1; dy++) {
                            for(let dx=-1; dx<=1; dx++) {
                                let nx = x+dx, ny = y+dy;
                                if(nx>=0 && nx<this.cols && ny>=0 && ny<this.rows) {
                                    nC += this.grid[ny][nx] > 0 ? 1 : 0;
                                }
                            }
                        }
                        if(this.grid[y][x] > 0) {
                            nR.push(nC >= 4 ? 1 : 0);
                        } else {
                            nR.push(nC >= 5 ? 1 : 0);
                        }
                    }
                    nG.push(nR);
                }
                this.grid = nG;
            }
            
            for(let y=0; y<this.rows; y++) {
                for(let x=0; x<this.cols; x++) {
                    if(this.grid[y][x] === 1) {
                        this.grid[y][x] = { type: 1, own: 0, val: 0 };
                    } else {
                        this.grid[y][x] = { type: 0, own: 0, val: 0 };
                    }
                }
            }
        },
        
        bindMenu: function() {
            let self = this;
            document.getElementsByClassName('class-btn-multi')[0].addEventListener('click', function() {
                if(!window.Net.online) {
                    window.UI.toast("Zaloguj sie najpierw (Konto)", true);
                    return;
                }
                window.UI.show('class-screen-lobby');
            });
            
            document.getElementsByClassName('class-btn-custom')[0].addEventListener('click', function() {
                window.UI.show('class-screen-lobby');
            });
            
            document.getElementsByClassName('class-btn-account')[0].addEventListener('click', function() {
                window.Net.logG();
            });
            
            document.getElementsByClassName('class-player-color')[0].addEventListener('click', function() {
                let c = GamePallete[Math.floor(Math.random()*GamePallete.length)];
                this.style.background = c;
                self.myColor = c;
            });
            
            document.getElementsByClassName('class-player-name')[0].addEventListener('input', function() {
                window.Net.name = this.value;
            });
            
            let sBot = document.getElementsByClassName('class-bot-slider')[0];
            let vBot = document.getElementsByClassName('class-bot-val')[0];
            sBot.addEventListener('input', function() { vBot.innerText = this.value; });
            
            let sMap = document.getElementsByClassName('class-map-slider')[0];
            let vMap = document.getElementsByClassName('class-map-val')[0];
            sMap.addEventListener('input', function() {
                let val = parseInt(this.value);
                if(val===1) vMap.innerText = "Mala";
                if(val===2) vMap.innerText = "Srednia";
                if(val===3) vMap.innerText = "Duza";
            });
            
            document.getElementsByClassName('class-btn-back-main')[0].addEventListener('click', function() {
                window.UI.show('class-screen-main');
            });
            
            document.getElementsByClassName('class-btn-start-game')[0].addEventListener('click', function() {
                self.startGame(parseInt(sBot.value), parseInt(sMap.value));
            });
            
            document.getElementsByClassName('class-atk-slider')[0].addEventListener('input', function() {
                self.atkPerc = parseInt(this.value);
                document.getElementsByClassName('class-atk-val')[0].innerText = self.atkPerc + "%";
            });
            
            document.getElementsByClassName('class-btn-quit')[0].addEventListener('click', function() {
                self.inGame = false;
                document.getElementsByClassName('class-game-ui')[0].style.display = 'none';
                window.UI.show('class-screen-main');
                self.genMap(2);
            });
            
            this.cvs.addEventListener('mousedown', function(e) {
                if(!self.inGame) return;
                let x = Math.floor(e.clientX / self.sz);
                let y = Math.floor(e.clientY / self.sz);
                self.doClick(x, y);
            });
        },
        
        startGame: function(bots, den) {
            window.UI.show(null);
            document.getElementsByClassName('class-game-ui')[0].style.display = 'flex';
            this.genMap(den);
            
            this.players = {};
            this.players[this.myId] = { id: this.myId, name: window.Net.name, col: this.myColor, bal: 100, inc: 1, cells: 0, dead: false, isBot: false };
            
            for(let i=0; i<bots; i++) {
                let bid = i+10;
                let bcol = GamePallete[i % GamePallete.length];
                this.players[bid] = { id: bid, name: "Bot " + (i+1), col: bcol, bal: 100, inc: 1, cells: 0, dead: false, isBot: true };
            }
            
            let lands = [];
            for(let y=0; y<this.rows; y++) {
                for(let x=0; x<this.cols; x++) {
                    if(this.grid[y][x].type === 1) lands.push({x:x, y:y});
                }
            }
            
            for(let k in this.players) {
                if(lands.length > 0) {
                    let ri = Math.floor(Math.random()*lands.length);
                    let pos = lands[ri];
                    this.grid[pos.y][pos.x].own = parseInt(k);
                    this.grid[pos.y][pos.x].val = 100;
                    this.players[k].cells = 1;
                    lands.splice(ri, 1);
                }
            }
            
            this.inGame = true;
            this.ecoTimer = setInterval(function(){ Engine.tick(); }, 1000);
            this.botTimer = setInterval(function(){ Engine.botStep(); }, 500);
        },
        
        tick: function() {
            if(!this.inGame) {
                clearInterval(this.ecoTimer);
                clearInterval(this.botTimer);
                return;
            }
            
            let lb = [];
            for(let k in this.players) {
                let p = this.players[k];
                if(p.dead) continue;
                
                let cCount = 0;
                for(let y=0; y<this.rows; y++) {
                    for(let x=0; x<this.cols; x++) {
                        if(this.grid[y][x].own === p.id) {
                            cCount++;
                        }
                    }
                }
                p.cells = cCount;
                if(cCount === 0) {
                    p.dead = true;
                    if(p.id === this.myId) {
                        window.UI.toast("Zostales zniszczony!", true);
                    }
                    continue;
                }
                
                let inc = Math.max(1, Math.floor(p.cells / 5));
                p.inc = inc;
                p.bal += inc;
                
                lb.push(p);
            }
            
            lb.sort(function(a,b){ return b.cells - a.cells; });
            let lbHtml = '';
            for(let i=0; i<Math.min(10, lb.length); i++) {
                let op = lb[i];
                let bold = op.id === this.myId ? 'font-weight:900;color:rgb(255,255,255);' : '';
                lbHtml += '<div class="lb-row" style="'+bold+'"><span>'+(i+1)+'. '+op.name+'</span><span>'+op.cells+'</span></div>';
            }
            document.getElementsByClassName('class-lb-content')[0].innerHTML = lbHtml;
            
            if(!this.players[this.myId].dead) {
                document.getElementsByClassName('class-balance-val')[0].innerText = Math.floor(this.players[this.myId].bal);
                document.getElementsByClassName('class-income-val')[0].innerText = this.players[this.myId].inc;
            }
        },
        
        botStep: function() {
            if(!this.inGame) return;
            for(let k in this.players) {
                let p = this.players[k];
                if(!p.isBot || p.dead) continue;
                
                if(p.bal > 50) {
                    let edge = [];
                    for(let y=0; y<this.rows; y++) {
                        for(let x=0; x<this.cols; x++) {
                            if(this.grid[y][x].own === p.id) {
                                for(let dy=-1; dy<=1; dy++) {
                                    for(let dx=-1; dx<=1; dx++) {
                                        if(dx===0 && dy===0) continue;
                                        let nx = x+dx, ny = y+dy;
                                        if(nx>=0 && nx<this.cols && ny>=0 && ny<this.rows) {
                                            if(this.grid[ny][nx].type === 1 && this.grid[ny][nx].own !== p.id) {
                                                edge.push({x:nx, y:ny});
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                    
                    if(edge.length > 0) {
                        let t = edge[Math.floor(Math.random()*edge.length)];
                        let c = this.grid[t.y][t.x];
                        let cost = 10;
                        if(c.own !== 0) {
                            let ep = this.players[c.own];
                            cost = 20; 
                            if(ep) cost += Math.floor(ep.bal * 0.1); 
                        }
                        
                        let atk = p.bal * 0.5;
                        if(atk > cost) {
                            p.bal -= atk;
                            if(c.own !== 0) {
                                let ep = this.players[c.own];
                                if(ep && ep.bal > 0) {
                                    ep.bal -= atk * 0.5;
                                    if(ep.bal < 0) ep.bal = 0;
                                }
                            }
                            c.own = p.id;
                        }
                    }
                }
            }
        },
        
        doClick: function(x, y) {
            if(x<0 || x>=this.cols || y<0 || y>=this.rows) return;
            let c = this.grid[y][x];
            if(c.type === 0) return;
            
            let mp = this.players[this.myId];
            if(mp.dead) return;
            
            let isAdj = false;
            for(let dy=-1; dy<=1; dy++) {
                for(let dx=-1; dx<=1; dx++) {
                    let nx = x+dx, ny = y+dy;
                    if(nx>=0 && nx<this.cols && ny>=0 && ny<this.rows) {
                        if(this.grid[ny][nx].own === this.myId) isAdj = true;
                    }
                }
            }
            
            if(!isAdj && c.own !== this.myId) return;
            
            if(c.own !== this.myId) {
                let cost = 10;
                if(c.own !== 0) {
                    let ep = this.players[c.own];
                    if(ep) cost += Math.floor(ep.bal * 0.1);
                }
                
                let atk = mp.bal * (this.atkPerc / 100);
                if(atk >= cost) {
                    mp.bal -= atk;
                    if(c.own !== 0) {
                        let ep = this.players[c.own];
                        if(ep) {
                            ep.bal -= atk * 0.5;
                            if(ep.bal < 0) ep.bal = 0;
                        }
                    }
                    c.own = this.myId;
                } else {
                    window.UI.toast("Za malo sil na atak!", true);
                }
            }
            
            document.getElementsByClassName('class-balance-val')[0].innerText = Math.floor(mp.bal);
        },
        
        draw: function() {
            this.ctx.fillStyle = 'rgb(24, 76, 116)';
            this.ctx.fillRect(0, 0, this.w, this.h);
            
            for(let y=0; y<this.rows; y++) {
                for(let x=0; x<this.cols; x++) {
                    let c = this.grid[y][x];
                    let px = x * this.sz;
                    let py = y * this.sz;
                    
                    if(c.type === 1) {
                        if(c.own === 0) {
                            this.ctx.fillStyle = 'rgb(65, 125, 45)';
                        } else {
                            let p = this.players[c.own];
                            if(p) {
                                this.ctx.fillStyle = p.col;
                            } else {
                                this.ctx.fillStyle = 'rgb(255,255,255)';
                            }
                        }
                        this.ctx.fillRect(px, py, this.sz, this.sz);
                    }
                }
            }
        },
        
        loop: function() {
            if(this.run) {
                this.draw();
                let sR = this;
                requestAnimationFrame(function(){ sR.loop(); });
            }
        }
    };

    window.onload = function() {
        Engine.init();
    };

</script>
</body>
</html>
