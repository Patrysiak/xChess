<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster Web Chess - Online Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        // Importy nowej bazy danych Firestore
        import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Twoja konfiguracja
        const firebaseConfig = {
            apiKey: "AIzaSyDVip74fl5K2fnLjlCOBLJfBnq7lxglyoU",
            authDomain: "xchess-79e2d.firebaseapp.com",
            projectId: "xchess-79e2d",
            storageBucket: "xchess-79e2d.firebasestorage.app",
            messagingSenderId: "382071993193",
            appId: "1:382071993193:web:86dbe5211f2151cb5383f8",
            measurementId: "G-E8RJF7LKLE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.db = db; // Globalny dostęp dla reszty skryptu
        window.auth = auth;

        // Logowanie
        window.loginWithGoogle = function() {
            signInWithPopup(auth, provider).catch((error) => alert("Błąd: " + error.message));
        };
        window.logout = function() { signOut(auth); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('player-nick').innerText = user.displayName;
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'block';
            } else {
                document.getElementById('player-nick').innerText = "Gość";
                document.getElementById('login-btn').style.display = 'block';
                document.getElementById('logout-btn').style.display = 'none';
            }
        });

        // --- LOGIKA MULTIPLAYER W CHMURZE ---
        window.currentGameId = null;
        window.playerColor = 'w';

        window.findOnlineMatch = async function() {
            if (!auth.currentUser) return alert("Musisz się zalogować, by grać w sieci!");
            
            showScreen('game-screen');
            document.getElementById('status').innerText = "Szukanie przeciwnika...";
            window.isOnline = true;
            window.game.reset();
            
            const gamesRef = collection(db, "games");
            const q = query(gamesRef, where("status", "==", "waiting"));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                // ZNALEZIONO POKÓJ - Dołączasz jako Czarne
                const gameDoc = querySnapshot.docs[0];
                window.currentGameId = gameDoc.id;
                window.playerColor = 'b';
                
                await updateDoc(doc(db, "games", window.currentGameId), {
                    status: "playing",
                    blackPlayer: auth.currentUser.displayName
                });
                
                startBoard('b');
                listenToGame();
            } else {
                // BRAK POKOJÓW - Tworzysz nowy jako Białe i czekasz
                const newGame = await addDoc(gamesRef, {
                    status: "waiting",
                    whitePlayer: auth.currentUser.displayName,
                    fen: "start"
                });
                
                window.currentGameId = newGame.id;
                window.playerColor = 'w';
                startBoard('w');
                listenToGame();
            }
        };

        function listenToGame() {
            onSnapshot(doc(db, "games", window.currentGameId), (docSnap) => {
                const data = docSnap.data();
                if (data.status === 'playing') {
                    document.getElementById('status').innerText = `Przeciwnik dołączył! Tura: ${window.game.turn() === 'w' ? 'Białe' : 'Czarne'}`;
                    
                    // Jeśli ruch wykonał przeciwnik, zaktualizuj planszę
                    if (data.fen !== window.game.fen() && data.fen !== "start") {
                        window.game.load(data.fen);
                        window.board.position(window.game.fen());
                        window.updateStatusLocal();
                    }
                }
            });
        }

        window.updateGameFen = async function(fenStr) {
            if (window.currentGameId) {
                await updateDoc(doc(db, "games", window.currentGameId), { fen: fenStr });
            }
        };
    </script>

    <style>
        :root { --bg-color: #1a1a2e; --primary-btn: #0f3460; --primary-hover: #e94560; --text-light: #fff; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: radial-gradient(circle at center, #16213e, #0f3460); color: var(--text-light); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .screen { display: none; width: 100%; max-width: 600px; text-align: center; }
        .active { display: block; }
        .menu-container { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 15px 35px rgba(0,0,0,0.5); margin: 0 auto; }
        .game-title span { color: var(--primary-hover); }
        .btn { display: block; width: 100%; padding: 15px; margin-bottom: 15px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; background-color: var(--primary-btn); }
        .btn:hover { transform: scale(1.05); background-color: var(--primary-hover); }
        .btn-google { background-color: #DB4437; }
        #myBoard { width: 400px; margin: 20px auto; border: 5px solid #333; }
        .chessboard-63f37 img { image-rendering: pixelated; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <div class="menu-container">
            <h1 class="game-title">Pixel <span>Chess</span></h1>
            <p>Gracz: <strong id="player-nick">Gość</strong></p>
            
            <button id="login-btn" class="btn btn-google" onclick="window.loginWithGoogle()">G Zaloguj przez Gmail</button>
            <button id="logout-btn" class="btn" style="display:none;" onclick="window.logout()">Wyloguj</button>
            
            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            
            <button class="btn" onclick="startBotMatch()">🤖 Graj z Botem</button>
            <button class="btn" onclick="window.findOnlineMatch()">🌐 Graj Online</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <h2>Rozgrywka</h2>
        <p id="status">Ładowanie...</p>
        <div id="myBoard"></div>
        <button class="btn" onclick="quitGame()" style="width:200px; margin:20px auto;">Opuść grę</button>
    </div>

    <script>
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Generator Pikseli
        const pixelArt = {
            'P': ["00000000","00000000","00011000","00111100","00011000","00011000","00111100","01111110"],
            'R': ["00000000","01010100","01111100","00111000","00111000","00111000","01111110","01111110"],
            'N': ["00000000","00011000","00111100","01110000","00111000","00011100","00111100","01111110"],
            'B': ["00011000","00111100","00011000","00111100","00011000","00111100","01111110","01111110"],
            'Q': ["01010100","01111100","00111000","00111000","01111100","01111110","01111110","01111110"],
            'K': ["00011000","00111100","00011000","01111110","00111100","00111100","01111110","01111110"]
        };

        function generatePixelPiece(pieceCode) {
            const art = pixelArt[pieceCode[1]];
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = pieceCode[0] === 'w' ? '#FFFFFF' : '#111111';
            for(let y=0; y<8; y++) for(let x=0; x<8; x++) {
                if(art[y][x] === '1') {
                    ctx.fillRect(x*8, y*8, 8, 8);
                    if(pieceCode[0] === 'w') { ctx.strokeStyle = '#000000'; ctx.lineWidth = 1; ctx.strokeRect(x*8, y*8, 8, 8); }
                }
            }
            return canvas.toDataURL(); 
        }

        // Globalne zmienne gry
        window.board = null;
        window.game = new Chess();
        window.isOnline = false;
        let isPlayingBot = false;

        function onDragStart(source, piece) {
            if (window.game.game_over()) return false;
            
            if (window.isOnline) {
                // ONLINE: Nie możesz ruszać figur przeciwnika, ani ruszać się poza swoją turą
                if ((window.playerColor === 'w' && piece.search(/^b/) !== -1) ||
                    (window.playerColor === 'b' && piece.search(/^w/) !== -1)) return false;
                if (window.game.turn() !== window.playerColor) return false;
            } else {
                // OFFLINE: Grasz zawsze białymi
                if (piece.search(/^b/) !== -1) return false;
            }
        }

        function onDrop(source, target) {
            let move = window.game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            
            window.updateStatusLocal();

            if (window.isOnline) {
                window.updateGameFen(window.game.fen()); // Wyślij ruch do bazy
            } else if (isPlayingBot) {
                window.setTimeout(makeBotMove, 500);
            }
        }

        function onSnapEnd() { window.board.position(window.game.fen()); }

        window.updateStatusLocal = function() {
            let status = '';
            let moveColor = window.game.turn() === 'b' ? 'Czarne' : 'Białe';
            if (window.game.in_checkmate()) status = `Koniec! ${moveColor} mają mata.`;
            else if (window.game.in_draw()) status = 'Remis.';
            else {
                status = `Tura: ${moveColor}`;
                if (window.game.in_check()) status += ' (Szach!)';
            }
            $('#status').html(status);
        };

        function makeBotMove() {
            if (window.game.game_over()) return;
            let possibleMoves = window.game.moves();
            window.game.move(possibleMoves[Math.floor(Math.random() * possibleMoves.length)]);
            window.board.position(window.game.fen());
            window.updateStatusLocal();
        }

        window.startBoard = function(orientation) {
            let config = {
                draggable: true, position: window.game.fen(), orientation: orientation === 'b' ? 'black' : 'white',
                onDragStart: onDragStart, onDrop: onDrop, onSnapEnd: onSnapEnd,
                pieceTheme: generatePixelPiece
            };
            if(window.board) window.board.destroy(); // Czyści starą planszę
            window.board = Chessboard('myBoard', config);
            window.updateStatusLocal();
        };

        function startBotMatch() {
            window.isOnline = false;
            isPlayingBot = true;
            window.game.reset();
            window.startBoard('w');
            showScreen('game-screen');
        }

        function quitGame() {
            window.currentGameId = null;
            window.isOnline = false;
            isPlayingBot = false;
            showScreen('menu-screen');
        }
    </script>
</body>
</html>
