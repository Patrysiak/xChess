<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Clone MAX - Posts & Stories</title>
    <style>
        /* ================= ZMIENNE KOLORYSTYCZNE ================= */
        :root {
            --bg-tertiary: #1e1f22;   /* Pasek serwerów */
            --bg-secondary: #2b2d31;  /* Pasek kanałów/DM */
            --bg-primary: #313338;    /* Główny czat */
            --bg-floating: #111214;   /* Popouty */
            --bg-message-hover: #2e3035;
            --bg-modifier-hover: rgba(78, 80, 88, 0.3);
            --bg-modifier-active: rgba(78, 80, 88, 0.48);
            --bg-input: #383a40;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --header-primary: #f2f3f5;
            --header-secondary: #b5bac1;
            --brand-color: #5865F2;
            --danger-color: #da373c;
            --success-color: #23a559;
            --post-orange: #f39c12;   /* Kolor obramówki postów */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-normal); display: flex; height: 100vh; overflow: hidden; font-size: 14px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 4px; }
        svg { width: 24px; height: 24px; fill: currentColor; }
        button, input { outline: none; border: none; }

        /* ================= ANIMACJE ================= */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes ring { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(88,101,242,0.7); } 100% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(88,101,242,0); } }
        @keyframes storyPulse { 0% { box-shadow: 0 0 0 2px var(--bg-secondary), 0 0 0 4px var(--post-orange); } 50% { box-shadow: 0 0 0 2px var(--bg-secondary), 0 0 0 6px rgba(243, 156, 18, 0.5); } 100% { box-shadow: 0 0 0 2px var(--bg-secondary), 0 0 0 4px var(--post-orange); } }

        /* ================= EKRAN LOGOWANIA ================= */
        #login-screen { position: fixed; inset: 0; background: var(--bg-tertiary); z-index: 9999; display: flex; justify-content: center; align-items: center; animation: fadeIn 0.5s ease; }
        .login-box { background: var(--bg-primary); padding: 40px; border-radius: 8px; width: 480px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: slideUp 0.6s ease; }
        .btn-brand { background: var(--brand-color); color: white; width: 100%; padding: 14px; border-radius: 4px; font-size: 16px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .btn-brand:hover { filter: brightness(1.1); }

        #app-container { display: none; width: 100%; height: 100%; animation: fadeIn 0.5s ease; }

        /* ================= 1. PASEK SERWERÓW ================= */
        .servers-nav { width: 72px; background-color: var(--bg-tertiary); display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; z-index: 10; }
        .server-icon-wrapper { position: relative; display: flex; justify-content: center; width: 100%; cursor: pointer; }
        .server-pill { position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 4px; height: 8px; background: white; border-radius: 0 4px 4px 0; transition: 0.2s; opacity: 0; }
        .server-icon-wrapper:hover .server-pill { height: 20px; opacity: 1; }
        .server-icon-wrapper.active .server-pill { height: 40px; opacity: 1; }
        .server-icon { width: 48px; height: 48px; border-radius: 50%; background-color: var(--bg-primary); color: var(--text-normal); display: flex; justify-content: center; align-items: center; transition: 0.2s; overflow: hidden; }
        .server-icon img { width: 100%; height: 100%; object-fit: cover; }
        .server-icon-wrapper:hover .server-icon, .server-icon-wrapper.active .server-icon { border-radius: 16px; background-color: var(--brand-color); color: white; }
        .server-separator { width: 32px; height: 2px; background: var(--bg-modifier-active); margin: 4px 0; border-radius: 1px; }

        /* ================= 2. PASEK BOCZNY (DM/KANAŁY) ================= */
        .sidebar { width: 240px; background-color: var(--bg-secondary); display: flex; flex-direction: column; }
        .sidebar-header { height: 48px; padding: 0 16px; display: flex; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.2); font-weight: 600; color: var(--header-primary); cursor: pointer; border-bottom: 1px solid var(--bg-tertiary); }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 8px; }
        
        .category-name { font-size: 12px; font-weight: 600; color: var(--header-secondary); text-transform: uppercase; margin: 16px 8px 4px; }
        .list-item { padding: 8px; border-radius: 4px; display: flex; align-items: center; cursor: pointer; color: var(--text-muted); margin-bottom: 2px; transition: 0.1s; }
        .list-item:hover { background: var(--bg-modifier-hover); color: var(--text-normal); }
        .list-item.active { background: var(--bg-modifier-active); color: var(--text-normal); }
        
        /* Obramówka postów (Stories) */
        .avatar-container { position: relative; margin-right: 12px; width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; }
        .list-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .list-avatar.has-post { animation: storyPulse 2s infinite; cursor: pointer; border: 2px solid var(--bg-secondary); }
        
        /* Panel Użytkownika na dole */
        .user-panel { height: 52px; background: #232428; display: flex; align-items: center; padding: 0 8px; justify-content: space-between; position: relative; }
        .user-profile { display: flex; align-items: center; padding: 4px; border-radius: 4px; cursor: pointer; flex: 1; overflow: hidden; }
        .user-profile:hover { background: var(--bg-modifier-hover); }
        .user-profile img { width: 32px; height: 32px; border-radius: 50%; margin-right: 8px; }
        .user-info { display: flex; flex-direction: column; overflow: hidden; }
        .user-info strong { font-size: 13px; color: var(--header-primary); }
        .user-info span { font-size: 11px; color: var(--header-secondary); }
        
        .user-controls { display: flex; }
        .control-btn { width: 32px; height: 32px; border-radius: 4px; display: flex; justify-content: center; align-items: center; color: var(--header-secondary); cursor: pointer; transition: 0.1s; }
        .control-btn:hover { background: var(--bg-modifier-hover); color: var(--text-normal); }

        /* ================= 3. ŚRODEK (CZAT) ================= */
        .main-view { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
        .top-bar { height: 48px; padding: 0 16px; display: flex; align-items: center; border-bottom: 1px solid var(--bg-tertiary); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .top-bar-actions { margin-left: auto; display: flex; align-items: center; gap: 15px; color: var(--header-secondary); }
        .top-bar-actions svg { cursor: pointer; transition: 0.2s; }
        .top-bar-actions svg:hover { color: var(--text-normal); }

        .content-area { flex: 1; display: flex; overflow: hidden; }
        .chat-column { flex: 1; display: flex; flex-direction: column; }
        
        .messages-container { flex: 1; overflow-y: auto; padding: 16px 0; }
        .message { padding: 4px 16px 4px 72px; position: relative; margin-top: 17px; animation: slideUp 0.3s ease; }
        .message:hover { background: var(--bg-message-hover); }
        .msg-avatar { position: absolute; left: 16px; top: 4px; width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .msg-header { display: flex; align-items: baseline; margin-bottom: 2px; }
        .msg-author { color: var(--header-primary); font-weight: 500; font-size: 16px; margin-right: 8px; }
        .msg-time { color: var(--text-muted); font-size: 12px; }
        .msg-content { color: var(--text-normal); font-size: 15px; line-height: 1.4; }
        
        .welcome-msg { padding: 16px; border-bottom: 1px solid var(--bg-modifier-active); margin-bottom: 10px; }
        .welcome-msg h1 { font-size: 32px; color: white; margin: 10px 0; }

        .input-area { padding: 0 16px 24px; }
        .input-wrapper { background: var(--bg-input); border-radius: 8px; display: flex; align-items: center; padding: 10px 16px; }
        .chat-input { flex: 1; background: transparent; color: var(--text-normal); font-size: 15px; margin: 0 10px; }

        /* ================= 4. PRAWY PANEL ================= */
        .right-panel { width: 240px; background: var(--bg-secondary); border-left: 1px solid var(--bg-modifier-active); display: flex; flex-direction: column; }
        .panel-header { padding: 16px 8px 8px; font-size: 12px; font-weight: 800; color: var(--header-secondary); text-transform: uppercase; }
        .member-item { padding: 6px 8px; margin: 0 8px 2px; border-radius: 4px; display: flex; align-items: center; cursor: pointer; }
        .member-item:hover { background: var(--bg-modifier-hover); }
        .member-avatar { width: 32px; height: 32px; border-radius: 50%; margin-right: 12px; }
        .member-info h4 { color: var(--header-primary); font-size: 14px; font-weight: 500; }

        /* ================= MODALE ================= */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(3px);}
        .modal-content { background: var(--bg-primary); border-radius: 5px; width: 440px; padding: 24px; text-align: center; animation: popIn 0.3s ease; position: relative;}
        .modal-content h2 { color: white; margin-bottom: 10px; }
        .btn-submit { background: var(--brand-color); color: white; padding: 10px 24px; border-radius: 3px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-danger { background: var(--danger-color); color: white; padding: 10px 24px; border-radius: 3px; cursor: pointer; width: 100%; margin-top: 10px; }
        
        .upload-avatar-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; cursor: pointer; }
        .upload-avatar-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--brand-color); }

        /* WIDOK POSTA / RELACJI */
        #post-viewer-modal .modal-content { width: 400px; height: 600px; padding: 0; background: #000; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--bg-tertiary);}
        .post-header { padding: 15px; display: flex; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); position: absolute; width: 100%; top: 0; z-index: 2; }
        .post-header img { width: 40px; height: 40px; border-radius: 50%; margin-right: 10px; }
        .post-header div { color: white; text-align: left;}
        .post-close { position: absolute; right: 15px; color: white; font-size: 24px; cursor: pointer; }
        .post-body { flex: 1; display: flex; justify-content: center; align-items: center; background: #2b2d31; color: white; font-size: 24px; text-align: center; padding: 20px; word-break: break-word;}
        .post-progress-bar { position: absolute; top: 5px; left: 10px; right: 10px; height: 3px; background: rgba(255,255,255,0.3); border-radius: 3px; z-index: 3; }
        .post-progress-fill { height: 100%; background: white; width: 0%; border-radius: 3px; }

    </style>
</head>

                { id: "f1", name: "Anna Nowak", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Anna", post: "Piję kawkę na mieście ☕", status: "online" },
                { id: "f2", name: "Blaaqu", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Blaaqu", post: null, status: "dnd" },
                { id: "f3", name: "xPatrysiak", avatar: "https://api.dicebear.com/7.x/bot/svg?seed=Patryk", post: "Gram w Minecrafta na 33mc.pl!", status: "online" }
            ],
            messages: [
                { author: "Blaaqu", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Blaaqu", text: "Jak ci idzie kodowanie?", time: "Wczoraj o 22:23" }
            ]
        };

        // --- AUTH ---
        window.loginWithGoogle = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                
                const docRef = doc(db, 'users', user.uid);
                const docSnap = await getDoc(docRef);
                
                let avatarUrl = user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`;
                if (!docSnap.exists()) {
                    currentUser = { uid: user.uid, name: user.displayName, avatar: avatarUrl, post: null };
                    await setDoc(docRef, currentUser);
                } else {
                    currentUser = docSnap.data();
                }
                
                // Dodajemy nas samych do listy by pokazać nasz post
                mockData.friends.unshift({ id: "me", name: currentUser.name, avatar: currentUser.avatar, post: currentUser.post, status: "online" });
                
                updateUI();
                window.switchToDM();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        function updateUI() {
            document.getElementById('my-avatar').src = currentUser.avatar;
            document.getElementById('my-name').innerText = currentUser.name;
        }

        // --- NAWIGACJA I RENDEROWANIE ---
        window.switchToDM = () => {
            document.getElementById('nav-home').classList.add('active');
            document.getElementById('nav-server').classList.remove('active');
            document.getElementById('chat-header-title').innerText = "Wiadomości ze znajomymi";

            // Renderuj znajomych w lewym panelu (Logika pomarańczowej obramówki postów)
            let sb = `<div class="category-name">Prywatne wiadomości</div>`;
            mockData.friends.forEach((f, i) => {
                const hasPostClass = f.post ? "has-post" : "";
                const postOnClick = f.post ? `onclick="event.stopPropagation(); viewPost('${f.id}')"` : "";
                
                sb += `
                    <div class="list-item ${i===1?'active':''}">
                        <div class="avatar-container" ${postOnClick} title="${f.post ? 'Kliknij by zobaczyć post' : ''}">
                            <img src="${f.avatar}" class="list-avatar ${hasPostClass}">
                        </div>
                        <div style="flex:1;">${f.name === currentUser.name ? "Ty" : f.name}</div>
                    </div>`;
            });
            document.getElementById('sidebar-content').innerHTML = sb;

            // Renderuj czat
            renderMessages();

            // Prawy panel
            let rp = `<div class="panel-header">Aktywni znajomi</div>`;
            mockData.friends.forEach(f => {
                if(f.id !== "me" && f.status === "online") {
                    rp += `
                        <div class="member-item">
                            <img src="${f.avatar}" class="member-avatar">
                            <div class="member-info"><h4>${f.name}</h4><p style="color:var(--success-color)">Online</p></div>
                        </div>`;
                }
            });
            document.getElementById('right-panel').innerHTML = rp;
        };

        window.switchToServer = () => {
            document.getElementById('nav-server').classList.add('active');
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('chat-header-title').innerText = "ogólny";
            
            document.getElementById('sidebar-content').innerHTML = `
                <div class="category-name">Kanały tekstowe</div>
                <div class="list-item active"><svg><path d="M21 8.5h-4.5V4h-2v4.5H9.5V4h-2v4.5H3v2h4.5V15H3v2h4.5v4.5h2V17h5v4.5h2V17H21v-2h-4.5v-4.5H21v-2zm-6.5 6.5h-5v-4.5h5v4.5z"/></svg> ogólny</div>
            `;
            document.getElementById('messages-area').innerHTML = `<div class="welcome-msg"><h1>Witamy na serwerze!</h1></div>`;
            document.getElementById('right-panel').innerHTML = `<div class="panel-header">Zarząd</div><div class="member-item"><img src="https://api.dicebear.com/7.x/initials/svg?seed=Admin" class="member-avatar"><div class="member-info"><h4>Admin</h4></div></div>`;
        };

        function renderMessages() {
            let html = "";
            mockData.messages.forEach(m => {
                html += `
                    <div class="message">
                        <img src="${m.avatar}" class="msg-avatar">
                        <div class="msg-header"><span class="msg-author">${m.author}</span><span class="msg-time">${m.time}</span></div>
                        <div class="msg-content">${m.text}</div>
                    </div>`;
            });
            document.getElementById('messages-area').innerHTML = html;
            const container = document.getElementById('messages-area');
            container.scrollTop = container.scrollHeight;
        }

        window.sendMessage = (e) => {
            if (e.key === "Enter" && e.target.value.trim() !== "") {
                mockData.messages.push({ author: currentUser.name, avatar: currentUser.avatar, text: e.target.value.trim(), time: "Przed chwilą" });
                e.target.value = "";
                renderMessages();
            }
        };

        // --- SYSTEM POSTÓW (RELACJI) ---
        window.publishPost = async () => {
            const text = document.getElementById('new-post-text').value.trim();
            if(!text) return;
            
            currentUser.post = text;
            await setDoc(doc(db, 'users', currentUser.uid), currentUser);
            
            mockData.friends[0].post = text; // Aktualizacja w mocku na 0 pozycji (Ty)
            
            closeModal('add-post-modal');
            document.getElementById('new-post-text').value = "";
            window.switchToDM(); // Odśwież widok by pokazać pomarańczową obwódkę
        };

        window.viewPost = (userId) => {
            const friend = mockData.friends.find(f => f.id === userId);
            if(!friend || !friend.post) return;

            document.getElementById('post-viewer-modal').style.display = 'flex';
            document.getElementById('post-viewer-avatar').src = friend.avatar;
            document.getElementById('post-viewer-name').innerText = friend.name === currentUser.name ? "Twój Post" : friend.name;
            document.getElementById('post-viewer-text').innerText = friend.post;

            // Animacja paska postępu
            const progress = document.getElementById('post-progress');
            progress.style.transition = "none";
            progress.style.width = "0%";
            setTimeout(() => {
                progress.style.transition = "width 4s linear";
                progress.style.width = "100%";
            }, 50);

            // Automatyczne zamknięcie po 4s
            clearTimeout(postTimer);
            postTimer = setTimeout(() => { window.closePostViewer(); }, 4000);
        };

        window.closePostViewer = () => {
            document.getElementById('post-viewer-modal').style.display = 'none';
            clearTimeout(postTimer);
        };

        // --- USTAWIENIA I DZWONIENIE ---
        window.openModal = (id) => {
            document.getElementById(id).style.display = 'flex';
            if(id === 'settings-modal') {
                document.getElementById('edit-name').value = currentUser.name;
                document.getElementById('settings-avatar-preview').src = currentUser.avatar;
            }
        };

        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        let tempBase64 = "";
        window.handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    tempBase64 = e.target.result;
                    document.getElementById('settings-avatar-preview').src = tempBase64;
                };
                reader.readAsDataURL(file);
            }
        };

        window.saveSettings = async () => {
            currentUser.name = document.getElementById('edit-name').value;
            if(tempBase64) currentUser.avatar = tempBase64;
            
            await setDoc(doc(db, 'users', currentUser.uid), currentUser);
            mockData.friends[0].name = currentUser.name;
            mockData.friends[0].avatar = currentUser.avatar;
            
            updateUI();
            closeModal('settings-modal');
            window.switchToDM();
        };

        const ringtone = document.getElementById('ringtone');
        window.startCall = () => {
            document.getElementById('call-modal').style.display = 'flex';
            ringtone.volume = 0.5; ringtone.play().catch(e => console.log("Zablokowano auto-play audio."));
        };
        window.stopCall = () => {
            closeModal('call-modal');
            ringtone.pause(); ringtone.currentTime = 0;
        };

    </script>
</body>
</html>
