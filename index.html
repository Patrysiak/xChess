<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulkan Connect - Discord x Messenger x Firebase</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --discord-dark: #313338;
            --discord-side: #2b2d31;
            --messenger-blue: #0084ff;
            --vulcan-red: #9e0000;
            --vulcan-glow: #ff4500;
            --text-main: #dbdee1;
            --bg-input: #383a40;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050000;
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* EKRAN LOGOWANIA */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #1a0000 0%, #050000 100%);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .login-card {
            background: rgba(43, 45, 49, 0.9);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--vulcan-glow);
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.3);
        }

        .google-btn {
            background: #DB4437;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .google-btn:hover { background: #c53727; transform: scale(1.05); }

        /* GŁÓWNY INTERFEJS */
        .sidebar {
            width: 320px;
            background-color: var(--discord-side);
            border-right: 1px solid #1e1f22;
            display: flex;
            flex-direction: column;
        }

        .user-profile-bar {
            padding: 15px;
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #1e1f22;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--vulcan-glow);
        }

        .user-info h4 { margin: 0; font-size: 14px; color: white; }
        .user-info p { margin: 0; font-size: 11px; color: gold; font-weight: bold; }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .chat-item:hover { background-color: #3f4147; }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--discord-dark); }
        .chat-header {
            height: 60px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1e1f22;
        }

        .messages { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 14px; }
        .msg-received { background: #4e5058; align-self: flex-start; }
        .msg-sent { background: var(--messenger-blue); align-self: flex-end; color: white; }

        .input-area { padding: 20px; }
        .input-wrapper { background: var(--bg-input); border-radius: 8px; padding: 12px; display: flex; }
        input { background: none; border: none; color: white; width: 100%; outline: none; }

        .logout-btn {
            background: none;
            border: 1px solid #555;
            color: #888;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1 style="color: white; margin-bottom: 10px;">Vulkan <span style="color:var(--vulcan-glow)">Connect</span></h1>
            <p style="color: #aaa; margin-bottom: 30px;">Zaloguj się, aby połączyć się z serwerem kart.</p>
            <button class="google-btn" onclick="loginWithGoogle()">ZALOGUJ PRZEZ GOOGLE</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="user-profile-bar">
            <img id="my-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=fallback" class="user-avatar">
            <div class="user-info">
                <h4 id="my-nick">Ładowanie...</h4>
                <p>🏆 ELO: <span id="my-elo">0</span> | $ <span id="my-coins">0</span></p>
            </div>
            <button class="logout-btn" onclick="logout()">Wyjdź</button>
        </div>

        <div class="chat-list" id="friends-list">
            <div style="padding: 20px; color: #888; font-size: 13px; text-align: center;">Ładowanie znajomych...</div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <div><span style="color: #80848e">#</span> Czat Ogólny</div>
            <button class="google-btn" style="padding: 8px 15px; font-size: 12px;" onclick="location.reload()">GRAJ W KARTY</button>
        </div>
        
        <div class="messages" id="chat-box">
            <div class="message msg-received">Witaj w Vulkan Connect! Zaloguj się, aby pisać.</div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="msg-input" placeholder="Napisz coś...">
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // TWOJA KONFIGURACJA Z PROMPTA
        const firebaseConfig = {
            apiKey: "AIzaSyDVip74fl5K2fnLjlCOBLJfBnq7lxglyoU",
            authDomain: "xchess-79e2d.firebaseapp.com",
            projectId: "xchess-79e2d",
            storageBucket: "xchess-79e2d.firebasestorage.app",
            messagingSenderId: "382071993193",
            appId: "1:382071993193:web:86dbe5211f2151cb5383f8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Funkcje globalne dla przycisków HTML
        window.loginWithGoogle = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, 'users', user.uid);
                const docSnap = await getDoc(docRef);

                let userData;
                if (!docSnap.exists()) {
                    // Rejestracja nowego gracza (Twoja logika)
                    userData = {
                        uid: user.uid,
                        displayName: user.displayName,
                        avatar: user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`,
                        elo: 1000,
                        coins: 200,
                        friends: []
                    };
                    await setDoc(docRef, userData);
                } else {
                    userData = docSnap.data();
                }

                // Ukryj logowanie, pokaż UI
                document.getElementById('login-overlay').style.display = 'none';
                updateUI(userData);
                loadMockFriends(userData.friends);
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        });

        function updateUI(data) {
            document.getElementById('my-avatar').src = data.avatar;
            document.getElementById('my-nick').innerText = data.displayName;
            document.getElementById('my-elo').innerText = data.elo;
            document.getElementById('my-coins').innerText = data.coins;
        }

        function loadMockFriends(friends) {
            const list = document.getElementById('friends-list');
            list.innerHTML = "";
            if (friends && friends.length > 0) {
                friends.forEach(f => {
                    list.innerHTML += `
                        <div class="chat-item">
                            <img src="${f.avatar}" class="user-avatar" style="width:35px; height:35px;">
                            <div style="margin-left:10px">
                                <div style="font-weight:bold; font-size:13px">${f.name}</div>
                                <div style="font-size:11px; color:#888">Dostępny</div>
                            </div>
                        </div>
                    `;
                });
            } else {
                list.innerHTML = `<div style="padding:20px; color:#555; text-align:center">Nie masz jeszcze znajomych.</div>`;
            }
        }
    </script>
</body>
</html>
