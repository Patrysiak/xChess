<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Age of Territorial</title>
    <style>
        :root { --bg: #111; --panel: #222; --text: #eee; --accent: #f39c12; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        
        #hud { display: flex; justify-content: space-between; background: var(--panel); padding: 10px 20px; border-bottom: 2px solid #333; }
        .stat { font-size: 1.2rem; font-weight: bold; }
        .hint { color: #888; font-size: 0.9rem; }

        canvas { display: block; margin: 20px auto; border: 3px solid #444; background: #1a2a3a; box-shadow: 0 0 20px black; cursor: crosshair; }

        /* MENU BUDOWY F4 */
        #build-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2c3e50; padding: 20px; border: 2px solid var(--accent); border-radius: 8px; z-index: 100; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .build-btn { display: block; width: 100%; margin: 10px 0; padding: 10px; background: #34495e; color: white; border: 1px solid #7f8c8d; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .build-btn:hover { background: var(--accent); }

        /* WYSKAKUJĄCE POWIADOMIENIA */
        #notification { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(231, 76, 60, 0.9); padding: 10px 20px; border-radius: 5px; font-weight: bold; display: none; pointer-events: none; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat" style="color: #3498db;">Złoto: <span id="ui-gold">100</span> | Wojsko Total: <span id="ui-troops">0</span></div>
        <div class="stat">Tryb: <span id="ui-mode" style="color: var(--accent);">Zarządzanie</span></div>
        <div class="hint">Skróty: [W] - Przesuń Wojska | [F4] - Buduj na prowincji</div>
    </div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>

    <div id="build-modal">
        <h3>Menu Prowincji (F4)</h3>
        <p style="font-size: 0.8rem; color: #ccc;">Zbuduj, aby wzmocnić ten teren</p>
        <button class="build-btn" onclick="Game.buyBuilding('mine')">Kopalnia Złota (Koszt: 50 złota)</button>
        <button class="build-btn" onclick="Game.buyBuilding('barracks')">Koszary (Szybszy pobór wojska) (Koszt: 100 złota)</button>
        <button class="build-btn" style="background: #c0392b;" onclick="document.getElementById('build-modal').style.display='none'">Zamknij [ESC]</button>
    </div>

    <div id="notification">Powiadomienie</div>

    <script>
        /**
         * AGE OF TERRITORIAL - SILNIK
         */
        const Game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: document.getElementById('gameCanvas').getContext('2d'),
            
            // Konfiguracja Mapy (Age of History style - Prowincje)
            cols: 20,
            rows: 12,
            provSize: 50,
            provinces: [],
            
            // Stan Gracza
            player: { id: 1, gold: 100, color: "#3498db" },
            bots: [
                { id: 2, gold: 100, color: "#e74c3c" },
                { id: 3, gold: 100, color: "#9b59b6" }
            ],

            // Kontrolery UI
            mode: 'normal', // 'normal', 'move_source', 'move_target'
            hoveredProv: null,
            selectedSource: null,
            animations: [], // Linie ataku

            init() {
                this.generateProvinces();
                this.bindInputs();
                setInterval(() => this.tickEconomy(), 1000); // Ekonomia co sekundę
                setInterval(() => this.botLogic(), 2000); // Akcje botów co 2s
                this.gameLoop();
            },

            generateProvinces() {
                for (let y = 0; y < this.rows; y++) {
                    let row = [];
                    for (let x = 0; x < this.cols; x++) {
                        row.push({
                            x: x, y: y,
                            owner: 0, // 0 = neutralne
                            troops: Math.floor(Math.random() * 10) + 1, // Startowe zapsy rebeliantów
                            building: null // 'mine', 'barracks'
                        });
                    }
                    this.provinces.push(row);
                }

                // Spawn Gracza
                this.provinces[5][2].owner = 1;
                this.provinces[5][2].troops = 50;

                // Spawn Botów
                this.provinces[2][17].owner = 2;
                this.provinces[2][17].troops = 50;
                
                this.provinces[9][15].owner = 3;
                this.provinces[9][15].troops = 50;
            },

            tickEconomy() {
                let totalPlayerTroops = 0;
                
                for (let y = 0; y < this.rows; y++) {
                    for (let x = 0; x < this.cols; x++) {
                        let p = this.provinces[y][x];
                        if (p.owner !== 0) {
                            // Podstawowy przyrost wojska
                            let troopIncome = 1;
                            if (p.building === 'barracks') troopIncome += 3;
                            p.troops += troopIncome;

                            // Przyrost złota
                            if (p.owner === 1) {
                                totalPlayerTroops += p.troops;
                                this.player.gold += (p.building === 'mine' ? 5 : 1);
                            } else {
                                // Boty też zarabiają
                                let bot = this.bots.find(b => b.id === p.owner);
                                if(bot) bot.gold += (p.building === 'mine' ? 5 : 1);
                            }
                        }
                    }
                }
                document.getElementById('ui-gold').innerText = this.player.gold;
                document.getElementById('ui-troops').innerText = totalPlayerTroops;
            },

            bindInputs() {
                // Śledzenie myszki
                this.canvas.addEventListener('mousemove', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    let x = Math.floor((e.clientX - rect.left) / this.provSize);
                    let y = Math.floor((e.clientY - rect.top) / this.provSize);
                    if(x >= 0 && x < this.cols && y >= 0 && y < this.rows) {
                        this.hoveredProv = this.provinces[y][x];
                    }
                });

                // Kliknięcia (do przemieszczania wojsk)
                this.canvas.addEventListener('click', () => {
                    if (!this.hoveredProv) return;

                    if (this.mode === 'move_source') {
                        if (this.hoveredProv.owner === 1 && this.hoveredProv.troops > 1) {
                            this.selectedSource = this.hoveredProv;
                            this.setMode('move_target');
                        } else {
                            this.showNotice("Wybierz WŁASNĄ prowincję z wojskiem!");
                        }
                    } 
                    else if (this.mode === 'move_target' && this.selectedSource) {
                        this.executeMove(this.selectedSource, this.hoveredProv, 1);
                        this.setMode('normal');
                        this.selectedSource = null;
                    }
                });

                // Klawiatura (F4, W, ESC)
                window.addEventListener('keydown', (e) => {
                    if (e.key.toLowerCase() === 'w') {
                        this.setMode(this.mode === 'normal' ? 'move_source' : 'normal');
                        this.selectedSource = null;
                    }
                    if (e.key === 'F4') {
                        e.preventDefault();
                        if (this.hoveredProv && this.hoveredProv.owner === 1) {
                            document.getElementById('build-modal').style.display = 'block';
                        } else {
                            this.showNotice("Musisz najechać myszką na SWOJĄ prowincję!");
                        }
                    }
                    if (e.key === 'Escape') {
                        document.getElementById('build-modal').style.display = 'none';
                        this.setMode('normal');
                        this.selectedSource = null;
                    }
                });
            },

            setMode(newMode) {
                this.mode = newMode;
                let text = "Zarządzanie";
                if(newMode === 'move_source') text = "Wybierz prowincję STARTOWĄ";
                if(newMode === 'move_target') text = "Wybierz prowincję DOCELOWĄ";
                document.getElementById('ui-mode').innerText = text;
            },

            executeMove(source, target, ownerId) {
                // Oblicz dystans - można poruszać się tylko o 1 pole w każdą stronę (Age of History logic)
                let dist = Math.max(Math.abs(source.x - target.x), Math.abs(source.y - target.y));
                
                if (dist > 1) {
                    if(ownerId === 1) this.showNotice("Prowincja za daleko! Atakuj tylko sąsiadujące.");
                    return;
                }

                let movingTroops = Math.floor(source.troops / 2); // Wysyłamy połowę wojska
                source.troops -= movingTroops;

                // Dodaj animację wizualną "strzału/ataku"
                this.animations.push({
                    sx: source.x * this.provSize + this.provSize/2,
                    sy: source.y * this.provSize + this.provSize/2,
                    tx: target.x * this.provSize + this.provSize/2,
                    ty: target.y * this.provSize + this.provSize/2,
                    color: ownerId === 1 ? this.player.color : this.bots.find(b=>b.id===ownerId).color,
                    life: 20 // Klatki życia animacji
                });

                // Walka
                if (target.owner === ownerId) {
                    target.troops += movingTroops; // Przerzut wojsk
                } else {
                    target.troops -= movingTroops; // Atak
                    if (target.troops < 0) {
                        // Zdobycie prowincji
                        target.owner = ownerId;
                        target.troops = Math.abs(target.troops);
                        if (target.building === 'mine') target.building = null; // Zniszczenie przy podboju
                    }
                }
            },

            buyBuilding(type) {
                if (!this.hoveredProv || this.hoveredProv.owner !== 1) return;
                
                let cost = type === 'mine' ? 50 : 100;
                if (this.player.gold >= cost) {
                    if(this.hoveredProv.building !== null) {
                        this.showNotice("Ta prowincja ma już budynek!");
                        return;
                    }
                    this.player.gold -= cost;
                    this.hoveredProv.building = type;
                    document.getElementById('build-modal').style.display = 'none';
                    this.tickEconomy(); // Update UI
                } else {
                    this.showNotice("Za mało złota!");
                }
            },

            botLogic() {
                // Sztuczna inteligencja dla botów
                [2, 3].forEach(botId => {
                    let myProvinces = [];
                    for(let y=0; y<this.rows; y++) {
                        for(let x=0; x<this.cols; x++) {
                            if(this.provinces[y][x].owner === botId) myProvinces.push(this.provinces[y][x]);
                        }
                    }

                    if(myProvinces.length === 0) return; // Bot przegrał

                    // Wybierz prowincję z największą armią
                    myProvinces.sort((a,b) => b.troops - a.troops);
                    let strongest = myProvinces[0];

                    if(strongest.troops > 15) {
                        // Szukaj słabego sąsiada
                        let neighbors = [];
                        for(let dy=-1; dy<=1; dy++) {
                            for(let dx=-1; dx<=1; dx++) {
                                let nx = strongest.x + dx, ny = strongest.y + dy;
                                if(nx>=0 && nx<this.cols && ny>=0 && ny<this.rows && (dx!==0 || dy!==0)) {
                                    neighbors.push(this.provinces[ny][nx]);
                                }
                            }
                        }
                        
                        // Atakuj losowego sąsiada, który nie jest botem (lub jest słabszy)
                        let target = neighbors[Math.floor(Math.random() * neighbors.length)];
                        this.executeMove(strongest, target, botId);
                    }
                });
            },

            showNotice(msg) {
                let div = document.getElementById('notification');
                div.innerText = msg;
                div.style.display = 'block';
                setTimeout(() => div.style.display = 'none', 2000);
            },

            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Rysowanie Prowincji
                for (let y = 0; y < this.rows; y++) {
                    for (let x = 0; x < this.cols; x++) {
                        let p = this.provinces[y][x];
                        let px = x * this.provSize;
                        let py = y * this.provSize;

                        // Kolor państwa
                        if (p.owner === 1) this.ctx.fillStyle = this.player.color;
                        else if (p.owner === 2) this.ctx.fillStyle = this.bots[0].color;
                        else if (p.owner === 3) this.ctx.fillStyle = this.bots[1].color;
                        else this.ctx.fillStyle = "#555"; // Neutralne (rebelianty)

                        this.ctx.fillRect(px, py, this.provSize, this.provSize);
                        this.ctx.strokeStyle = "#222";
                        this.ctx.strokeRect(px, py, this.provSize, this.provSize);

                        // Rysowanie Ikon Budynków
                        if(p.building === 'mine') {
                            this.ctx.fillStyle = "gold";
                            this.ctx.fillRect(px + 5, py + 5, 10, 10);
                        } else if (p.building === 'barracks') {
                            this.ctx.fillStyle = "black";
                            this.ctx.fillRect(px + 5, py + 5, 10, 10);
                        }

                        // Liczba wojska
                        this.ctx.fillStyle = "white";
                        this.ctx.font = "14px Arial";
                        this.ctx.textAlign = "center";
                        this.ctx.fillText(Math.floor(p.troops), px + this.provSize/2, py + this.provSize/2 + 5);

                        // Podświetlenie hovera / selekcji
                        if (this.hoveredProv === p) {
                            this.ctx.fillStyle = "rgba(255,255,255,0.3)";
                            this.ctx.fillRect(px, py, this.provSize, this.provSize);
                        }
                        if (this.selectedSource === p) {
                            this.ctx.strokeStyle = "yellow";
                            this.ctx.lineWidth = 3;
                            this.ctx.strokeRect(px+2, py+2, this.provSize-4, this.provSize-4);
                            this.ctx.lineWidth = 1;
                        }
                    }
                }

                // Animacje Ataku Botów i Gracza
                for(let i = this.animations.length - 1; i >= 0; i--) {
                    let a = this.animations[i];
                    this.ctx.beginPath();
                    this.ctx.moveTo(a.sx, a.sy);
                    this.ctx.lineTo(a.tx, a.ty);
                    this.ctx.strokeStyle = a.color;
                    this.ctx.lineWidth = 4;
                    // Efekt przezroczystości podczas zanikania
                    this.ctx.globalAlpha = a.life / 20; 
                    this.ctx.stroke();
                    this.ctx.globalAlpha = 1.0;

                    a.life--;
                    if(a.life <= 0) this.animations.splice(i, 1);
                }
            },

            gameLoop() {
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        // Uruchomienie gry po załadowaniu
        window.onload = () => Game.init();

    </script>
</body>
</html>
