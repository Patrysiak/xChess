<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age of Territorial</title>
<style>
:root {
    --bg: rgb(2, 6, 23);
    --panel: rgb(15, 23, 42);
    --border: rgb(30, 41, 59);
    --text: rgb(248, 250, 252);
    --muted: rgb(148, 163, 184);
    --blue: rgb(59, 130, 246);
    --red: rgb(239, 68, 68);
    --green: rgb(16, 185, 129);
    --gold: rgb(245, 158, 11);
}
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    user-select: none;
    font-family: sans-serif;
}
body {
    background-color: var(--bg);
    color: var(--text);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
}
.screen {
    display: none;
    width: 100%;
    height: 100%;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: absolute;
    top: 0;
    left: 0;
    background: radial-gradient(circle at center, rgb(30, 41, 59) 0%, rgb(2, 6, 23) 100%);
    z-index: 10;
}
.active {
    display: flex;
}
.box {
    background: rgba(15, 23, 42, 0.8);
    padding: 40px;
    border-radius: 20px;
    border: 1px solid var(--border);
    text-align: center;
    width: 450px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
}
.title {
    font-size: 3.5rem;
    color: var(--text);
    margin-bottom: 20px;
    font-weight: 900;
}
.title-span {
    color: var(--blue);
}
.btn {
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid var(--border);
    color: rgb(255, 255, 255);
    padding: 15px;
    margin: 8px 0;
    font-size: 1.1rem;
    cursor: pointer;
    border-radius: 10px;
    width: 100%;
    font-weight: bold;
    transition: 0.3s;
}
.btn:hover {
    border-color: var(--blue);
    background: rgba(59, 130, 246, 0.1);
    transform: translateY(-2px);
}
.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    border-color: rgb(50, 50, 50);
}
.btn-green {
    border-color: var(--green);
    color: var(--green);
}
.btn-green:hover {
    background: var(--green);
    color: rgb(0, 0, 0);
}
.btn-red {
    border-color: var(--red);
    color: var(--red);
}
.btn-red:hover {
    background: var(--red);
    color: rgb(255, 255, 255);
}
.btn-google {
    border-color: rgb(219, 68, 55);
    color: rgb(219, 68, 55);
}
.btn-anon {
    border-color: var(--muted);
    color: var(--muted);
}
.loader {
    border: 4px solid rgba(255, 255, 255, 0.1);
    border-top: 4px solid var(--blue);
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
}
@keyframes spin {
    100% {
        transform: rotate(360deg);
    }
}
.game-ui {
    z-index: 5;
    background: rgb(0, 0, 0);
    display: none;
    flex-direction: column;
    height: 100%;
    width: 100%;
}
.hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--panel);
    padding: 15px 30px;
    border-bottom: 1px solid var(--border);
    z-index: 20;
}
.res-bar {
    display: flex;
    gap: 20px;
    font-weight: bold;
    font-size: 1.2rem;
}
.res-item {
    background: rgba(0, 0, 0, 0.6);
    padding: 8px 15px;
    border-radius: 8px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
}
.map-container {
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgb(2, 6, 23);
}
canvas {
    border: 2px solid var(--border);
    cursor: crosshair;
}
.modal-overlay {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.8);
    z-index: 100;
}
.modal {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--panel);
    border: 2px solid var(--blue);
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    display: flex;
    flex-direction: column;
}
.modal h2 {
    text-align: center;
    margin-bottom: 20px;
    color: var(--text);
}
input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 8px;
    background: rgb(30, 41, 59);
    outline: none;
    margin: 25px 0;
    border-radius: 4px;
}
input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 25px;
    height: 25px;
    border-radius: 50%;
    background: var(--blue);
    cursor: pointer;
    transition: 0.2s;
}
input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
}
.build-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 350px;
    overflow-y: auto;
}
.build-item {
    background: rgba(0, 0, 0, 0.4);
    padding: 15px;
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
}
.build-item:hover {
    border-color: var(--gold);
    background: rgba(245, 158, 11, 0.1);
}
.toast-box {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 200;
    pointer-events: none;
}
.toast {
    background: rgba(15, 23, 42, 0.95);
    padding: 12px 25px;
    border-radius: 30px;
    border: 1px solid var(--border);
    font-weight: bold;
    color: rgb(255, 255, 255);
    animation: slideUp 0.3s ease-out, fadeOut 0.5s ease-in 2.5s forwards;
}
@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
@keyframes fadeOut {
    to {
        opacity: 0;
    }
}
.txt-gold { color: var(--gold); }
.txt-wood { color: rgb(180, 83, 9); }
.txt-stone { color: var(--muted); }
.txt-troops { color: var(--red); }
.txt-blue { color: var(--blue); }
.txt-muted { color: var(--muted); }
.flex-row { display: flex; gap: 10px; margin-top: 20px; }
.flex-between { display: flex; justify-content: space-between; font-size: 0.9rem; }
.val-big { font-size: 3rem; text-align: center; font-weight: 900; }
</style>
</head>
<body>

<div class="screen active class-screen-main">
    <div class="box">
        <h1 class="title">Age of <span class="title-span">War</span></h1>
        <p style="margin-bottom: 10px;">Gracz: <strong class="txt-gold class-player-nick">Gosc</strong></p>
        <p class="txt-muted class-db-status" style="margin-bottom: 20px; font-size: 0.9rem;">Czekam na system...</p>
        
        <button class="btn btn-google class-btn-login">Zaloguj przez Google</button>
        <button class="btn btn-anon class-btn-anon">Zaloguj jako Anonim</button>
        <button class="btn btn-red class-btn-logout" style="display:none;">Wyloguj</button>
        
        <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
        <button class="btn btn-green class-btn-host" disabled>Utworz Pokoj (Host)</button>
        <button class="btn class-btn-join" disabled>Dolacz do Pokoju</button>
    </div>
</div>

<div class="screen class-screen-lobby">
    <div class="box">
        <h2 class="txt-gold" style="margin-bottom: 15px; font-size: 2.5rem;">Oczekiwanie...</h2>
        <p class="txt-muted class-lobby-status" style="font-size: 1.2rem;">Laczenie z serwerem...</p>
        <div class="loader"></div>
        <button class="btn btn-red class-btn-cancel-lobby" style="margin-top: 25px;">Przerwij wyszukiwanie</button>
    </div>
</div>

<div class="game-ui class-game-ui">
    <div class="hud">
        <div class="res-bar">
            <div class="res-item txt-gold">Monety <span class="class-r-gold">0</span></div>
            <div class="res-item txt-wood">Drewno <span class="class-r-wood">0</span></div>
            <div class="res-item txt-stone">Kamien <span class="class-r-stone">0</span></div>
            <div class="res-item txt-troops">Wojsko <span class="class-r-troops">0</span></div>
        </div>
        <div class="txt-muted" style="font-size: 0.9rem;">
            [LPM] Zaznacz | [LPMx2] Atakuj | [PPM] Buduj
        </div>
    </div>
    <div class="map-container">
        <canvas class="class-canvas" width="1200" height="700"></canvas>
    </div>
</div>

<div class="modal-overlay class-modal-overlay">
    <div class="modal class-modal-move" style="display:none;">
        <h2>Wyslij Jednostki</h2>
        <div class="val-big txt-troops class-move-val">10</div>
        <input type="range" class="class-move-slider" min="1" max="100" value="10">
        <div class="flex-between txt-muted">
            <span>Min: 1</span><span>Max: <b class="class-move-max">100</b></span>
        </div>
        <div class="flex-row">
            <button class="btn btn-red class-btn-cancel-move">Anuluj</button>
            <button class="btn btn-green class-btn-confirm-move">Rozkaz</button>
        </div>
    </div>

    <div class="modal class-modal-build" style="display:none; width: 450px;">
        <h2>Rozbudowa Prowincji</h2>
        <div class="build-list class-build-list"></div>
        <button class="btn btn-red class-btn-cancel-build" style="margin-top: 15px;">Zamknij</button>
    </div>
</div>

<div class="toast-box class-toast-box"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, set, onValue, get, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const cfg = {
        apiKey: "AIzaSyDVip74fl5K2fnLjlCOBLJfBnq7lxglyoU",
        authDomain: "xchess-79e2d.firebaseapp.com",
        projectId: "xchess-79e2d",
        storageBucket: "xchess-79e2d.firebasestorage.app",
        messagingSenderId: "382071993193",
        appId: "1:382071993193:web:86dbe5211f2151cb5383f8"
    };

    const myApp = initializeApp(cfg);
    const myAuth = getAuth(myApp);
    const myDb = getDatabase(myApp);
    const myProv = new GoogleAuthProvider();

    window.API = {
        db: myDb,
        uid: null,
        online: false,
        room: 'global_room'
    };

    let btnLogin = document.getElementsByClassName('class-btn-login')[0];
    let btnAnon = document.getElementsByClassName('class-btn-anon')[0];
    let btnLogout = document.getElementsByClassName('class-btn-logout')[0];
    let btnHost = document.getElementsByClassName('class-btn-host')[0];
    let btnJoin = document.getElementsByClassName('class-btn-join')[0];
    let txtStatus = document.getElementsByClassName('class-db-status')[0];
    let txtNick = document.getElementsByClassName('class-player-nick')[0];

    btnLogin.addEventListener('click', function() {
        signInWithPopup(myAuth, myProv).catch(function(e) {
            alert(e.message);
        });
    });

    btnAnon.addEventListener('click', function() {
        signInAnonymously(myAuth).catch(function(e) {
            alert(e.message);
        });
    });

    btnLogout.addEventListener('click', function() {
        signOut(myAuth);
    });

    onAuthStateChanged(myAuth, function(user) {
        if (user) {
            window.API.uid = user.uid;
            window.API.online = true;
            
            let name = user.displayName;
            if (!name) {
                name = "Anonim";
            }
            
            txtNick.innerText = name;
            txtNick.style.color = "rgb(16, 185, 129)";
            
            txtStatus.innerText = "Polaczono z serwerem";
            txtStatus.style.color = "rgb(16, 185, 129)";
            
            btnLogin.style.display = "none";
            btnAnon.style.display = "none";
            btnLogout.style.display = "block";
            
            btnHost.disabled = false;
            btnJoin.disabled = false;
        } else {
            window.API.uid = null;
            window.API.online = false;
            
            txtNick.innerText = "Gosc";
            txtNick.style.color = "rgb(245, 158, 11)";
            
            txtStatus.innerText = "Zaloguj sie aby grac";
            txtStatus.style.color = "rgb(148, 163, 184)";
            
            btnLogin.style.display = "block";
            btnAnon.style.display = "block";
            btnLogout.style.display = "none";
            
            btnHost.disabled = true;
            btnJoin.disabled = true;
        }
    });

    window.FirebaseHelpers = {
        setRef: function(path, data) {
            set(ref(myDb, path), data);
        },
        updateRef: function(path, data) {
            update(ref(myDb, path), data);
        },
        getRef: function(path, cb) {
            get(ref(myDb, path)).then(function(snap) {
                cb(snap);
            });
        },
        onValRef: function(path, cb) {
            onValue(ref(myDb, path), function(snap) {
                cb(snap);
            });
        },
        onDiscRef: function(path) {
            return onDisconnect(ref(myDb, path));
        }
    };
</script>

<script>
    let B_DB = {
        mine: {
            id: 'mine',
            n: 'Kopalnia',
            g: 50,
            w: 0,
            s: 0,
            i: 'M',
            d: 'Zloto'
        },
        wood: {
            id: 'wood',
            n: 'Drwal',
            g: 30,
            w: 0,
            s: 0,
            i: 'D',
            d: 'Drewno'
        },
        quarry: {
            id: 'quarry',
            n: 'Kamieniolom',
            g: 80,
            w: 20,
            s: 0,
            i: 'K',
            d: 'Kamien'
        },
        barracks: {
            id: 'barracks',
            n: 'Koszary',
            g: 150,
            w: 100,
            s: 0,
            i: 'B',
            d: 'Wojsko'
        },
        fort: {
            id: 'fort',
            n: 'Twierdza',
            g: 0,
            w: 100,
            s: 100,
            i: 'T',
            d: 'Obrona'
        }
    };

    let UI = {
        show: function(className) {
            let screens = document.getElementsByClassName('screen');
            for (let i = 0; i < screens.length; i++) {
                screens[i].classList.remove('active');
            }
            document.getElementsByClassName(className)[0].classList.add('active');
        },
        toast: function(msg, isErr) {
            let box = document.getElementsByClassName('class-toast-box')[0];
            let t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            if (isErr) {
                t.style.borderColor = 'rgb(239, 68, 68)';
            } else {
                t.style.borderColor = 'rgb(16, 185, 129)';
            }
            box.appendChild(t);
            setTimeout(function() {
                if (t.parentNode) {
                    t.remove();
                }
            }, 3000);
        },
        updateRes: function(g, w, s, t) {
            document.getElementsByClassName('class-r-gold')[0].innerText = Math.floor(g);
            document.getElementsByClassName('class-r-wood')[0].innerText = Math.floor(w);
            document.getElementsByClassName('class-r-stone')[0].innerText = Math.floor(s);
            document.getElementsByClassName('class-r-troops')[0].innerText = Math.floor(t);
        },
        closeModals: function() {
            document.getElementsByClassName('class-modal-overlay')[0].style.display = 'none';
            document.getElementsByClassName('class-modal-move')[0].style.display = 'none';
            document.getElementsByClassName('class-modal-build')[0].style.display = 'none';
            Engine.tgt = null;
        }
    };

    class Particles {
        constructor() {
            this.arr = [];
        }
        addLaser(sx, sy, tx, ty, col) {
            let obj = {
                type: 'L',
                sx: sx,
                sy: sy,
                tx: tx,
                ty: ty,
                p: 0,
                l: 1,
                c: col
            };
            this.arr.push(obj);
        }
        addExp(x, y, col) {
            for (let i = 0; i < 20; i++) {
                let a = Math.random() * Math.PI * 2;
                let s = Math.random() * 5 + 1;
                let obj = {
                    type: 'S',
                    x: x,
                    y: y,
                    vx: Math.cos(a) * s,
                    vy: Math.sin(a) * s,
                    l: 1,
                    d: Math.random() * 0.05 + 0.02,
                    c: col,
                    sz: Math.random() * 4 + 2
                };
                this.arr.push(obj);
            }
        }
        addTxt(x, y, txt, col) {
            let obj = {
                type: 'T',
                x: x + (Math.random() * 20 - 10),
                y: y + (Math.random() * 10 - 5),
                txt: txt,
                l: 1,
                c: col,
                vy: -1.5
            };
            this.arr.push(obj);
        }
        render(ctx) {
            for (let i = this.arr.length - 1; i >= 0; i--) {
                let pt = this.arr[i];
                if (pt.type === 'L') {
                    ctx.beginPath();
                    ctx.moveTo(pt.sx, pt.sy);
                    let cx = pt.sx + (pt.tx - pt.sx) * pt.p;
                    let cy = pt.sy + (pt.ty - pt.sy) * pt.p;
                    ctx.lineTo(cx, cy);
                    ctx.strokeStyle = pt.c;
                    ctx.lineWidth = 6 * pt.l;
                    ctx.lineCap = "round";
                    ctx.stroke();
                    pt.p += 0.15;
                    pt.l -= 0.04;
                    if (pt.p >= 1) {
                        this.addExp(pt.tx, pt.ty, pt.c);
                        this.arr.splice(i, 1);
                    }
                } else if (pt.type === 'S') {
                    ctx.globalAlpha = pt.l;
                    ctx.fillStyle = pt.c;
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, pt.sz, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    pt.x += pt.vx;
                    pt.y += pt.vy;
                    pt.l -= pt.d;
                    if (pt.l <= 0) {
                        this.arr.splice(i, 1);
                    }
                } else if (pt.type === 'T') {
                    ctx.globalAlpha = pt.l;
                    ctx.fillStyle = pt.c;
                    ctx.font = "900 24px sans-serif";
                    ctx.textAlign = "center";
                    ctx.strokeStyle = "rgb(0,0,0)";
                    ctx.lineWidth = 4;
                    ctx.strokeText(pt.txt, pt.x, pt.y);
                    ctx.fillText(pt.txt, pt.x, pt.y);
                    ctx.globalAlpha = 1;
                    pt.y += pt.vy;
                    pt.l -= 0.02;
                    if (pt.l <= 0) {
                        this.arr.splice(i, 1);
                    }
                }
            }
        }
    }

    let Engine = {
        cvs: document.getElementsByClassName('class-canvas')[0],
        ctx: null,
        cols: 30,
        rows: 17,
        sz: 40,
        grid: [],
        uid: null,
        res: {
            g: 200,
            w: 100,
            s: 0
        },
        run: false,
        pt: new Particles(),
        hov: null,
        src: null,
        tgt: null,
        lastClk: 0,
        isHost: false,
        pal: [
            'rgb(59, 130, 246)',
            'rgb(239, 68, 68)',
            'rgb(16, 185, 129)',
            'rgb(245, 158, 11)',
            'rgb(139, 92, 246)',
            'rgb(236, 72, 153)'
        ],

        start: function(hostFlag) {
            this.ctx = this.cvs.getContext('2d');
            this.uid = window.API.uid;
            this.isHost = hostFlag;
            UI.show('class-screen-lobby');

            let pathStatus = 'rooms/' + window.API.room + '/status';
            let pathMap = 'rooms/' + window.API.room + '/map';

            if (hostFlag) {
                this.genMap();
                let flat = {};
                for (let y = 0; y < this.rows; y++) {
                    for (let x = 0; x < this.cols; x++) {
                        let k = x + '_' + y;
                        flat[k] = this.grid[y][x];
                    }
                }
                
                let obj = {
                    status: 'waiting',
                    map: flat
                };
                
                window.FirebaseHelpers.setRef('rooms/' + window.API.room, obj);
                window.FirebaseHelpers.onDiscRef('rooms/' + window.API.room).remove();
                
                document.getElementsByClassName('class-lobby-status')[0].innerText = "Oczekuje na gracza...";
                
                window.FirebaseHelpers.onValRef(pathStatus, function(snap) {
                    if (snap.val() === 'playing') {
                        Engine.beginGame();
                    }
                });
            } else {
                document.getElementsByClassName('class-lobby-status')[0].innerText = "Szukam serwera...";
                
                window.FirebaseHelpers.getRef(pathStatus, function(snap) {
                    if (snap.exists() && snap.val() === 'waiting') {
                        let uObj = {};
                        uObj[pathStatus] = 'playing';
                        window.FirebaseHelpers.updateRef('/', uObj);
                        Engine.beginGame();
                    } else {
                        UI.toast("Brak pokoju!", true);
                        UI.show('class-screen-main');
                    }
                });
            }
        },

        beginGame: function() {
            document.getElementsByClassName('class-game-ui')[0].style.display = 'flex';
            UI.show('class-game-ui');
            
            let pathMap = 'rooms/' + window.API.room + '/map';
            
            window.FirebaseHelpers.getRef(pathMap, function(snap) {
                let data = snap.val();
                Engine.grid = [];
                for (let y = 0; y < Engine.rows; y++) {
                    let rArr = [];
                    for (let x = 0; x < Engine.cols; x++) {
                        let k = x + '_' + y;
                        rArr.push(data[k]);
                    }
                    Engine.grid.push(rArr);
                }
                
                Engine.spawn();
                Engine.bindInput();
                
                window.FirebaseHelpers.onValRef(pathMap, function(nSnap) {
                    let nData = nSnap.val();
                    if (nData) {
                        for (let y = 0; y < Engine.rows; y++) {
                            for (let x = 0; x < Engine.cols; x++) {
                                let k = x + '_' + y;
                                let cell = nData[k];
                                Engine.grid[y][x].own = cell.own;
                                Engine.grid[y][x].t = cell.t;
                                Engine.grid[y][x].b = cell.b;
                            }
                        }
                    }
                });
                
                setInterval(function() {
                    Engine.ecoTick();
                }, 1000);
                
                Engine.run = true;
                Engine.loop();
                UI.toast("Zaczynamy!", false);
            });
        },

        genMap: function() {
            this.grid = [];
            for (let y = 0; y < this.rows; y++) {
                let rArr = [];
                for (let x = 0; x < this.cols; x++) {
                    let wFlag = false;
                    if (x === 0 || y === 0 || x === this.cols - 1 || y === this.rows - 1) {
                        wFlag = true;
                    } else if (Math.random() < 0.15) {
                        wFlag = true;
                    }
                    
                    let tr = 0;
                    if (!wFlag) {
                        tr = Math.floor(Math.random() * 4);
                    }
                    
                    let obj = {
                        x: x,
                        y: y,
                        own: 0,
                        t: tr,
                        w: wFlag,
                        b: null
                    };
                    rArr.push(obj);
                }
                this.grid.push(rArr);
            }
        },

        spawn: function() {
            let arr = [];
            for (let y = 0; y < this.rows; y++) {
                for (let x = 0; x < this.cols; x++) {
                    let cell = this.grid[y][x];
                    if (!cell.w && cell.own === 0) {
                        arr.push(cell);
                    }
                }
            }
            if (arr.length > 0) {
                let rIdx = Math.floor(Math.random() * arr.length);
                let sc = arr[rIdx];
                sc.own = this.uid;
                sc.t = 100;
                
                let p = 'rooms/' + window.API.room + '/map/' + sc.x + '_' + sc.y;
                let obj = {
                    own: this.uid,
                    t: 100
                };
                window.FirebaseHelpers.updateRef(p, obj);
            }
        },

        ecoTick: function() {
            let tot = 0;
            let alive = false;
            
            for (let y = 0; y < this.rows; y++) {
                for (let x = 0; x < this.cols; x++) {
                    let cell = this.grid[y][x];
                    if (cell.own === this.uid) {
                        alive = true;
                        
                        let inc = 1;
                        if (cell.b === 'barracks') {
                            inc = 5;
                        }
                        
                        cell.t += inc;
                        tot += cell.t;
                        
                        this.res.g += 1;
                        if (cell.b === 'mine') {
                            this.res.g += 5;
                        }
                        if (cell.b === 'wood') {
                            this.res.w += 5;
                        }
                        if (cell.b === 'quarry') {
                            this.res.s += 3;
                        }
                        
                        let p = 'rooms/' + window.API.room + '/map/' + x + '_' + y;
                        let obj = {
                            t: cell.t
                        };
                        window.FirebaseHelpers.updateRef(p, obj);
                    }
                }
            }
            
            if (!alive) {
                UI.toast("Porażka!", true);
            }
            
            UI.updateRes(this.res.g, this.res.w, this.res.s, tot);
        },

        bindInput: function() {
            this.cvs.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });
            
            this.cvs.addEventListener('mousemove', function(e) {
                let r = Engine.cvs.getBoundingClientRect();
                let sx = Engine.cvs.width / r.width;
                let sy = Engine.cvs.height / r.height;
                
                let x = Math.floor(((e.clientX - r.left) * sx) / Engine.sz);
                let y = Math.floor(((e.clientY - r.top) * sy) / Engine.sz);
                
                if (x >= 0 && x < Engine.cols && y >= 0 && y < Engine.rows) {
                    Engine.hov = Engine.grid[y][x];
                }
            });

            this.cvs.addEventListener('mousedown', function(e) {
                if (!Engine.hov || Engine.hov.w) {
                    Engine.src = null;
                    return;
                }
                
                if (e.button === 2) {
                    if (Engine.hov.own === Engine.uid) {
                        if (!Engine.hov.b) {
                            let list = document.getElementsByClassName('class-build-list')[0];
                            list.innerHTML = '';
                            
                            for (let key in B_DB) {
                                let bData = B_DB[key];
                                let okFlag = true;
                                let strC = '';
                                
                                if (bData.g > 0) {
                                    strC += ' M:' + bData.g;
                                    if (Engine.res.g < bData.g) {
                                        okFlag = false;
                                    }
                                }
                                if (bData.w > 0) {
                                    strC += ' D:' + bData.w;
                                    if (Engine.res.w < bData.w) {
                                        okFlag = false;
                                    }
                                }
                                if (bData.s > 0) {
                                    strC += ' K:' + bData.s;
                                    if (Engine.res.s < bData.s) {
                                        okFlag = false;
                                    }
                                }
                                
                                let d = document.createElement('div');
                                d.className = 'build-item';
                                
                                let htm = '<div><div style="font-weight:900;color:rgb(59,130,246);font-size:1.1rem;">';
                                htm += bData.i + ' ' + bData.n;
                                htm += '</div><div style="color:rgb(148,163,184);font-size:0.8rem;margin:3px 0;">';
                                htm += bData.d;
                                htm += '</div><div style="color:rgb(245,158,11);font-size:0.85rem;font-weight:bold;">';
                                htm += strC;
                                htm += '</div></div><button class="btn ';
                                
                                if (okFlag) {
                                    htm += 'btn-green';
                                } else {
                                    htm += 'btn-red';
                                }
                                
                                htm += '" style="width:auto;padding:10px 20px;margin:0;" ';
                                
                                if (!okFlag) {
                                    htm += 'disabled';
                                }
                                
                                htm += '>Zbuduj</button>';
                                d.innerHTML = htm;
                                
                                let btn = d.getElementsByTagName('button')[0];
                                btn.addEventListener('click', function() {
                                    if (bData.g > 0) Engine.res.g -= bData.g;
                                    if (bData.w > 0) Engine.res.w -= bData.w;
                                    if (bData.s > 0) Engine.res.s -= bData.s;
                                    
                                    Engine.hov.b = key;
                                    
                                    let p = 'rooms/' + window.API.room + '/map/' + Engine.hov.x + '_' + Engine.hov.y;
                                    let obj = {
                                        b: key
                                    };
                                    window.FirebaseHelpers.updateRef(p, obj);
                                    
                                    UI.closeModals();
                                    UI.toast("Zbudowano!", false);
                                });
                                
                                list.appendChild(d);
                            }
                            
                            document.getElementsByClassName('class-modal-overlay')[0].style.display = 'block';
                            document.getElementsByClassName('class-modal-build')[0].style.display = 'flex';
                        } else {
                            UI.toast("Miejsce zajete!", true);
                        }
                    }
                    return;
                }

                if (e.button === 0) {
                    let nTime = Date.now();
                    let diff = nTime - Engine.lastClk;
                    
                    if (diff < 400 && Engine.src) {
                        let dX = Math.abs(Engine.src.x - Engine.hov.x);
                        let dY = Math.abs(Engine.src.y - Engine.hov.y);
                        let mDist = Math.max(dX, dY);
                        
                        if (mDist === 1) {
                            if (Engine.src.t > 1) {
                                Engine.tgt = Engine.hov;
                                
                                let sObj = document.getElementsByClassName('class-move-slider')[0];
                                let mxV = Math.max(1, Engine.src.t - 1);
                                
                                sObj.min = 1;
                                sObj.max = mxV;
                                sObj.value = Math.floor(mxV / 2);
                                
                                document.getElementsByClassName('class-move-val')[0].innerText = sObj.value;
                                document.getElementsByClassName('class-move-max')[0].innerText = mxV;
                                
                                document.getElementsByClassName('class-modal-overlay')[0].style.display = 'block';
                                document.getElementsByClassName('class-modal-move')[0].style.display = 'flex';
                            } else {
                                UI.toast("Za malo jednostek!", true);
                            }
                        } else if (mDist > 1) {
                            UI.toast("Za daleko!", true);
                        }
                    } else {
                        if (Engine.hov.own === Engine.uid) {
                            Engine.src = Engine.hov;
                        } else {
                            Engine.src = null;
                        }
                    }
                    Engine.lastClk = nTime;
                }
            });
        },

        executeMove: function() {
            if (!this.src || !this.tgt) {
                return;
            }
            
            let sObj = document.getElementsByClassName('class-move-slider')[0];
            let v = parseInt(sObj.value);
            
            if (this.src.t <= v) {
                return;
            }
            
            this.src.t -= v;
            
            let pSx = this.src.x * this.sz + this.sz / 2;
            let pSy = this.src.y * this.sz + this.sz / 2;
            
            let pTx = this.tgt.x * this.sz + this.sz / 2;
            let pTy = this.tgt.y * this.sz + this.sz / 2;
            
            let cSum = 0;
            let strU = String(this.uid);
            for (let i = 0; i < strU.length; i++) {
                cSum += strU.charCodeAt(i);
            }
            let cCol = this.pal[cSum % this.pal.length];
            
            this.pt.addLaser(pSx, pSy, pTx, pTy, cCol);
            
            setTimeout(function() {
                if (Engine.tgt.own === Engine.uid) {
                    Engine.tgt.t += v;
                    Engine.pt.addTxt(pTx, pTy, '+' + v, 'rgb(16, 185, 129)');
                } else {
                    let dMult = 1;
                    if (Engine.tgt.b === 'fort') {
                        dMult = 2;
                    }
                    
                    let eDef = Engine.tgt.t * dMult;
                    
                    if (v > eDef) {
                        Engine.tgt.own = Engine.uid;
                        Engine.tgt.t = Math.floor(v - eDef);
                        Engine.tgt.b = null;
                        
                        UI.toast("Zwyciestwo!", false);
                        Engine.pt.addTxt(pTx, pTy, "WIN", cCol);
                    } else {
                        Engine.tgt.t = Math.floor((eDef - v) / dMult);
                        
                        UI.toast("Obrona odparla atak.", true);
                        Engine.pt.addTxt(pTx, pTy, '-' + v, 'rgb(239, 68, 68)');
                    }
                }
                
                let uObj = {};
                let pS = Engine.src.x + '_' + Engine.src.y;
                let pT = Engine.tgt.x + '_' + Engine.tgt.y;
                
                uObj[pS + '/t'] = Engine.src.t;
                uObj[pT + '/own'] = Engine.tgt.own;
                uObj[pT + '/t'] = Engine.tgt.t;
                uObj[pT + '/b'] = Engine.tgt.b;
                
                window.FirebaseHelpers.updateRef('rooms/' + window.API.room + '/map', uObj);
                
            }, 400);

            UI.closeModals();
            this.src = null;
        },

        render: function() {
            this.ctx.fillStyle = 'rgb(2, 6, 23)';
            this.ctx.fillRect(0, 0, this.cvs.width, this.cvs.height);
            
            for (let y = 0; y < this.rows; y++) {
                for (let x = 0; x < this.cols; x++) {
                    let cell = this.grid[y][x];
                    let px = x * this.sz;
                    let py = y * this.sz;
                    
                    if (cell.w) {
                        this.ctx.fillStyle = 'rgb(14, 165, 233)';
                    } else {
                        if (cell.own === 0) {
                            this.ctx.fillStyle = 'rgb(30, 41, 59)';
                        } else {
                            let cSum = 0;
                            let strU = String(cell.own);
                            for (let i = 0; i < strU.length; i++) {
                                cSum += strU.charCodeAt(i);
                            }
                            this.ctx.fillStyle = this.pal[cSum % this.pal.length];
                        }
                    }
                    
                    this.ctx.fillRect(px, py, this.sz, this.sz);
                    
                    this.ctx.strokeStyle = 'rgba(0, 0, 0, 0.6)';
                    this.ctx.lineWidth = 1;
                    this.ctx.strokeRect(px, py, this.sz, this.sz);
                    
                    if (cell.b && B_DB[cell.b]) {
                        this.ctx.fillStyle = "rgb(255, 255, 255)";
                        this.ctx.font = "20px sans-serif";
                        this.ctx.textAlign = "center";
                        this.ctx.fillText(B_DB[cell.b].i, px + this.sz / 2, py + 24);
                    }
                    
                    if (!cell.w && (cell.t > 0 || cell.own !== 0)) {
                        this.ctx.fillStyle = "rgb(255, 255, 255)";
                        this.ctx.font = "900 15px sans-serif";
                        this.ctx.textAlign = "center";
                        this.ctx.shadowColor = "rgb(0, 0, 0)";
                        this.ctx.shadowBlur = 4;
                        this.ctx.fillText(Math.floor(cell.t), px + this.sz / 2, py + this.sz - 4);
                        this.ctx.shadowBlur = 0;
                    }
                    
                    if (this.hov === cell && !cell.w) {
                        this.ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
                        this.ctx.fillRect(px, py, this.sz, this.sz);
                    }
                    
                    if (this.src === cell) {
                        let pls = Math.abs(Math.sin(Date.now() / 200)) * 2;
                        this.ctx.strokeStyle = "rgba(245, 158, 11, 0.9)";
                        this.ctx.lineWidth = 3 + pls;
                        this.ctx.strokeRect(px + 2, py + 2, this.sz - 4, this.sz - 4);
                        this.ctx.lineWidth = 1;
                    }
                }
            }
            
            this.pt.render(this.ctx);
        },

        loop: function() {
            if (this.run) {
                this.render();
                let refSelf = this;
                requestAnimationFrame(function() {
                    refSelf.loop();
                });
            }
        }
    };

    document.getElementsByClassName('class-btn-host')[0].addEventListener('click', function() {
        Engine.start(true);
    });

    document.getElementsByClassName('class-btn-join')[0].addEventListener('click', function() {
        Engine.start(false);
    });

    document.getElementsByClassName('class-btn-cancel-lobby')[0].addEventListener('click', function() {
        UI.show('class-screen-main');
        if (Engine.isHost) {
            window.FirebaseHelpers.setRef('rooms/' + window.API.room, null);
        }
    });

    document.getElementsByClassName('class-move-slider')[0].addEventListener('input', function() {
        document.getElementsByClassName('class-move-val')[0].innerText = this.value;
    });

    document.getElementsByClassName('class-btn-cancel-move')[0].addEventListener('click', function() {
        UI.closeModals();
        Engine.tgt = null;
    });

    document.getElementsByClassName('class-btn-cancel-build')[0].addEventListener('click', function() {
        UI.closeModals();
    });

    document.getElementsByClassName('class-btn-confirm-move')[0].addEventListener('click', function() {
        Engine.executeMove();
    });

</script>
</body>
