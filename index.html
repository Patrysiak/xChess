<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age of Territorial - Giga Edition</title>
    <style>
        /* ==========================================================================
           1. CSS - ZAAWANSOWANE STYLE INTERFEJSU
           ========================================================================== */
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(15, 20, 25, 0.95);
            --panel-border: #2a3b4c;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
            --accent-gold: #fbbf24;
            --ui-font: 'Segoe UI', system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--ui-font);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* GŁÓWNE MENU OPARTE NA FIREBASE */
        #main-menu {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, #1a2333 0%, #050505 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-title {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: transparent;
            -webkit-text-stroke: 2px var(--accent-blue);
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            margin-bottom: 20px;
            animation: pulseTitle 3s infinite alternate;
        }

        @keyframes pulseTitle {
            from { text-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
            to { text-shadow: 0 0 50px rgba(59, 130, 246, 0.8); }
        }

        .menu-status {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .menu-btn {
            background: transparent;
            border: 2px solid var(--panel-border);
            color: var(--text-main);
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
            border-radius: 8px;
            width: 400px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .menu-btn:hover::before {
            left: 100%;
        }

        .menu-btn:hover {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .menu-btn.primary {
            background: rgba(34, 197, 94, 0.1);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .menu-btn.primary:hover {
            background: var(--accent-green);
            color: #000;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.5);
        }

        /* HUD PODCZAS GRY */
        #game-ui {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            position: relative;
        }

        #top-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            border-bottom: 2px solid var(--panel-border);
            padding: 15px 30px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .resource-container {
            display: flex;
            gap: 20px;
        }

        .resource-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 20px;
            border-radius: 6px;
            border: 1px solid var(--panel-border);
            font-size: 1.2rem;
            font-weight: bold;
        }

        .res-icon { font-size: 1.5rem; }
        .res-gold { color: var(--accent-gold); }
        .res-wood { color: #b45309; }
        .res-stone { color: #94a3b8; }
        .res-troops { color: var(--accent-red); }

        .game-hints {
            text-align: right;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .game-hints strong {
            color: var(--accent-blue);
        }

        /* KONTENER MAPY */
        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: #020617;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: crosshair;
        }

        canvas {
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 1px solid #1e293b;
        }

        /* MENU BUDOWANIA - PRAWY PANEL */
        #build-panel {
            position: absolute;
            right: -400px;
            top: 80px;
            width: 350px;
            height: calc(100vh - 100px);
            background: var(--panel-bg);
            border-left: 2px solid var(--panel-border);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 50;
            overflow-y: auto;
        }

        #build-panel.open {
            right: 0;
        }

        .panel-header {
            font-size: 1.5rem;
            color: var(--accent-blue);
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-panel-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-panel-btn:hover { color: var(--accent-red); }

        .build-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 15px;
            transition: 0.2s;
        }

        .build-card:hover {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.05);
        }

        .build-card h3 { color: var(--text-main); margin-bottom: 5px; }
        .build-card p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px; }
        .build-cost { font-size: 0.85rem; display: flex; gap: 10px; margin-bottom: 10px; }
        
        .build-action-btn {
            width: 100%;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .build-action-btn:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
        }

        /* TOOLTIPY I POWIADOMIENIA */
        #notification-area {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            z-index: 100;
        }

        .toast-msg {
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            border: 1px solid var(--panel-border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease-out, fadeOut 0.5s ease-in 2.5s forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>

    <script>
        /**
         * ZAAWANSOWANA BAZA DANYCH GRY
         */
        const DATABASE = {
            buildings: {
                mine: { id: 'mine', name: 'Kopalnia Złota', desc: 'Wydobywa cenne kruszce z ziemi. +5 Złota/s.', cost: { gold: 50 }, icon: '🪙', color: '#f59e0b' },
                lumberjack: { id: 'lumberjack', name: 'Chata Drwala', desc: 'Pozyskuje drewno z okolicznych lasów. +5 Drewna/s.', cost: { gold: 30 }, icon: '🪵', color: '#b45309' },
                quarry: { id: 'quarry', name: 'Kamieniołom', desc: 'Wydobywa kamień na grube mury. +3 Kamienia/s.', cost: { gold: 60, wood: 20 }, icon: '🪨', color: '#94a3b8' },
                barracks: { id: 'barracks', name: 'Koszary', desc: 'Szkoli elitarne jednostki. Przyrost wojska x4.', cost: { gold: 120, wood: 50 }, icon: '⛺', color: '#ef4444' },
                fort: { id: 'fort', name: 'Forteca', desc: 'Zwiększa odporność prowincji na ataki wroga.', cost: { stone: 100, wood: 100 }, icon: '🏰', color: '#475569' }
            },
            colors: {
                player: '#3b82f6',
                bots: ['#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'],
                neutral: '#1e293b',
                water: '#0ea5e9'
            }
        };

        /**
         * SYSTEM CZĄSTECZEK (PARTICLE ENGINE) - ANIMACJE DOPRACOWANE
         */
        class ParticleEngine {
            constructor() {
                this.particles = [];
                this.floatingTexts = [];
            }

            // Tworzy eksplozję iskier przy ataku
            createExplosion(x, y, color, count = 15) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 3 + 1;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1.0,
                        decay: Math.random() * 0.05 + 0.02,
                        color: color,
                        size: Math.random() * 3 + 1
                    });
                }
            }

            // Tworzy laser/wiązke ataku między dwiema prowincjami
            createLaser(sx, sy, tx, ty, color) {
                this.particles.push({
                    type: 'laser',
                    sx: sx, sy: sy,
                    tx: tx, ty: ty,
                    progress: 0,
                    life: 1.0,
                    color: color
                });
            }

            // Tworzy unoszący się tekst (np. obrażenia -15)
            createFloatingText(x, y, text, color) {
                this.floatingTexts.push({
                    x: x + (Math.random() * 20 - 10),
                    y: y + (Math.random() * 10 - 5),
                    text: text,
                    life: 1.0,
                    color: color,
                    vy: -1 - Math.random()
                });
            }

            updateAndDraw(ctx) {
                // Rysowanie i aktualizacja iskier i laserów
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];
                    
                    if (p.type === 'laser') {
                        ctx.beginPath();
                        ctx.moveTo(p.sx, p.sy);
                        let currentX = p.sx + (p.tx - p.sx) * p.progress;
                        let currentY = p.sy + (p.ty - p.sy) * p.progress;
                        ctx.lineTo(currentX, currentY);
                        ctx.strokeStyle = p.color;
                        ctx.lineWidth = 4 * p.life;
                        ctx.lineCap = "round";
                        ctx.stroke();
                        
                        p.progress += 0.1;
                        p.life -= 0.05;
                        if (p.progress >= 1) {
                            // Gdy laser dotrze do celu, stwórz eksplozję
                            this.createExplosion(p.tx, p.ty, p.color, 10);
                            this.particles.splice(i, 1);
                        }
                    } else {
                        // Zwykła iskra
                        ctx.globalAlpha = p.life;
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = 1.0;

                        p.x += p.vx;
                        p.y += p.vy;
                        p.life -= p.decay;
                        
                        if (p.life <= 0) this.particles.splice(i, 1);
                    }
                }

                // Rysowanie i aktualizacja pływających tekstów
                for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
                    let ft = this.floatingTexts[i];
                    
                    ctx.globalAlpha = ft.life;
                    ctx.fillStyle = ft.color;
                    ctx.font = "bold 18px 'Segoe UI'";
                    ctx.textAlign = "center";
                    // Obrys tekstu dla czytelności
                    ctx.strokeStyle = "black";
                    ctx.lineWidth = 3;
                    ctx.strokeText(ft.text, ft.x, ft.y);
                    ctx.fillText(ft.text, ft.x, ft.y);
                    ctx.globalAlpha = 1.0;

                    ft.y += ft.vy;
                    ft.life -= 0.02;

                    if (ft.life <= 0) this.floatingTexts.splice(i, 1);
                }
            }
        }

        /**
         * KLASA GRACZA / BOTA
         */
        class PlayerEntity {
            constructor(id, color, isAI) {
                this.id = id;
                this.color = color;
                this.isAI = isAI;
                this.resources = { gold: 200, wood: 100, stone: 0 };
                this.totalTroops = 0;
            }
        }

        /**
         * GŁÓWNY SILNIK LOGIKI
         */
        const Engine = {
            canvas: document.getElementById('gameCanvas'),
            ctx: document.getElementById('gameCanvas').getContext('2d'),
            
            // Konfiguracja mapy
            cols: 28,
            rows: 16,
            provSize: 50,
            
            grid: [],
            players: new Map(),
            localPlayerId: 1,
            
            // System interakcji
            hoveredProv: null,
            selectedProv: null,
            
            // Systemy poboczne
            particles: new ParticleEngine(),
            isRunning: false,

            // INICJALIZACJA
            startGame() {
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                
                this.setupPlayers();
                this.generateMap();
                this.bindInput();
                
                this.isRunning = true;
                
                // Pętle logiczne gry
                setInterval(() => this.tickEconomy(), 1000); // Ekonomia co 1 sekundę
                setInterval(() => this.processAI(), 2500); // Decyzje botów co 2.5 sekundy
                
                this.gameLoop();
                UI.showToast("Gra rozpoczęta! Zbuduj potęgę.", "success");
            },

            setupPlayers() {
                this.players.set(1, new PlayerEntity(1, DATABASE.colors.player, false));
                // Dodajemy boty
                DATABASE.colors.bots.forEach((color, index) => {
                    this.players.set(index + 2, new PlayerEntity(index + 2, color, true));
                });
            },

            // GENERACJA PROCEDURALNA MAPY (Wyspy, Kontynenty, Surowce)
            generateMap() {
                this.grid = [];
                for (let y = 0; y < this.rows; y++) {
                    let row = [];
                    for (let x = 0; x < this.cols; x++) {
                        // Tworzenie szumu dla wody na krawędziach
                        let isEdge = x === 0 || y === 0 || x === this.cols - 1 || y === this.rows - 1;
                        let isWater = isEdge || Math.random() < 0.15;
                        
                        row.push({
                            x: x, y: y,
                            owner: 0,
                            troops: isWater ? 0 : Math.floor(Math.random() * 10) + 1,
                            building: null,
                            isWater: isWater
                        });
                    }
                    this.grid.push(row);
                }

                // Rozstawianie startowych stolic (gwarancja że nie wpadną do wody)
                let spawnPoints = [
                    { x: 3, y: 3, id: 1 }, // Gracz
                    { x: 24, y: 3, id: 2 },
                    { x: 3, y: 12, id: 3 },
                    { x: 24, y: 12, id: 4 },
                    { x: 13, y: 7, id: 5 }
                ];

                spawnPoints.forEach(spawn => {
                    let p = this.grid[spawn.y][spawn.x];
                    p.isWater = false;
                    p.owner = spawn.id;
                    p.troops = 100;
                    p.building = 'fort'; // Stolica ma darmowy fort
                });
            },

            // EKONOMIA
            tickEconomy() {
                // Reset sumy wojska dla UI
                this.players.forEach(p => p.totalTroops = 0);

                for (let y = 0; y < this.rows; y++) {
                    for (let x = 0; x < this.cols; x++) {
                        let p = this.grid[y][x];
                        if (p.owner === 0 || p.isWater) continue;

                        let player = this.players.get(p.owner);
                        
                        // Przyrost wojska
                        let troopInc = 1;
                        if (p.building === 'barracks') troopInc += 4;
                        p.troops += troopInc;
                        player.totalTroops += p.troops;

                        // Przyrost surowców
                        player.resources.gold += 1; // Dochód bazowy z podatków
                        if (p.building === 'mine') player.resources.gold += 5;
                        if (p.building === 'lumberjack') player.resources.wood += 5;
                        if (p.building === 'quarry') player.resources.stone += 3;
                    }
                }

                UI.updateHUD();
            },

            // LOGIKA RUCHU I WALKI (AGE OF HISTORY STYLE)
            executeMove(source, target, ownerId) {
                // Zabezpieczenia
                if (target.isWater) {
                    if(ownerId === this.localPlayerId) UI.showToast("Woda zablokowana! Żegluga niedostępna.", "error");
                    return;
                }

                let troopsToMove = Math.floor(source.troops / 2);
                if (troopsToMove < 1) return;

                source.troops -= troopsToMove;

                let pxSource = source.x * this.provSize + this.provSize/2;
                let pySource = source.y * this.provSize + this.provSize/2;
                let pxTarget = target.x * this.provSize + this.provSize/2;
                let pyTarget = target.y * this.provSize + this.provSize/2;

                let playerColor = this.players.get(ownerId).color;

                // Dodaj animację lasera/ruchu
                this.particles.createLaser(pxSource, pySource, pxTarget, pyTarget, playerColor);

                // Algorytm walki wywoływany z opóźnieniem (symulacja podróży wojsk)
                setTimeout(() => {
                    if (target.owner === ownerId) {
                        // Przerzut wojsk
                        target.troops += troopsToMove;
                        this.particles.createFloatingText(pxTarget, pyTarget, `+${troopsToMove}`, '#22c55e');
                    } else {
                        // Walka
                        let defenseBonus = target.building === 'fort' ? 1.5 : 1.0;
                        let effectiveDefense = target.troops * defenseBonus;

                        if (troopsToMove > effectiveDefense) {
                            // Zwycięstwo (Zdobycie prowincji)
                            let remaining = Math.floor(troopsToMove - effectiveDefense);
                            target.owner = ownerId;
                            target.troops = remaining > 0 ? remaining : 1;
                            
                            // Niszczenie wrogich budynków przy podboju (szansa)
                            if (target.building === 'fort' || Math.random() > 0.5) {
                                target.building = null;
                            }
                            
                            this.particles.createExplosion(pxTarget, pyTarget, playerColor, 20);
                            this.particles.createFloatingText(pxTarget, pyTarget, "ZDOBYTE!", playerColor);
                            
                        } else {
                            // Porażka (Odbicie ataku)
                            target.troops = Math.floor((effectiveDefense - troopsToMove) / defenseBonus);
                            this.particles.createFloatingText(pxTarget, pyTarget, `Obrona! -${troopsToMove}`, '#ef4444');
                        }
                    }
                }, 500); // 500ms opóźnienia na podróż lasera
            },

            // SZTUCZNA INTELIGENCJA BOTÓW
            processAI() {
                this.players.forEach(bot => {
                    if (!bot.isAI) return;

                    let myProvs = [];
                    for (let y = 0; y < this.rows; y++) {
                        for (let x = 0; x < this.cols; x++) {
                            if (this.grid[y][x].owner === bot.id) myProvs.push(this.grid[y][x]);
                        }
                    }
                    if (myProvs.length === 0) return; // Bot zniszczony

                    // Faza 1: Szukanie celu do ataku z najsilniejszej prowincji
                    let strongest = myProvs.reduce((p, c) => p.troops > c.troops ? p : c);
                    
                    if (strongest.troops > 25) {
                        let neighbors = [];
                        // Sprawdzanie 8 sąsiadów
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                let nx = strongest.x + dx, ny = strongest.y + dy;
                                if (nx >= 0 && nx < this.cols && ny >= 0 && ny < this.rows && (dx !== 0 || dy !== 0)) {
                                    let candidate = this.grid[ny][nx];
                                    if (!candidate.isWater && candidate.owner !== bot.id) {
                                        neighbors.push(candidate);
                                    }
                                }
                            }
                        }

                        if (neighbors.length > 0) {
                            // Wybierz najsłabszego sąsiada, żeby zoptymalizować atak
                            neighbors.sort((a, b) => a.troops - b.troops);
                            this.executeMove(strongest, neighbors[0], bot.id);
                        }
                    }

                    // Faza 2: Ekonomia Bota (Rozbudowa)
                    if (bot.resources.gold > 150) {
                        let emptyProvs = myProvs.filter(p => p.building === null);
                        if (emptyProvs.length > 0) {
                            let buildTarget = emptyProvs[Math.floor(Math.random() * emptyProvs.length)];
                            // Prosty algorytm budowy
                            if (bot.resources.wood > 50) {
                                buildTarget.building = 'barracks';
                                bot.resources.gold -= 120; bot.resources.wood -= 50;
                            } else {
                                buildTarget.building = 'mine';
                                bot.resources.gold -= 50;
                            }
                        }
                    }
                });
            },

            // STEROWANIE I MYSZ
            bindInput() {
                // Śledzenie myszki (Hover)
                this.canvas.addEventListener('mousemove', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    // Skalowanie w przypadku innej rozdzielczości CSS
                    const scaleX = this.canvas.width / rect.width;
                    const scaleY = this.canvas.height / rect.height;
                    
                    let mouseX = (e.clientX - rect.left) * scaleX;
                    let mouseY = (e.clientY - rect.top) * scaleY;
                    
                    let x = Math.floor(mouseX / this.provSize);
                    let y = Math.floor(mouseY / this.provSize);
                    
                    if(x >= 0 && x < this.cols && y >= 0 && y < this.rows) {
                        this.hoveredProv = this.grid[y][x];
                    }
                });

                // Kliknięcia (Logika selekcji)
                this.canvas.addEventListener('mousedown', (e) => {
                    if (!this.hoveredProv || this.hoveredProv.isWater) return;

                    // PRAWY PRZYCISK - Menu Budowy
                    if (e.button === 2) {
                        if (this.hoveredProv.owner === this.localPlayerId) {
                            UI.openBuildPanel(this.hoveredProv);
                        } else {
                            UI.showToast("Możesz budować tylko na swoich terenach!", "error");
                        }
                        return;
                    }

                    // LEWY PRZYCISK - Ruch i Walka
                    if (e.button === 0) {
                        UI.closeBuildPanel(); // Zamknij menu przy kliknięciu lpm
                        
                        if (this.selectedProv) {
                            // Sprawdź zasięg (max 1 pole w Każdą stronę, wliczając skosy - Age of History)
                            let dist = Math.max(Math.abs(this.selectedProv.x - this.hoveredProv.x), Math.abs(this.selectedProv.y - this.hoveredProv.y));
                            
                            if (dist === 1) {
                                this.executeMove(this.selectedProv, this.hoveredProv, this.localPlayerId);
                                this.selectedProv = null; // Odznacz
                            } else if (dist === 0) {
                                this.selectedProv = null; // Kliknięcie w to samo odznacza
                            } else {
                                // Kliknięto za daleko. Jeśli to twoje - zaznacz to jako nowe źródło
                                if (this.hoveredProv.owner === this.localPlayerId) {
                                    this.selectedProv = this.hoveredProv;
                                } else {
                                    this.selectedProv = null;
                                }
                            }
                        } else {
                            // Zaznacz źródło
                            if (this.hoveredProv.owner === this.localPlayerId && this.hoveredProv.troops > 1) {
                                this.selectedProv = this.hoveredProv;
                            }
                        }
                    }
                });

                // Zablokuj domyślne menu kontekstowe przeglądarki
                this.canvas.addEventListener('contextmenu', e => e.preventDefault());
            },

            // RENDEROWANIE GŁÓWNE
            draw() {
                // Tło (czyszczenie)
                this.ctx.fillStyle = DATABASE.colors.neutral;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // 1. Rysowanie Mapy i Prowincji
                for (let y = 0; y < this.rows; y++) {
                    for (let x = 0; x < this.cols; x++) {
                        let p = this.grid[y][x];
                        let px = x * this.provSize;
                        let py = y * this.provSize;

                        // Rysowanie Kafelka
                        if (p.isWater) {
                            this.ctx.fillStyle = DATABASE.colors.water;
                        } else {
                            if (p.owner === 0) {
                                this.ctx.fillStyle = '#1e293b'; // Szary dla neutralnych lądów
                            } else {
                                // Kolor gracza (z lekką przezroczystością, żeby wyglądało ładniej)
                                let ownerEntity = this.players.get(p.owner);
                                this.ctx.fillStyle = ownerEntity ? ownerEntity.color : '#fff';
                                this.ctx.globalAlpha = 0.8;
                            }
                        }

                        this.ctx.fillRect(px, py, this.provSize, this.provSize);
                        this.ctx.globalAlpha = 1.0;

                        // Rysowanie krawędzi kafelków (Granice prowincji)
                        this.ctx.strokeStyle = '#0f172a';
                        this.ctx.lineWidth = 1;
                        this.ctx.strokeRect(px, py, this.provSize, this.provSize);

                        if (p.isWater) continue; // Na wodzie nie rysujemy budynków i wojska

                        // 2. Rysowanie Budynków (Ikona na środku)
                        if (p.building && DATABASE.buildings[p.building]) {
                            let bData = DATABASE.buildings[p.building];
                            this.ctx.fillStyle = "white";
                            this.ctx.font = "20px 'Segoe UI'";
                            this.ctx.textAlign = "center";
                            this.ctx.textBaseline = "middle";
                            this.ctx.fillText(bData.icon, px + this.provSize/2, py + 20);
                        }

                        // 3. Rysowanie Liczby Wojsk (Na dole kafelka)
                        if (p.troops > 0 || p.owner !== 0) {
                            this.ctx.fillStyle = "white";
                            this.ctx.font = "bold 14px 'Segoe UI'";
                            this.ctx.textAlign = "center";
                            
                            // Efekt cienia dla lepszej czytelności tekstu
                            this.ctx.shadowColor = "black";
                            this.ctx.shadowBlur = 4;
                            this.ctx.fillText(Math.floor(p.troops), px + this.provSize/2, py + this.provSize - 5);
                            this.ctx.shadowBlur = 0; // Reset
                        }

                        // 4. Efekty Najechania i Zaznaczenia (Hover / Selected)
                        if (this.hoveredProv === p) {
                            this.ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
                            this.ctx.fillRect(px, py, this.provSize, this.provSize);
                        }

                        if (this.selectedProv === p) {
                            // Pulsująca żółta ramka
                            let pulse = Math.abs(Math.sin(Date.now() / 200)) * 2;
                            this.ctx.strokeStyle = "rgba(250, 204, 21, 0.8)";
                            this.ctx.lineWidth = 3 + pulse;
                            this.ctx.strokeRect(px + 2, py + 2, this.provSize - 4, this.provSize - 4);
                            
                            // Rysuj poświatę pokazującą zasięg ruchu
                            this.ctx.fillStyle = "rgba(250, 204, 21, 0.05)";
                            this.ctx.fillRect(px - this.provSize, py - this.provSize, this.provSize * 3, this.provSize * 3);
                        }
                    }
                }

                // 5. Rysowanie animacji z ParticleEngine
                this.particles.updateAndDraw(this.ctx);
            },

            // GŁÓWNA PĘTLA
            gameLoop() {
                if (!this.isRunning) return;
                this.draw();
                // Żądanie kolejnej klatki od przeglądarki (Zapewnia płynne 60 FPS)
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        /**
         * ZARZĄDZANIE HTML I INTERFEJSEM
         */
        const UI = {
            selectedProvForBuild: null,

            updateHUD() {
                let localPlayer = Engine.players.get(Engine.localPlayerId);
                if (!localPlayer) return;

                document.getElementById('hud-gold').innerText = localPlayer.resources.gold;
                document.getElementById('hud-wood').innerText = localPlayer.resources.wood;
                document.getElementById('hud-stone').innerText = localPlayer.resources.stone;
                document.getElementById('hud-troops').innerText = localPlayer.totalTroops;
            },

            formatCost(cost) {
                let html = '';
                if(cost.gold) html += `<span style="color: var(--accent-gold)">🪙 ${cost.gold}</span>`;
                if(cost.wood) html += `<span style="color: #b45309">🪵 ${cost.wood}</span>`;
                if(cost.stone) html += `<span style="color: #94a3b8">🪨 ${cost.stone}</span>`;
                return html;
            },

            openBuildPanel(prov) {
                this.selectedProvForBuild = prov;
                const panel = document.getElementById('build-panel');
                const container = document.getElementById('build-options-container');
                container.innerHTML = '';

                let localPlayer = Engine.players.get(Engine.localPlayerId);

                // Generowanie kart budynków na żywo na podstawie bazy
                for (let key in DATABASE.buildings) {
                    let b = DATABASE.buildings[key];
                    
                    // Sprawdzanie czy gracza stać
                    let canAfford = true;
                    for (let res in b.cost) {
                        if ((localPlayer.resources[res] || 0) < b.cost[res]) canAfford = false;
                    }

                    let card = document.createElement('div');
                    card.className = 'build-card';
                    card.innerHTML = `
                        <h3>${b.icon} ${b.name}</h3>
                        <p>${b.desc}</p>
                        <div class="build-cost">Koszt: ${this.formatCost(b.cost)}</div>
                        <button class="build-action-btn" ${canAfford ? '' : 'disabled'}>Zbuduj</button>
                    `;

                    // Akcja przycisku
                    card.querySelector('button').onclick = () => {
                        if (prov.building) {
                            this.showToast("Ta prowincja jest już zabudowana!", "error");
                            return;
                        }

                        // Pobranie opłaty
                        for (let res in b.cost) {
                            localPlayer.resources[res] -= b.cost[res];
                        }
                        
                        prov.building = b.id;
                        this.updateHUD();
                        this.closeBuildPanel();
                        this.showToast(`Zbudowano: ${b.name}`, "success");
                    };

                    container.appendChild(card);
                }

                panel.classList.add('open');
            },

            closeBuildPanel() {
                document.getElementById('build-panel').classList.remove('open');
                this.selectedProvForBuild = null;
            },

            showToast(message, type = 'info') {
                const area = document.getElementById('notification-area');
                const toast = document.createElement('div');
                toast.className = 'toast-msg';
                toast.innerText = message;
                
                if(type === 'error') toast.style.border = '2px solid var(--accent-red)';
                if(type === 'success') toast.style.border = '2px solid var(--accent-green)';
                
                area.appendChild(toast);

                // Automatyczne czyszczenie DOM po animacji (3s całkowitego czasu)
                setTimeout(() => {
                    if (toast.parentNode) toast.remove();
                }, 3000);
            }
        };
    </script>
