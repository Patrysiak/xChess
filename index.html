<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid: Discord x Messenger x Insta</title>
    <style>
        :root {
            /* Discord Colors */
            --bg-darkest: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-chat: #313338;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --bg-input: #383a40;
            
            /* Messenger & Insta Colors */
            --messenger-blue: #0084ff;
            --insta-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-darkest);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. DISCORD: Wąski panel nawigacyjny (Serwery/Opcje) */
        .app-nav {
            width: 70px;
            background-color: var(--bg-darkest);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
            gap: 10px;
        }

        .nav-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--bg-sidebar);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 20px;
        }

        .nav-icon:hover {
            border-radius: 15px;
            background-color: var(--messenger-blue);
            color: white;
        }

        .nav-icon.active {
            background: var(--insta-gradient);
            border-radius: 15px;
            color: white;
        }

        /* 2. MESSENGER/INSTA: Panel boczny z czatami i relacjami */
        .sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1f2023;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            border-bottom: 1px solid #1f2023;
        }

        /* INSTAGRAM: Relacje (Stories) */
        .stories-container {
            display: flex;
            padding: 15px;
            gap: 15px;
            overflow-x: auto;
            border-bottom: 1px solid #1f2023;
        }

        .stories-container::-webkit-scrollbar { display: none; }

        .story {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .story-img-wrapper {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            padding: 3px;
            background: var(--insta-gradient);
        }

        .story img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--bg-sidebar);
        }

        .story span {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* MESSENGER: Lista czatów */
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-item:hover { background-color: rgba(255, 255, 255, 0.05); }

        .chat-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
        }

        .chat-info h4 { margin: 0; font-size: 15px; color: white; }
        .chat-info p { margin: 4px 0 0 0; font-size: 13px; color: var(--text-muted); }

        /* 3. DISCORD/MESSENGER: Główny obszar czatu */
        .chat-area {
            flex: 1;
            background-color: var(--bg-chat);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            height: 70px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1f2023;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Wiadomości */
        .messages {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.received { justify-content: flex-start; }
        .message-row.sent { justify-content: flex-end; }

        .message-bubble {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
        }

        .received .message-bubble {
            background-color: var(--bg-input);
            border-bottom-left-radius: 5px;
        }

        .sent .message-bubble {
            background-color: var(--messenger-blue);
            color: white;
            border-bottom-right-radius: 5px;
        }

        /* INSTA: Przycisk polubienia wiadomości */
        .like-btn {
            position: absolute;
            bottom: -10px;
            right: -10px;
            background: var(--bg-sidebar);
            border-radius: 50%;
            padding: 4px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #1f2023;
            display: none;
        }

        .message-bubble:hover .like-btn { display: block; }
        .like-btn:active { transform: scale(1.2); }

        /* Pole wpisywania */
        .input-area {
            padding: 20px;
        }

        .input-wrapper {
            background-color: var(--bg-input);
            border-radius: 24px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            outline: none;
            font-size: 15px;
        }

        .action-icon {
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            transition: 0.2s;
        }

        .action-icon:hover { color: white; }

    </style>
</head>
<body>

    <div class="app-nav">
        <div class="nav-icon active">🏠</div>
        <div class="nav-icon">💬</div>
        <div class="nav-icon">🔔</div>
        <div class="nav-icon">⚙️</div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">Wiadomości</div>
        
        <div class="stories-container">
            <div class="story">
                <div class="story-img-wrapper">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ty" alt="Twoja relacja">
                </div>
                <span>Twój profil</span>
            </div>
            <div class="story">
                <div class="story-img-wrapper">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Anna" alt="Anna">
                </div>
                <span>Anna</span>
            </div>
            <div class="story">
                <div class="story-img-wrapper">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Marek" alt="Marek">
                </div>
                <span>Marek</span>
            </div>
        </div>

        <div class="chat-list">
            <div class="chat-item" style="background-color: rgba(255,255,255,0.05);">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Anna" class="chat-avatar">
                <div class="chat-info">
                    <h4>Anna Nowak</h4>
                    <p>Wysłała Ci relację • 5 min</p>
                </div>
            </div>
            <div class="chat-item">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Grupa" class="chat-avatar">
                <div class="chat-info">
                    <h4>Grupa Projektowa</h4>
                    <p>Marek: Dobry pomysł!</p>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-header-info">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Anna" alt="Anna">
                <div>
                    <h3 style="margin: 0; font-size: 16px; color: white;">Anna Nowak</h3>
                    <span style="font-size: 12px; color: var(--text-muted);">Aktywna(y) teraz</span>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <span class="action-icon">📞</span>
                <span class="action-icon">📹</span>
                <span class="action-icon">ℹ️</span>
            </div>
        </div>

        <div class="messages" id="chat-box">
            <div class="message-row received">
                <div class="message-bubble">
                    Hej! Widziałeś najnowsze Insta Stories? 😂
                    <div class="like-btn" onclick="this.innerHTML='❤️'">🤍</div>
                </div>
            </div>
            
            <div class="message-row sent">
                <div class="message-bubble">
                    Tak, mega zabawne! Zrobiłem zrzut ekranu.
                </div>
            </div>
            
            <div class="message-row received">
                <div class="message-bubble">
                    Podeślesz mi? Zapomniałam zapisać.
                    <div class="like-btn" onclick="this.innerHTML='❤️'">🤍</div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <span class="action-icon">➕</span>
                <span class="action-icon">📷</span>
                <input type="text" placeholder="Napisz wiadomość..." id="msg-input" onkeypress="handleEnter(event)">
                <span class="action-icon">🎙️</span>
            </div>
        </div>
    </div>

    <script>
        // Prosty skrypt symulujący wysyłanie wiadomości (wcisnij Enter)
        function handleEnter(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('msg-input');
                const text = input.value.trim();
                
                if (text) {
                    const chatBox = document.getElementById('chat-box');
                    const newMsg = `
                        <div class="message-row sent">
                            <div class="message-bubble">${text}</div>
                        </div>
                    `;
                    chatBox.innerHTML += newMsg;
                    input.value = '';
                    chatBox.scrollTop = chatBox.scrollHeight; // przewija w dół
                }
            }
        }
    </script>
</body>
</html>
