<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Territorial MMO Engine</title>
    <style>
        :root { --bg: #111; --panel: #222; --text: #eee; --accent: #e67e22; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* UI HUD */
        #hud { display: flex; justify-content: space-between; background: var(--panel); padding: 15px 30px; border-bottom: 2px solid #333; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10; }
        .hud-section { display: flex; gap: 20px; align-items: center; }
        .stat-box { background: #000; padding: 5px 15px; border-radius: 5px; font-weight: bold; border: 1px solid #444; }
        .clan-tag { color: #f1c40f; }
        button { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #d35400; }

        /* Game Area */
        #game-wrapper { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        canvas { border: 2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; }
        
        /* Ukryty canvas do czytania mapy (maski kolizji) */
        #collisionCanvas { display: none; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-section">
            <div class="stat-box">Gracz: <span class="clan-tag">[DEV]</span> <span id="ui-name">Admin</span></div>
            <div class="stat-box">Terytorium: <span id="ui-score">0</span> px</div>
        </div>
        <div class="hud-section">
            <button onclick="Engine.changeMap('poland')">Mapa Polski</button>
            <button onclick="Engine.changeMap('world')">Mapa Świata</button>
            <button id="btn-login" style="background: #2980b9;">Połącz z Firebase</button>
        </div>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <canvas id="collisionCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        /**
         * KLASY DANYCH (Przygotowane pod Firebase)
         */
        class Player {
            constructor(id, name, clan, color) {
                this.id = id;
                this.name = name;
                this.clan = clan;
                this.color = color;
                this.pixelsOwned = 0;
            }
        }

        class Cell {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.ownerId = null; // Kto posiada piksel
                this.defense = 0;    // Siła obrony
            }
        }

        /**
         * GŁÓWNY SILNIK GRY
         */
        const Engine = {
            canvas: document.getElementById('gameCanvas'),
            ctx: document.getElementById('gameCanvas').getContext('2d'),
            colCanvas: document.getElementById('collisionCanvas'),
            colCtx: document.getElementById('collisionCanvas').getContext('2d', { willReadFrequently: true }),
            
            width: 800,
            height: 600,
            gridSize: 5, // Wielkość jednego terytorium (5x5 pikseli)
            
            mapData: null, // Dane o kolorach maski (ląd vs woda)
            grid: [],      // Tablica stanu gry
            players: {},   // Lista graczy (docelowo z Firebase)
            myPlayerId: 'user_1', // Moje tymczasowe ID

            init() {
                this.setupGrid();
                this.createLocalPlayer();
                this.bindEvents();
                // Domyślnie ładujemy testową maskę (czarne tło = ląd, np. na całości)
                this.loadMapMask(''); 
                this.gameLoop();
            },

            setupGrid() {
                const cols = Math.floor(this.width / this.gridSize);
                const rows = Math.floor(this.height / this.gridSize);
                for (let y = 0; y < rows; y++) {
                    let row = [];
                    for (let x = 0; x < cols; x++) {
                        row.push(new Cell(x, y));
                    }
                    this.grid.push(row);
                }
            },

            createLocalPlayer() {
                this.players[this.myPlayerId] = new Player(this.myPlayerId, "Admin", "DEV", "#e74c3c");
            },

            loadMapMask(imageUrl) {
                // W prawdziwej grze imageUrl to link do czarno-białej mapy (np. kontur Polski)
                // Używamy ukrytego canvasa, by narysować tam mapę i zczytać gdzie jest czarny kolor
                
                // SYMULACJA MAPY: Rysujemy białe tło (woda) i czarną wyspę na środku (ląd)
                this.colCtx.fillStyle = "#ffffff"; // Woda
                this.colCtx.fillRect(0, 0, this.width, this.height);
                
                this.colCtx.fillStyle = "#000000"; // Ląd
                this.colCtx.beginPath();
                this.colCtx.arc(this.width/2, this.height/2, 200, 0, Math.PI * 2);
                this.colCtx.fill();

                // Zapisujemy mapę kolizji do pamięci RAM dla wydajności
                this.mapData = this.colCtx.getImageData(0, 0, this.width, this.height).data;
                console.log("Mapa kolizji załadowana pomyślnie.");
            },

            isLand(x, y) {
                // Obliczamy indeks w tablicy pikseli [R, G, B, A]
                const index = (y * this.width + x) * 4;
                const r = this.mapData[index];
                // Jeśli czerwony kanał to 0 (czarny), to znaczy że to ląd
                return r < 128; 
            },

            bindEvents() {
                let isDragging = false;
                
                this.canvas.addEventListener('mousedown', () => isDragging = true);
                this.canvas.addEventListener('mouseup', () => isDragging = false);
                this.canvas.addEventListener('mousemove', (e) => {
                    if(isDragging) this.handleInteraction(e);
                });
                this.canvas.addEventListener('click', (e) => this.handleInteraction(e));
            },

            handleInteraction(e) {
                const rect = this.canvas.getBoundingClientRect();
                const mouseX = Math.floor(e.clientX - rect.left);
                const mouseY = Math.floor(e.clientY - rect.top);
                
                // Czy kliknięto w wodę czy ląd na maskach?
                if (!this.isLand(mouseX, mouseY)) return; // To woda, ignoruj!

                // Konwersja pikseli na kordynaty siatki (Grid)
                const gridX = Math.floor(mouseX / this.gridSize);
                const gridY = Math.floor(mouseY / this.gridSize);

                this.attemptCapture(gridX, gridY, this.myPlayerId);
            },

            attemptCapture(gx, gy, playerId) {
                if (gx < 0 || gy < 0 || gy >= this.grid.length || gx >= this.grid[0].length) return;
                
                let cell = this.grid[gy][gx];
                
                // Reguła: zajmij tylko jeśli jest puste lub słabsze (tu uproszczone do po prostu zajęcia)
                if (cell.ownerId !== playerId) {
                    // TUTAJ BĘDZIE WYSYŁKA DO FIREBASE:
                    // FirebaseDB.ref('map/' + gx + '_' + gy).set({ owner: playerId });
                    
                    if (cell.ownerId) this.players[cell.ownerId].pixelsOwned--; // Zabierz poprzedniemu
                    
                    cell.ownerId = playerId;
                    this.players[playerId].pixelsOwned++;
                    this.updateUI();
                }
            },

            updateUI() {
                const me = this.players[this.myPlayerId];
                document.getElementById('ui-score').innerText = me.pixelsOwned;
            },

            draw() {
                // Tło (Woda)
                this.ctx.fillStyle = "#1e3743"; 
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Rysowanie Lądu (Ciemny Szary) na podstawie ukrytego canvasu kolizji
                this.ctx.drawImage(this.colCanvas, 0, 0); // W wersji ostatecznej trzeba to zoptymalizować
                // Półprzezroczysty czarny, żeby ląd wyglądał fajnie
                this.ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                this.ctx.fillRect(0,0, this.width, this.height);

                // Rysowanie siatki posiadanej przez graczy
                for (let y = 0; y < this.grid.length; y++) {
                    for (let x = 0; x < this.grid[y].length; x++) {
                        let cell = this.grid[y][x];
                        if (cell.ownerId) {
                            this.ctx.fillStyle = this.players[cell.ownerId].color;
                            this.ctx.fillRect(x * this.gridSize, y * this.gridSize, this.gridSize, this.gridSize);
                        }
                    }
                }
            },

            gameLoop() {
                this.draw();
                // Renderowanie ok. 60 klatek na sekundę
                requestAnimationFrame(() => this.gameLoop());
            },

            changeMap(mapName) {
                alert(`Przygotowanie zmiany mapy na: ${mapName}. \nWymaga to wczytania pliku maski PNG przez Firebase Storage.`);
            }
        };

        // Uruchom silnik po załadowaniu
        window.onload = () => Engine.init();

    </script>
</body>
</html>
