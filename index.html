<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Age of Territorial - MMO Online</title>
    <style>
        /* === UI & CSS === */
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #3b82f6; --text: #f8fafc; --red: #ef4444; --green: #10b981; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; user-select: none; }
        
        #menu { position: absolute; inset: 0; background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .title { font-size: 3rem; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .btn { background: var(--panel); border: 2px solid var(--accent); color: white; padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 8px; margin: 10px; width: 300px; transition: 0.2s; }
        .btn:hover { background: var(--accent); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: gray; background: gray; }

        #hud { display: none; justify-content: space-between; background: var(--panel); padding: 15px; border-bottom: 2px solid #334155; }
        .res { font-weight: bold; font-size: 1.2rem; margin-right: 20px; }
        
        #map-container { flex-grow: 1; display: none; justify-content: center; align-items: center; background: #000; }
        canvas { box-shadow: 0 0 40px rgba(0,0,0,0.8); cursor: crosshair; }

        /* MODAL WOJSKA */
        #troop-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel); border: 2px solid var(--accent); padding: 30px; border-radius: 10px; z-index: 50; flex-direction: column; width: 350px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .slider-val { font-size: 2rem; color: var(--red); font-weight: bold; margin: 15px 0; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .action-btn { flex: 1; padding: 12px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; color: white; }
        .btn-ok { background: var(--green); } .btn-cancel { background: var(--red); }

        #toast-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 200; pointer-events: none; }
        .toast { background: rgba(0,0,0,0.8); padding: 10px 20px; border: 1px solid var(--accent); border-radius: 8px; font-weight: bold; animation: fade 2.5s forwards; }
        @keyframes fade { 0% { opacity: 0; transform: translateY(20px); } 10% { opacity: 1; transform: translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="menu">
        <div class="title">Territorial MMO</div>
        <div id="db-status" style="color: var(--green); margin-bottom: 20px;">Inicjalizacja systemu...</div>
        <button id="btn-start" class="btn" onclick="Game.start()" disabled>Graj Online</button>
        <div style="margin-top: 20px; color: gray;">Zintegrowano z Firebase</div>
    </div>

    <div id="hud">
        <div>
            <span class="res" style="color: #f59e0b">🪙 <span id="ui-gold">0</span></span>
            <span class="res" style="color: #ef4444">⚔️ <span id="ui-troops">0</span></span>
        </div>
        <div style="color: gray;">[1 Klik] Wybierz start | [2 Klik] Wybierz cel</div>
    </div>

    <div id="map-container"><canvas id="gameCanvas" width="1000" height="600"></canvas></div>

    <div id="troop-modal">
        <h2>Wyślij Jednostki</h2>
        <div id="modal-desc" style="color: gray;">Skąd -> Dokąd</div>
        <div class="slider-val" id="slider-display">10</div>
        <input type="range" id="troop-slider" min="1" max="100" value="10">
        <div class="btn-row">
            <button class="action-btn btn-cancel" onclick="UI.closeModal()">Anuluj</button>
            <button class="action-btn btn-ok" onclick="Input.confirmMove()">Atakuj / Przesuń</button>
        </div>
    </div>
    
    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVip74fl5K2fnLjlCOBLJfBnq7lxglyoU",
            authDomain: "xchess-79e2d.firebaseapp.com",
            projectId: "xchess-79e2d",
            storageBucket: "xchess-79e2d.firebasestorage.app",
            messagingSenderId: "382071993193",
            appId: "1:382071993193:web:86dbe5211f2151cb5383f8"
        };

        window.Network = {
            db: null, uid: null, isConnected: false,
            init() {
                try {
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    this.db = getDatabase(app);
                    
                    signInAnonymously(auth);
                    onAuthStateChanged(auth, user => {
                        if (user) {
                            this.uid = user.uid;
                            this.isConnected = true;
                            document.getElementById('db-status').innerText = "Połączono z serwerem";
                            document.getElementById('btn-start').disabled = false;
                        }
                    });
                } catch(e) { document.getElementById('db-status').innerText = "Błąd: Uruchom przez serwer lokalny"; }
            },
            syncMap(data) { if(this.isConnected) set(ref(this.db, 'map_state'), data); },
            updateCell(x, y, data) { if(this.isConnected) update(ref(this.db, `map_state/${x}_${y}`), data); },
            listen(callback) { if(this.isConnected) onValue(ref(this.db, 'map_state'), snap => { if(snap.val()) callback(snap.val()); }); },
            checkMap(callback) { get(ref(this.db, 'map_state')).then(s => callback(s.exists(), s.val())); }
        };
        window.Network.init();
    </script>

    <script>
        const UI = {
            toast(msg, err=false) {
                const c = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = 'toast'; t.innerText = msg;
                if(err) t.style.borderColor = 'var(--red)';
                c.appendChild(t);
                setTimeout(() => t.remove(), 2500);
            },
            openModal(src, tgt) {
                const max = Math.max(1, src.troops - 1);
                const s = document.getElementById('troop-slider');
                s.max = max; s.value = Math.floor(max/2);
                document.getElementById('slider-display').innerText = s.value;
                document.getElementById('modal-desc').innerText = `Z [${src.x},${src.y}] do [${tgt.x},${tgt.y}]`;
                s.oninput = function() { document.getElementById('slider-display').innerText = this.value; };
                document.getElementById('troop-modal').style.display = 'flex';
            },
            closeModal() {
                document.getElementById('troop-modal').style.display = 'none';
                Input.tgt = null;
            }
        };

        const Input = {
            src: null, tgt: null, hov: null,
            bind() {
                const cvs = Game.cvs;
                cvs.addEventListener('mousemove', e => {
                    const r = cvs.getBoundingClientRect();
                    const x = Math.floor((e.clientX - r.left) / Game.sz);
                    const y = Math.floor((e.clientY - r.top) / Game.sz);
                    if(x>=0 && x<Game.cols && y>=0 && y<Game.rows) this.hov = Game.grid[y][x];
                });

                cvs.addEventListener('dblclick', e => {
                    if(!this.src || !this.hov || this.src === this.hov || this.hov.water) return;
                    let dist = Math.max(Math.abs(this.src.x - this.hov.x), Math.abs(this.src.y - this.hov.y));
                    if(dist === 1) {
                        if(this.src.troops > 1) {
                            this.tgt = this.hov;
                            UI.openModal(this.src, this.tgt);
                        } else UI.toast("Za mało wojska, by wykonać ruch!", true);
                    } else { UI.toast("Prowincja za daleko!", true); }
                });

                cvs.addEventListener('mousedown', e => {
                    if(e.button !== 0 || !this.hov || this.hov.water) return;
                    if(this.hov.owner === Game.uid) this.src = this.hov;
                    else this.src = null;
                });
            },
            confirmMove() {
                const val = parseInt(document.getElementById('troop-slider').value);
                Game.execute(this.src, this.tgt, val);
                UI.closeModal();
                this.src = null;
            }
        };

        const Game = {
            cvs: document.getElementById('gameCanvas'),
            ctx: document.getElementById('gameCanvas').getContext('2d'),
            cols: 25, rows: 15, sz: 40, grid: [], uid: null,
            res: { gold: 100 }, run: false, colors: ['#ef4444', '#10b981', '#f59e0b', '#8b5cf6'],

            start() {
                this.uid = window.Network.uid;
                document.getElementById('menu').style.display = 'none';
                document.getElementById('hud').style.display = 'flex';
                document.getElementById('map-container').style.display = 'flex';

                window.Network.checkMap((exists, data) => {
                    if(exists) { this.parseMap(data); this.spawn(); UI.toast("Pobrano mapę z serwera"); }
                    else { this.genMap(); this.spawn(); window.Network.syncMap(this.packMap()); UI.toast("Wygenerowano nową mapę"); }
                    
                    Input.bind();
                    window.Network.listen(d => this.parseMap(d));
                    setInterval(() => this.tick(), 1000);
                    this.run = true; this.loop();
                });
            },
            genMap() {
                this.grid = [];
                for(let y=0; y<this.rows; y++) {
                    let row = [];
                    for(let x=0; x<this.cols; x++) {
                        let w = (x===0||y===0||x===this.cols-1||y===this.rows-1||Math.random()<0.1);
                        row.push({x, y, owner:0, troops: w?0:Math.floor(Math.random()*5), water:w});
                    }
                    this.grid.push(row);
                }
            },
            packMap() {
                let obj = {};
                for(let y=0; y<this.rows; y++) for(let x=0; x<this.cols; x++) obj[`${x}_${y}`] = this.grid[y][x];
                return obj;
            },
            parseMap(data) {
                this.grid = [];
                for(let y=0; y<this.rows; y++) {
                    let row = [];
                    for(let x=0; x<this.cols; x++) {
                        let d = data[`${x}_${y}`];
                        row.push({x, y, owner: d?d.owner:0, troops: d?d.troops:0, water: d?d.water:false});
                    }
                    this.grid.push(row);
                }
            },
            spawn() {
                let lands = [];
                for(let y=0; y<this.rows; y++) for(let x=0; x<this.cols; x++) if(!this.grid[y][x].water && this.grid[y][x].owner === 0) lands.push(this.grid[y][x]);
                if(lands.length > 0) {
                    let p = lands[Math.floor(Math.random() * lands.length)];
                    p.owner = this.uid; p.troops = 50;
                    window.Network.updateCell(p.x, p.y, {owner: p.owner, troops: p.troops});
                }
            },
            tick() {
                let t = 0;
                for(let y=0; y<this.rows; y++) {
                    for(let x=0; x<this.cols; x++) {
                        let p = this.grid[y][x];
                        if(p.owner === this.uid) {
                            p.troops++; t += p.troops; this.res.gold++;
                            window.Network.updateCell(x, y, {troops: p.troops});
                        }
                    }
                }
                document.getElementById('ui-gold').innerText = this.res.gold;
                document.getElementById('ui-troops').innerText = t;
            },
            execute(s, t, v) {
                s.troops -= v;
                if(t.owner === this.uid) { t.troops += v; }
                else {
                    if(v > t.troops) { t.owner = this.uid; t.troops = v - t.troops; UI.toast("Prowincja zdobyta!"); }
                    else { t.troops -= v; UI.toast("Atak odparty!", true); }
                }
                window.Network.updateCell(s.x, s.y, {troops: s.troops});
                window.Network.updateCell(t.x, t.y, {owner: t.owner, troops: t.troops});
            },
            draw() {
                this.ctx.fillStyle = '#0f172a'; this.ctx.fillRect(0,0,1000,600);
                for(let y=0; y<this.rows; y++) {
                    for(let x=0; x<this.cols; x++) {
                        let p = this.grid[y][x], px = x*this.sz, py = y*this.sz;
                        
                        if(p.water) this.ctx.fillStyle = '#0ea5e9';
                        else if(p.owner === 0) this.ctx.fillStyle = '#1e293b';
                        else if(p.owner === this.uid) this.ctx.fillStyle = '#3b82f6';
                        else this.ctx.fillStyle = this.colors[(p.owner.charCodeAt(0) || 0) % this.colors.length];
                        
                        this.ctx.fillRect(px, py, this.sz, this.sz);
                        this.ctx.strokeStyle = '#020617'; this.ctx.strokeRect(px, py, this.sz, this.sz);

                        if(!p.water && (p.troops>0 || p.owner!==0)) {
                            this.ctx.fillStyle = 'white'; this.ctx.font = 'bold 12px Arial'; this.ctx.textAlign = 'center';
                            this.ctx.fillText(Math.floor(p.troops), px+this.sz/2, py+this.sz/2+5);
                        }

                        if(Input.hov === p && !p.water) { this.ctx.fillStyle = 'rgba(255,255,255,0.2)'; this.ctx.fillRect(px,py,this.sz,this.sz); }
                        if(Input.src === p) { this.ctx.strokeStyle = '#facc15'; this.ctx.lineWidth = 3; this.ctx.strokeRect(px+2,py+2,this.sz-4,this.sz-4); this.ctx.lineWidth = 1; }
                    }
                }
            },
            loop() { if(this.run) { this.draw(); requestAnimationFrame(() => this.loop()); } }
        };
    </script>
</body>
</html>
