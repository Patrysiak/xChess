<!DOCTYPE html>

            <h2>Witaj w 33MC.PL</h2>
            <p>Zaloguj się przez Firebase, aby wejść na serwer.</p>
            <button class="btn-brand" id="btn-login">Zaloguj przez Google</button>
        </div>
    </div>

    <div id="app-container">
        
        <nav class="servers-nav" id="servers-nav">
            </nav>

        <aside class="sidebar">
            <header class="sidebar-header" id="sidebar-header-area">
                <span id="sidebar-title">Ładowanie...</span>
            </header>
            
            <div class="sidebar-content" id="sidebar-content">
                </div>

            <div class="user-panel">
                <div class="user-profile" id="btn-open-settings">
                    <img id="my-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Puste" alt="Avatar">
                    <div class="user-info">
                        <strong id="my-name">...</strong>
                        <span id="my-lvl-text">Poziom 1</span>
                        <div class="xp-bar-container"><div class="xp-bar-fill" id="my-xp-bar"></div></div>
                    </div>
                </div>
                <div class="user-controls">
                    <button class="control-btn" id="btn-add-post" title="Dodaj Post">
                        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    </button>
                    <button class="control-btn" id="btn-settings" title="Ustawienia">

                    </button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-title" id="chat-header-title">
                    Wybierz kanał
                </div>
                <div class="top-bar-actions">
                    <svg title="Dzwonienie" id="btn-call"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </div>
            </header>

            <div class="chat-and-members">
                <section class="messages-wrapper">
                    <div class="messages-list" id="messages-area"></div>
                    <div class="input-area">
                        <div class="input-wrapper">
                            <input type="text" class="chat-input" id="message-input" placeholder="Napisz wiadomość (Zdobywaj XP!)">
                        </div>
                    </div>
                </section>

                <aside class="right-panel" id="right-panel">
                    </aside>
            </div>
        </main>
    </div>

    <div id="modal-container"></div>
    <div id="toast-container"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
